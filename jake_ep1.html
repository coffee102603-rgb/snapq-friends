{id:2,sp:"jake",en:"Don't worry, just answer their questions honestly. It's pretty simple.",ko:"걱정 마, 질문에 솔직하게 대답하면 돼. 꽤 간단해.",star:1,sw:"answer honestly"},
{id:3,sp:"you",en:"Got it. I'll keep my documents ready.",ko:"알겠어. 서류 준비해 놓을게.",star:0,sw:""},

{id:4,sp:"officer",en:"Good afternoon. What's the purpose of your visit?",ko:"안녕하세요. 방문 목적이 뭔가요?",star:1,sw:"purpose of your visit"},
{id:5,sp:"you",en:"I'm here for sightseeing. I'll be staying for ten days.",ko:"관광 왔어요. 열흘 머물 예정이에요.",star:0,sw:""},
{id:6,sp:"officer",en:"Where will you be staying?",ko:"어디에서 머무실 건가요?",star:0,sw:""},

// Chunk 3: 수하물 → 밖으로
{id:8,sp:"jake",en:"Nice! You passed! Now let's go pick up our luggage at baggage claim.",ko:"통과했어! 이제 수하물 찾는 곳에서 짐 찾으러 가자.",star:0,sw:""},

{id:11,sp:"you",en:"Great, I got mine! Let's head outside and catch a taxi.",ko:"좋아, 내 거 찾았어! 밖으로 나가서 택시 타자.",star:1,sw:"catch a taxi"},

var CHK=[{s:0,e:3,t:"기내 → 입국심사대"},{s:4,e:7,t:"입국심사관과 대화"},{s:8,e:11,t:"수하물 → 공항 밖으로"}];

var QZ=[
[{q:"Jake가 뭘 챙기라고 했나요?",a:"여권 (passport)",o:["여권 (passport)","비행기표 (ticket)","지갑 (wallet)","가방 (bag)"]},

}

var C={bg:"#0a0b14",cd:"#12131f",bd:"#1e2035",jk:"#3b82f6",yu:"#f59e0b",of:"#ef4444",gn:"#22c55e",st:"#fbbf24",wh:"#f1f5f9",gy:"#64748b",gl:"#94a3b8",gd:"#334155",ac:"#8b5cf6"};

function App(){

    var t=ev.results[0][0].transcript;

    setLn(false);
    // Jake 자동 응답
    setTimeout(function(){
      var rs=["Great job! 발음 좋아지고 있어!","That's exactly right!","Good try! 한번 더!","Perfect! You're a natural!","Almost! Try again!"];

  r.onend=function(){setLn(false)};
  rr.current=r;setLn(true);r.start();
},[]);

ue(function(){if(cr.current)cr.current.scrollIntoView({behavior:"smooth"})},[cm]);

/* ═══ WHITEBOARD — 라벨 제거 ═══ */
