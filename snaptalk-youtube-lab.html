<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
:root{--bg:#0a0e1a;--bg2:#101424;--card:#151a2e;--card-hover:#1c2240;--accent:#FF6B35;--accent-glow:rgba(255,107,53,0.2);--accent2:#FF9F1C;--text:#f0f0f5;--text-dim:#7a7f98;--text-mid:#b0b5ce;--success:#2ecc71;--danger:#e74c3c;--border:rgba(255,255,255,0.07);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.page{display:none;width:100%;height:100%;flex-direction:column;position:absolute;top:0;left:0}.page.active{display:flex}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;height:56px;background:rgba(10,14,26,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;color:var(--text-dim);font-size:10px;font-weight:500;font-family:inherit;cursor:pointer;transition:color .2s;gap:2px}.nav-btn .nav-icon{font-size:20px}.nav-btn.active{color:var(--accent)}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:66px;-webkit-overflow-scrolling:touch}
.home-header{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.logo-area{display:flex;align-items:baseline;gap:8px}
.logo-main{font-size:22px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;font-weight:600;color:var(--accent);background:rgba(255,107,53,0.1);padding:3px 8px;border-radius:20px}
.chip-bar{display:flex;gap:8px;padding:14px 16px 8px;overflow-x:auto;scrollbar-width:none}.chip-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap}.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}.chip:active{transform:scale(0.95)}
.feed{padding:6px 16px;display:flex;flex-direction:column;gap:10px}
.feed-card{display:flex;gap:12px;padding:12px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:transform .15s,border-color .2s}.feed-card:active{transform:scale(0.98);border-color:rgba(255,107,53,0.3)}
.feed-thumb{width:64px;height:84px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;position:relative}.feed-thumb .f-dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.65);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:6px}
.feed-info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:0}.feed-title{font-size:14px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.feed-meta{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px}.feed-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--text-dim)}
.feed-diff{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}.diff-beginner{background:rgba(46,204,113,0.15);color:#2ecc71}.diff-intermediate{background:rgba(255,159,28,0.15);color:#FF9F1C}.diff-advanced{background:rgba(231,76,60,0.15);color:#e74c3c}
.feed-tags{display:flex;gap:4px;margin-top:2px}.feed-tag{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,0.05);color:var(--text-dim)}
.learn-top{position:relative;width:100%;background:#000}.video-container{width:100%;aspect-ratio:9/14;max-height:52vh;background:linear-gradient(180deg,#0d1020,#1a0d20);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}.video-container iframe{width:100%;height:100%;border:none}
.video-placeholder{text-align:center;color:var(--text-dim)}.video-placeholder .vp-emoji{font-size:48px;margin-bottom:8px}.video-placeholder .vp-title{font-size:15px;font-weight:600;color:var(--text)}.video-placeholder .vp-sub{font-size:11px;margin-top:3px}
.back-btn{position:absolute;top:12px;left:12px;z-index:10;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.45);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.learn-content{padding:14px 16px 0}.learn-title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.learn-title-bar h3{font-size:15px;font-weight:700}.learn-title-bar .sent-count{font-size:11px;color:var(--text-dim)}
.expr-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}.expr-en{font-size:14px;font-weight:600}.expr-ko{font-size:11px;color:var(--text-dim);margin-top:2px}.expr-note{font-size:10px;color:var(--accent);margin-top:2px}
.expr-actions{display:flex;gap:5px;flex-shrink:0}.expr-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.15);color:var(--accent);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}.expr-btn:active{background:rgba(255,107,53,0.2)}.expr-btn.saved{background:var(--accent);color:#fff;border-color:var(--accent)}
.start-dub-btn{width:100%;padding:15px;margin-top:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px var(--accent-glow);transition:transform .15s}.start-dub-btn:active{transform:scale(0.97)}
.dub-video-area{width:100%;aspect-ratio:9/14;max-height:52vh;background:#000;position:relative}
.dub-subtitle-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px;text-align:center;background:linear-gradient(transparent,rgba(0,0,0,0.85))}.dub-subtitle-text{font-size:17px;font-weight:600;line-height:1.5;text-shadow:0 2px 8px rgba(0,0,0,0.8)}.dub-subtitle-text .blank{display:inline-block;min-width:50px;border-bottom:2px solid var(--accent);margin:0 2px}.dub-ko-hint{font-size:12px;color:var(--text-dim);margin-top:5px}
.dub-controls{flex:1;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}.dub-status{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}.dub-status .rec-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.dub-stars{font-size:20px;letter-spacing:3px}.dub-sentence-counter{font-size:11px;color:var(--text-dim)}
.said-btn{width:80%;max-width:280px;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 25px var(--accent-glow);transition:transform .15s}.said-btn:active{transform:scale(0.95)}
.hint-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}.hint-toggle input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.dub-complete{display:none;flex-direction:column;align-items:center;gap:12px;padding:20px;text-align:center}.dub-complete.show{display:flex}.dub-complete h3{font-size:20px;font-weight:800}.dub-complete p{font-size:12px;color:var(--text-dim)}.dub-result-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.dub-result-btn{padding:11px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}.dub-result-btn:active{background:var(--card-hover)}.dub-result-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.myroom-header{padding:18px 16px 0;font-size:20px;font-weight:800}.myroom-tabs{display:flex;padding:12px 16px;gap:8px}.myroom-tab{flex:1;padding:9px;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-dim);transition:all .2s}.myroom-tab.active{background:rgba(255,107,53,0.12);border-color:var(--accent);color:var(--accent)}
.myroom-content{padding:0 16px}.myroom-empty{text-align:center;padding:36px 0;color:var(--text-dim)}.myroom-empty .me-icon{font-size:42px;margin-bottom:10px}.myroom-empty p{font-size:13px;line-height:1.5}
.myroom-item{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}.myroom-item .mi-icon{font-size:24px}.myroom-item .mi-info{flex:1}.myroom-item .mi-info h4{font-size:13px;font-weight:600}.myroom-item .mi-info p{font-size:11px;color:var(--text-dim);margin-top:2px}
.mi-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card-hover);color:var(--text-mid);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}.mi-btn:active{background:rgba(255,107,53,0.12);color:var(--accent)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--accent);padding:8px 18px;border-radius:12px;font-size:12px;font-weight:600;z-index:200;transition:transform .3s ease;box-shadow:0 8px 30px rgba(0,0,0,0.5)}.toast.show{transform:translateX(-50%) translateY(0)}
.feed-empty{text-align:center;padding:40px 20px;color:var(--text-dim)}.feed-empty .fe-icon{font-size:40px;margin-bottom:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp .3s ease forwards}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="page active" id="page-home"><div class="scroll-area"><div class="home-header"><div class="logo-area"><div class="logo-main">SnapTalk</div><div class="logo-tag">Snap Dubbing</div></div></div><div class="chip-bar" id="chip-bar"></div><div class="feed" id="feed"></div></div></div>
<div class="page" id="page-learn"><div class="learn-top"><button class="back-btn" onclick="goHome()">←</button><div class="video-container" id="learn-video"><div class="video-placeholder"><div class="vp-emoji" id="learn-vp-emoji">🎬</div><div class="vp-title" id="learn-vp-title"></div><div class="vp-sub">탭하여 재생</div></div></div></div><div class="scroll-area"><div class="learn-content"><div class="learn-title-bar"><h3>📌 핵심 표현</h3><span class="sent-count" id="learn-sent-count"></span></div><div id="learn-expressions"></div><button class="start-dub-btn" onclick="startDubbing()">🎬 더빙 시작!</button></div></div></div>
<div class="page" id="page-dub"><div class="dub-video-area" id="dub-video"><div class="video-placeholder"><div class="vp-emoji" id="dub-vp-emoji">🎬</div><div class="vp-title" id="dub-vp-title">더빙 모드</div><div class="vp-sub">마이크 준비!</div></div><div class="dub-subtitle-overlay" id="dub-overlay" style="display:none"><div class="dub-subtitle-text" id="dub-subtitle"></div><div class="dub-ko-hint" id="dub-hint"></div></div></div><div class="dub-controls" id="dub-controls"><div class="dub-status"><div class="rec-dot"></div><span>녹음 중</span></div><div class="dub-stars" id="dub-stars">⭐</div><div class="dub-sentence-counter" id="dub-counter">1 / 4</div><button class="said-btn" onclick="nextSentence()">✅ 말했어요!</button><label class="hint-toggle"><input type="checkbox" id="hint-check" checked onchange="toggleHint()"> 한글 힌트</label></div><div class="dub-complete" id="dub-complete"><div style="font-size:48px">🎉</div><h3>더빙 완료!</h3><p id="dub-complete-info"></p><div class="dub-result-btns"><button class="dub-result-btn primary" onclick="playbackDub()">▶ 내 더빙 듣기</button><button class="dub-result-btn" onclick="saveDub()">💾 저장</button><button class="dub-result-btn" onclick="retryDub()">🔄 다시</button><button class="dub-result-btn" onclick="goHome()">🏠 홈</button></div></div></div>
<div class="page" id="page-myroom"><div class="scroll-area"><div class="myroom-header">📁 나의방</div><div class="myroom-tabs"><div class="myroom-tab active" onclick="switchMyroomTab('dubs',this)">🎬 나의 더빙</div><div class="myroom-tab" onclick="switchMyroomTab('notes',this)">📝 나의 노트</div></div><div class="myroom-content" id="myroom-content"></div></div></div>
<div class="bottom-nav"><button class="nav-btn active" onclick="navigate('home')" id="nav-home"><span class="nav-icon">🏠</span>Home</button><button class="nav-btn" onclick="navigate('myroom')" id="nav-myroom"><span class="nav-icon">📁</span>My Room</button></div>
<script>
const LIBRARY=[
{id:"nyc-people-1",title:"What makes NYC special?",videoId:"",duration:30,category:"interview",emoji:"🎤",bg:"linear-gradient(135deg,#e74c3c22,#8e44ad22)",difficulty:"beginner",tags:["interview","reaction"],expressions:[{en:"It's the vibe, you know?",ko:"그 분위기 있잖아, 알지?",note:"vibe = 분위기, 느낌"},{en:"There's no place like it.",ko:"이런 곳은 없어.",note:"no place like it = 비교 불가"},{en:"I fell in love with this city.",ko:"이 도시와 사랑에 빠졌어.",note:"fell in love with = ~에 반하다"}],sentences:[{en:"Excuse me, what makes New York special to you?",ko:"실례합니다, 뉴욕이 왜 특별한가요?",start:0,end:4},{en:"It's the vibe, you know? The energy is crazy.",ko:"분위기 있잖아, 에너지가 미쳤어.",start:4,end:8},{en:"There's no place like it in the world.",ko:"세상에 이런 곳은 없어.",start:8,end:12},{en:"I fell in love with this city the moment I got here.",ko:"도착하는 순간 이 도시와 사랑에 빠졌어.",start:12,end:17}]},
{id:"nyc-people-2",title:"Best advice for tourists?",videoId:"",duration:25,category:"interview",emoji:"🎤",bg:"linear-gradient(135deg,#9b59b622,#3498db22)",difficulty:"beginner",tags:["interview","daily"],expressions:[{en:"Don't be afraid to explore.",ko:"탐험하는 걸 두려워하지 마.",note:"be afraid to = ~을 두려워하다"},{en:"Take the subway, it's worth it.",ko:"지하철 타봐, 가치 있어.",note:"worth it = 그럴 가치가 있는"},{en:"Talk to the locals!",ko:"현지인들한테 말 걸어봐!",note:"locals = 현지인"}],sentences:[{en:"Hey, what's your best advice for tourists?",ko:"관광객들에게 최고의 조언은?",start:0,end:4},{en:"Don't be afraid to explore the neighborhoods.",ko:"동네들 탐험하는 걸 두려워하지 마.",start:4,end:8},{en:"Take the subway, trust me, it's worth it.",ko:"지하철 타봐, 진짜 가치 있어.",start:8,end:12},{en:"And talk to the locals, they're super friendly!",ko:"현지인들한테 말 걸어봐, 완전 친절해!",start:12,end:16}]},
{id:"fav-food",title:"What's your favorite food?",videoId:"",duration:30,category:"interview",emoji:"🎤",bg:"linear-gradient(135deg,#e67e2222,#e74c3c22)",difficulty:"intermediate",tags:["interview","food"],expressions:[{en:"I'm obsessed with ramen.",ko:"라멘에 빠져 있어.",note:"obsessed with = ~에 푹 빠진"},{en:"You can never go wrong with pizza.",ko:"피자는 절대 실패 없어.",note:"can never go wrong = 절대 실패 불가"},{en:"It hits different at 2 AM.",ko:"새벽 2시에 먹으면 느낌이 달라.",note:"hits different = 특별히 좋다"}],sentences:[{en:"Quick question: what's your absolute favorite food?",ko:"빠른 질문: 절대적으로 좋아하는 음식은?",start:0,end:4},{en:"Oh man, I'm obsessed with ramen right now.",ko:"세상에, 지금 라멘에 완전 빠져 있어.",start:4,end:8},{en:"But you can never go wrong with a good slice of pizza.",ko:"근데 맛있는 피자 한 조각은 절대 실패 없지.",start:8,end:13},{en:"Especially at 2 AM, it just hits different!",ko:"특히 새벽 2시에, 느낌이 완전 다르지!",start:13,end:17}]},
{id:"nyc-pizza",title:"NYC $1 Pizza 🍕",videoId:"",duration:30,category:"food",emoji:"🍕",bg:"linear-gradient(135deg,#e74c3c22,#f3942422)",difficulty:"beginner",tags:["food","reaction"],expressions:[{en:"You gotta try this place.",ko:"여기 꼭 와봐야 해.",note:"gotta = got to"},{en:"Best slice in the city.",ko:"도시 최고의 피자.",note:"slice = 피자 한 조각"},{en:"Totally worth it.",ko:"완전 가치 있어.",note:"worth it = 가치 있는"}],sentences:[{en:"Hey guys, check out this dollar pizza!",ko:"이 1달러 피자 봐봐!",start:0,end:4},{en:"You gotta try this place.",ko:"여기 꼭 와봐야 해.",start:4,end:7},{en:"Look at that cheese pull!",ko:"저 치즈 늘어나는 거 봐!",start:7,end:11},{en:"Best slice in the city, hands down.",ko:"도시 최고 피자, 확실해.",start:11,end:15}]},
{id:"chinatown-dump",title:"Chinatown Dumplings 🥟",videoId:"",duration:30,category:"food",emoji:"🥟",bg:"linear-gradient(135deg,#e74c3c22,#8e44ad22)",difficulty:"beginner",tags:["food","slang"],expressions:[{en:"These are to die for.",ko:"이건 죽여줘.",note:"to die for = 엄청 맛있는"},{en:"Fresh out of the kitchen.",ko:"주방에서 갓 나온.",note:"fresh out of = 막 나온"},{en:"I could eat these all day.",ko:"하루 종일 먹을 수 있어.",note:"could ~ all day = 계속 가능"}],sentences:[{en:"Welcome to Chinatown, let's get some dumplings!",ko:"차이나타운에 왔어, 만두 먹자!",start:0,end:4},{en:"These are fresh out of the kitchen.",ko:"이건 주방에서 갓 나왔어.",start:4,end:8},{en:"Oh my gosh, these are to die for!",ko:"세상에, 이건 죽여준다!",start:8,end:12},{en:"I could eat these all day, seriously.",ko:"진짜 하루 종일 먹을 수 있어.",start:12,end:15}]},
{id:"halal-cart",title:"NYC Halal Cart 🍗",videoId:"",duration:35,category:"food",emoji:"🍗",bg:"linear-gradient(135deg,#f39c1222,#e67e2222)",difficulty:"intermediate",tags:["food","daily"],expressions:[{en:"White sauce on everything.",ko:"흰 소스 다 뿌려.",note:"on everything = 모든 것에"},{en:"This is a game changer.",ko:"이건 판도를 바꿔.",note:"game changer = 판도를 바꾸는 것"},{en:"Worth the wait in line.",ko:"줄 설 가치 있어.",note:"worth the wait = 기다릴 만한"}],sentences:[{en:"Alright, we're trying the famous halal cart!",ko:"좋아, 유명한 할랄 카트 도전!",start:0,end:4},{en:"White sauce on everything, that's the move.",ko:"흰 소스 다 뿌려, 이게 정석이야.",start:4,end:8},{en:"Oh wow, this is a total game changer!",ko:"와, 이건 완전 판도를 바꿔!",start:8,end:12},{en:"Totally worth the wait in line.",ko:"줄 서서 기다린 보람 있어.",start:12,end:16},{en:"I need this every single day.",ko:"매일 이게 필요해.",start:16,end:20}]},
{id:"times-square",title:"Times Square at Night ✨",videoId:"",duration:30,category:"travel",emoji:"✨",bg:"linear-gradient(135deg,#3498db22,#9b59b622)",difficulty:"beginner",tags:["travel","reaction"],expressions:[{en:"This is absolutely insane!",ko:"이건 완전 미쳤어!",note:"insane = 엄청난"},{en:"It never gets old.",ko:"봐도 봐도 안 질려.",note:"never gets old = 항상 좋은"},{en:"The energy here is unreal.",ko:"여기 에너지 장난 아니야.",note:"unreal = 비현실적"}],sentences:[{en:"We just got to Times Square and wow!",ko:"타임스퀘어에 막 도착했는데 와우!",start:0,end:4},{en:"Look at all these lights, this is insane!",ko:"이 불빛들 봐, 미쳤다!",start:4,end:8},{en:"The energy here is absolutely unreal.",ko:"여기 에너지가 완전 비현실적이야.",start:8,end:12},{en:"It never gets old, no matter how many times you come.",ko:"몇 번을 와도 항상 좋아.",start:12,end:17}]},

{id:"morning-routine",title:"NYC Morning Routine ☀️",videoId:"",duration:40,category:"daily",emoji:"☀️",bg:"linear-gradient(135deg,#f39c1222,#e67e2222)",difficulty:"intermediate",tags:["daily","narration"],expressions:[{en:"First things first, I need my coffee.",ko:"뭐니뭐니 해도 커피 먼저.",note:"first things first = 가장 먼저"},{en:"I'm running a bit late.",ko:"좀 늦었어.",note:"running late = 늦고 있다"},{en:"Let's get this day started!",ko:"오늘 하루 시작하자!",note:"get started = 시작하다"}],sentences:[{en:"Good morning everyone! It's 7 AM in New York.",ko:"좋은 아침! 뉴욕은 오전 7시야.",start:0,end:5},{en:"First things first, I need my coffee.",ko:"뭐니뭐니 해도 커피부터.",start:5,end:9},{en:"Okay, I'm running a bit late today.",ko:"오케이, 오늘 좀 늦었어.",start:9,end:13},{en:"Quick shower, get dressed, out the door.",ko:"빠르게 샤워, 옷 입고, 출발.",start:13,end:18},{en:"Let's get this day started!",ko:"오늘 하루 시작하자!",start:18,end:22}]},
{id:"grocery-shop",title:"Grocery Shopping 🛒",videoId:"",duration:25,category:"daily",emoji:"🛒",bg:"linear-gradient(135deg,#16a08522,#2ecc7122)",difficulty:"beginner",tags:["daily","ordering"],expressions:[{en:"Where can I find the pasta aisle?",ko:"파스타 코너 어디인가요?",note:"where can I find = 위치 물을 때"},{en:"Is this on sale?",ko:"이거 세일 중인가요?",note:"on sale = 할인 중"},{en:"I'll take two of these.",ko:"이거 두 개 주세요.",note:"I'll take = 사겠습니다"}],sentences:[{en:"Excuse me, where can I find the pasta aisle?",ko:"실례합니다, 파스타 코너 어디인가요?",start:0,end:4},{en:"Oh nice, is this on sale?",ko:"오 좋네, 이거 세일 중인가요?",start:4,end:7},{en:"Great deal! I'll take two of these.",ko:"좋은 가격! 이거 두 개요.",start:7,end:11},{en:"Thanks for your help, have a nice day!",ko:"감사합니다, 좋은 하루!",start:11,end:15}]},
{id:"gen-z-slang",title:"Gen Z Slang Explained 🔥",videoId:"",duration:25,category:"slang",emoji:"🔥",bg:"linear-gradient(135deg,#e74c3c22,#f39c1222)",difficulty:"advanced",tags:["slang","comedy"],expressions:[{en:"That's fire!",ko:"완전 대박!",note:"fire = 엄청 좋은"},{en:"No cap.",ko:"진짜야, 거짓말 아님.",note:"no cap = 진심"},{en:"It hits different.",ko:"느낌이 다르다.",note:"hits different = 특별히 좋다"}],sentences:[{en:"Yo, this outfit is fire!",ko:"야, 이 옷 완전 대박!",start:0,end:3},{en:"No cap, this is the best I've ever had.",ko:"진짜야, 내가 먹어본 것 중 최고.",start:3,end:7},{en:"Late night pizza just hits different.",ko:"밤에 먹는 피자는 느낌이 달라.",start:7,end:11},{en:"I'm dead, that was so funny!",ko:"죽겠어, 너무 웃겨!",start:11,end:14}]},
{id:"compliments",title:"How to Compliment 💬",videoId:"",duration:25,category:"slang",emoji:"💬",bg:"linear-gradient(135deg,#e056c622,#9b59b622)",difficulty:"intermediate",tags:["slang","daily"],expressions:[{en:"You look amazing today!",ko:"오늘 엄청 멋져!",note:"look amazing = 멋져 보이다"},{en:"I love your vibe.",ko:"네 분위기 좋아.",note:"vibe = 분위기"},{en:"You nailed it!",ko:"완벽하게 해냈어!",note:"nailed it = 완벽 성공"}],sentences:[{en:"Hey, you look amazing today!",ko:"야, 오늘 엄청 멋져!",start:0,end:3},{en:"Seriously, I love your vibe.",ko:"진짜, 네 분위기 좋아.",start:3,end:6},{en:"That presentation? You totally nailed it!",ko:"그 프레젠테이션? 완전 완벽했어!",start:6,end:10},{en:"Keep it up, you're doing great!",ko:"계속 이렇게 해, 잘하고 있어!",start:10,end:14}]},
{id:"texting-slang",title:"Texting Slang 📱",videoId:"",duration:20,category:"slang",emoji:"📱",bg:"linear-gradient(135deg,#3498db22,#1abc9c22)",difficulty:"advanced",tags:["slang","comedy"],expressions:[{en:"BRB, be right back.",ko:"금방 올게.",note:"BRB = be right back"},{en:"That's lowkey the best.",ko:"은근히 최고야.",note:"lowkey = 은근히"},{en:"I'm literally dying.",ko:"진짜 죽을 것 같아.",note:"literally = (과장) 진짜로"}],sentences:[{en:"Hold on, BRB, be right back!",ko:"잠깐, 금방 올게!",start:0,end:3},{en:"That's lowkey the best thing I've seen today.",ko:"은근히 오늘 본 것 중 최고야.",start:3,end:7},{en:"I'm literally dying right now!",ko:"지금 진짜 죽을 것 같아!",start:7,end:10},{en:"Send me that, it's too good not to share.",ko:"그거 보내줘, 안 나누기엔 너무 좋아.",start:10,end:14}]}
];
const CATEGORIES=[{key:"all",label:"All"},{key:"interview",label:"🎤 Interview"},{key:"food",label:"🍕 Food"},{key:"travel",label:"✈️ Travel"},{key:"daily",label:"☕ Daily"},{key:"slang",label:"🔥 Slang"}];
let currentFilter='all',currentShorts=null,dubState={sentenceIdx:0,streak:0,blankLevel:1,recording:false,mediaRecorder:null,audioChunks:[],audioBlob:null,audioUrl:null},myroomTab='dubs';
const getSavedNotes=()=>{try{return JSON.parse(localStorage.getItem('sn')||'[]')}catch{return[]}};const setSavedNotes=a=>localStorage.setItem('sn',JSON.stringify(a));
const getSavedDubs=()=>{try{return JSON.parse(localStorage.getItem('sd')||'[]')}catch{return[]}};const setSavedDubs=a=>localStorage.setItem('sd',JSON.stringify(a));
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function navigate(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));if(p==='home'){document.getElementById('page-home').classList.add('active');document.getElementById('nav-home').classList.add('active')}else if(p==='myroom'){document.getElementById('page-myroom').classList.add('active');document.getElementById('nav-myroom').classList.add('active');renderMyRoom()}}
function goHome(){stopRecording();navigate('home')}
function renderChips(){document.getElementById('chip-bar').innerHTML=CATEGORIES.map(c=>`<button class="chip ${c.key===currentFilter?'active':''}" onclick="setFilter('${c.key}')">${c.label}</button>`).join('')}
function setFilter(k){currentFilter=k;renderChips();renderFeed()}
function renderFeed(){const f=document.getElementById('feed');const items=currentFilter==='all'?LIBRARY:LIBRARY.filter(s=>s.category===currentFilter||s.tags.includes(currentFilter));if(!items.length){f.innerHTML='<div class="feed-empty"><div class="fe-icon">🔍</div><p>콘텐츠 준비 중...</p></div>';return}f.innerHTML=items.map((item,i)=>`<div class="feed-card fade-up" style="animation-delay:${i*0.04}s" onclick="openLearn('${item.id}')"><div class="feed-thumb" style="background:${item.bg}">${item.emoji}<span class="f-dur">${item.duration}s</span></div><div class="feed-info"><div class="feed-title">${item.title}</div><div class="feed-meta"><span>${item.sentences.length}문장</span><span class="dot"></span><span class="feed-diff diff-${item.difficulty}">${item.difficulty}</span></div><div class="feed-tags">${item.tags.map(t=>`<span class="feed-tag">${t}</span>`).join('')}</div></div></div>`).join('')}
function openLearn(id){currentShorts=LIBRARY.find(s=>s.id===id);if(!currentShorts)return;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-learn').classList.add('active');document.getElementById('learn-vp-emoji').textContent=currentShorts.emoji;document.getElementById('learn-vp-title').textContent=currentShorts.title;const vc=document.getElementById('learn-video');if(currentShorts.videoId){vc.innerHTML=`<button class="back-btn" onclick="goHome()">←</button><iframe src="https://www.youtube.com/embed/${currentShorts.videoId}?playsinline=1&rel=0&modestbranding=1" allowfullscreen></iframe>`}document.getElementById('learn-sent-count').textContent=`${currentShorts.sentences.length}문장 · ${currentShorts.duration}초`;const sn=getSavedNotes();document.getElementById('learn-expressions').innerHTML=currentShorts.expressions.map((e,i)=>{const sv=sn.some(n=>n.en===e.en);return`<div class="expr-card fade-up" style="animation-delay:${i*0.06}s"><div style="flex:1"><div class="expr-en">${e.en}</div><div class="expr-ko">${e.ko}</div>${e.note?`<div class="expr-note">💡 ${e.note}</div>`:''}</div><div class="expr-actions"><button class="expr-btn" onclick="speakTTS('${e.en.replace(/'/g,"\\'")}')">🔊</button><button class="expr-btn ${sv?'saved':''}" onclick="toggleNote(this,'${e.en.replace(/'/g,"\\'")}','${e.ko.replace(/'/g,"\\'")}')">📌</button></div></div>`}).join('')}
function speakTTS(t){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u)}
function toggleNote(btn,en,ko){let n=getSavedNotes();const i=n.findIndex(x=>x.en===en);if(i>=0){n.splice(i,1);btn.classList.remove('saved');showToast('📌 삭제')}else{n.push({en,ko,savedAt:Date.now()});btn.classList.add('saved');showToast('📌 저장!')}setSavedNotes(n)}
function startDubbing(){if(!currentShorts)return;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-dub').classList.add('active');dubState={sentenceIdx:0,streak:0,blankLevel:1,recording:false,mediaRecorder:null,audioChunks:[],audioBlob:null,audioUrl:null};document.getElementById('dub-vp-emoji').textContent=currentShorts.emoji;document.getElementById('dub-vp-title').textContent=currentShorts.title;document.getElementById('dub-controls').style.display='flex';document.getElementById('dub-complete').classList.remove('show');document.getElementById('dub-overlay').style.display='block';showDubSentence();startRecording()}
function showDubSentence(){const s=currentShorts.sentences[dubState.sentenceIdx];if(!s)return;const w=s.en.split(' ');const bc=Math.min(dubState.blankLevel,Math.floor(w.length*0.6));const av=w.map((_,i)=>i);const idx=[];for(let i=0;i<bc;i++){if(!av.length)break;const p=Math.floor(Math.random()*av.length);idx.push(av[p]);av.splice(p,1)}document.getElementById('dub-subtitle').innerHTML=w.map((x,i)=>idx.includes(i)?'<span class="blank">&nbsp;</span>':x).join(' ');document.getElementById('dub-hint').textContent=document.getElementById('hint-check').checked?s.ko:'';document.getElementById('dub-stars').textContent='⭐'.repeat(Math.min(dubState.blankLevel,3));document.getElementById('dub-counter').textContent=`${dubState.sentenceIdx+1} / ${currentShorts.sentences.length}`}
function nextSentence(){dubState.streak++;if(dubState.streak>=3){dubState.blankLevel=Math.min(dubState.blankLevel+1,5);dubState.streak=0}dubState.sentenceIdx++;if(dubState.sentenceIdx>=currentShorts.sentences.length){finishDubbing();return}showDubSentence()}
function toggleHint(){if(!currentShorts)return;const s=currentShorts.sentences[dubState.sentenceIdx];document.getElementById('dub-hint').textContent=document.getElementById('hint-check').checked?(s?s.ko:''):''}
async function startRecording(){try{const st=await navigator.mediaDevices.getUserMedia({audio:true});dubState.mediaRecorder=new MediaRecorder(st);dubState.audioChunks=[];dubState.mediaRecorder.ondataavailable=e=>{if(e.data.size>0)dubState.audioChunks.push(e.data)};dubState.mediaRecorder.onstop=()=>{dubState.audioBlob=new Blob(dubState.audioChunks,{type:'audio/webm'});dubState.audioUrl=URL.createObjectURL(dubState.audioBlob);st.getTracks().forEach(t=>t.stop())};dubState.mediaRecorder.start();dubState.recording=true}catch(e){showToast('🎤 마이크 권한 필요')}}
function stopRecording(){if(dubState.mediaRecorder&&dubState.recording){try{dubState.mediaRecorder.stop()}catch(e){}dubState.recording=false}}
function finishDubbing(){stopRecording();document.getElementById('dub-controls').style.display='none';document.getElementById('dub-overlay').style.display='none';document.getElementById('dub-complete').classList.add('show');document.getElementById('dub-complete-info').textContent=`${currentShorts.title} — ${currentShorts.sentences.length}문장 완료!`}
function playbackDub(){if(dubState.audioUrl){new Audio(dubState.audioUrl).play();showToast('▶ 재생 중...')}else showToast('녹음 없음')}
function saveDub(){const d=getSavedDubs();d.unshift({id:currentShorts.id,title:currentShorts.title,emoji:currentShorts.emoji,sentences:currentShorts.sentences.length,savedAt:Date.now()});setSavedDubs(d);showToast('💾 저장!')}
function retryDub(){startDubbing()}
function switchMyroomTab(tab,el){myroomTab=tab;document.querySelectorAll('.myroom-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderMyRoom()}
function renderMyRoom(){const c=document.getElementById('myroom-content');if(myroomTab==='dubs'){const d=getSavedDubs();if(!d.length){c.innerHTML='<div class="myroom-empty"><div class="me-icon">🎬</div><p>저장된 더빙이 없어요<br>숏츠 더빙에 도전!</p></div>';return}c.innerHTML=d.map((x,i)=>`<div class="myroom-item fade-up" style="animation-delay:${i*0.05}s"><div class="mi-icon">${x.emoji}</div><div class="mi-info"><h4>${x.title}</h4><p>${x.sentences}문장 · ${new Date(x.savedAt).toLocaleDateString()}</p></div><div><button class="mi-btn" onclick="deleteDub(${i})">🗑</button></div></div>`).join('')}else{const n=getSavedNotes();if(!n.length){c.innerHTML='<div class="myroom-empty"><div class="me-icon">📝</div><p>저장된 표현이 없어요<br>📌으로 저장하세요!</p></div>';return}c.innerHTML=n.map((x,i)=>`<div class="myroom-item fade-up" style="animation-delay:${i*0.05}s"><div class="mi-icon">📝</div><div class="mi-info"><h4>${x.en}</h4><p>${x.ko}</p></div><div style="display:flex;gap:4px"><button class="mi-btn" onclick="speakTTS('${x.en.replace(/'/g,"\\'")}')">🔊</button><button class="mi-btn" onclick="deleteNote(${i})">🗑</button></div></div>`).join('')}}
function deleteDub(i){const d=getSavedDubs();d.splice(i,1);setSavedDubs(d);renderMyRoom();showToast('🗑 삭제')}
function deleteNote(i){const n=getSavedNotes();n.splice(i,1);setSavedNotes(n);renderMyRoom();showToast('🗑 삭제')}
renderChips();renderFeed();
</script>
</body>
</html>
