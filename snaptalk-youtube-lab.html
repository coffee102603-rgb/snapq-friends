<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--sf:#14141f;--sf2:#1e1e2e;--sf3:#282840;
  --bd:rgba(255,255,255,.07);--accent:#00e5a0;--accent-dim:rgba(0,229,160,.15);
  --accent2:#7c6bff;--warn:#ff6b6b;--gold:#ffc842;
  --tx:#f0f0f8;--tx2:#8888aa;--tx3:#555568;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none;color:inherit}

/* ── APP SHELL ── */
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ── HEADER ── */
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--bd);z-index:50;min-height:52px}
.logo{font-weight:900;font-size:20px;color:var(--accent);letter-spacing:-.5px}
.logo-badge{font-size:10px;background:var(--accent);color:var(--bg);padding:2px 8px;border-radius:20px;margin-left:8px;font-weight:700;vertical-align:middle}
.header-right{display:flex;gap:10px;align-items:center}
.lang-btn{font-size:13px;background:var(--sf2);padding:6px 12px;border-radius:20px;border:1px solid var(--bd);color:var(--tx2)}
.streak-badge{font-size:13px;background:linear-gradient(135deg,#ff6b35,#ffc842);color:#000;padding:4px 10px;border-radius:20px;font-weight:700}

/* ── CONTENT TABS ── */
#contentTabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px}
.ctab{flex:1;text-align:center;padding:10px 0;font-size:15px;font-weight:700;color:var(--tx3);border-bottom:3px solid transparent;transition:.2s}
.ctab.active{color:var(--tx);border-bottom-color:var(--accent)}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── FEED ── */
#feedScreen{overflow-y:auto;padding:12px 16px 80px;gap:14px}
.feed-card{background:var(--sf);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);transition:transform .15s}
.feed-card:active{transform:scale(.97)}
.card-thumb{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;position:relative}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.7))}
.card-diff{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;z-index:2}
.diff-beginner{background:#22c55e;color:#000}.diff-intermediate{background:#f59e0b;color:#000}.diff-advanced{background:#ef4444;color:#fff}
.card-cat{position:absolute;top:10px;right:10px;font-size:18px;z-index:2}
.card-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
.card-play-icon{width:48px;height:48px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.card-play-icon::after{content:'';border-left:16px solid #fff;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
.card-info{padding:12px 14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-meta{display:flex;gap:12px;font-size:12px;color:var(--tx2)}
.card-dub-count{color:var(--accent)}

/* ── PLAYER SCREEN ── */
#playerScreen{background:var(--bg);position:relative}
.player-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);z-index:50;min-height:44px}
.back-btn{font-size:22px;color:#fff;padding:4px}
.speed-ctrl{display:flex;gap:4px}
.speed-btn{font-size:12px;color:var(--tx2);background:rgba(255,255,255,.1);padding:4px 10px;border-radius:16px;font-weight:700}
.speed-btn.active{background:var(--accent);color:#000}
#ytContainer{width:100%;aspect-ratio:9/16;max-height:45vh;background:#111;position:relative;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1);z-index:20}
#ytContainer iframe{width:100%;height:115%;position:absolute;top:0;left:0}
#ytContainer.pip{position:absolute;top:52px;right:12px;width:120px;max-height:none;height:160px;aspect-ratio:auto;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.6);border:2px solid var(--bd);z-index:40}
#ytContainer.pip iframe{height:140%;top:-10%}
.step-mode-label{text-align:center;padding:6px 0;font-size:12px;font-weight:700;letter-spacing:.5px;transition:all .3s}
.step-mode-label.watch{color:var(--accent);background:var(--accent-dim)}
.step-mode-label.dub{color:var(--accent2);background:rgba(124,107,255,.12)}

/* ── DUBBING AREA ── */
#dubbingArea{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;transition:all .3s}
.dub-progress{display:flex;align-items:center;gap:8px;padding:12px 16px 0}
.dub-step{font-size:11px;font-weight:700;color:var(--tx3)}
.dub-step.active{color:var(--accent)}
.dub-step.done{color:var(--accent);opacity:.5}
.dub-bar-wrap{flex:1;height:4px;background:var(--sf2);border-radius:4px;overflow:hidden}
.dub-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}

/* sentence display */
.sentence-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px;gap:12px;text-align:center}
.sentence-original{font-size:13px;color:var(--tx2);line-height:1.5}
.sentence-main{font-size:22px;font-weight:800;line-height:1.4;min-height:70px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px}
.word{transition:.2s}
.word-blank{background:var(--sf2);color:transparent;border-radius:8px;padding:2px 12px;min-width:50px;text-align:center;border:2px dashed var(--tx3);cursor:pointer;user-select:none}
.word-blank.revealed{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);border-style:solid}
.word-visible{color:var(--tx)}

/* timer bar */
.timer-wrap{padding:0 20px 8px}
.timer-bar-bg{height:5px;background:var(--sf2);border-radius:5px;overflow:hidden}
.timer-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .1s linear}
.timer-bar.danger{background:linear-gradient(90deg,var(--warn),#ff9b6b)}

/* controls */
.dub-controls{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 16px 16px}
.mic-btn{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#00c488);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(0,229,160,.3);transition:transform .15s,box-shadow .15s}
.mic-btn:active{transform:scale(.9)}
.mic-btn.listening{animation:pulse-mic 1s ease infinite;box-shadow:0 0 30px rgba(0,229,160,.5)}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 20px rgba(0,229,160,.3)}50%{box-shadow:0 0 40px rgba(0,229,160,.6)}}
.hint-btn,.skip-btn{width:44px;height:44px;border-radius:50%;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--bd)}

/* ── SCORE SCREEN ── */
#scoreScreen{align-items:center;justify-content:center;padding:30px 24px;gap:20px;background:var(--bg)}
.score-title{font-size:24px;font-weight:900}
.score-ring{position:relative;width:160px;height:160px}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-bg{fill:none;stroke:var(--sf2);stroke-width:10}
.score-ring-fill{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
.score-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;color:var(--accent)}
.score-stars{display:flex;gap:8px;font-size:32px}
.score-detail{text-align:center;color:var(--tx2);font-size:14px;line-height:1.6}
.score-actions{display:flex;gap:12px;width:100%;max-width:300px}
.score-btn{flex:1;padding:14px;border-radius:var(--rs);font-weight:700;font-size:15px;text-align:center}
.score-btn-retry{background:var(--sf2);color:var(--tx)}
.score-btn-next{background:var(--accent);color:#000}
.auto-next-bar{width:100%;max-width:300px;height:4px;background:var(--sf2);border-radius:4px;overflow:hidden;margin-top:-8px}
.auto-next-fill{height:100%;background:var(--gold);border-radius:4px}
.auto-next-text{font-size:12px;color:var(--tx3)}

/* ── MY ROOM ── */
#roomScreen{overflow-y:auto;padding:20px 16px 80px}
.room-section{margin-bottom:24px}
.room-title{font-size:18px;font-weight:800;margin-bottom:12px}
.streak-card{background:linear-gradient(135deg,var(--sf),var(--sf2));border-radius:var(--r);padding:20px;border:1px solid var(--bd);text-align:center}
.streak-num{font-size:48px;font-weight:900;color:var(--gold)}
.streak-label{font-size:14px;color:var(--tx2);margin-top:4px}
.streak-badges{display:flex;gap:8px;justify-content:center;margin-top:12px}
.badge{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--sf3);color:var(--tx3)}
.badge.earned{background:var(--gold);color:#000;font-weight:700}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--sf);border-radius:var(--rs);padding:16px;border:1px solid var(--bd);text-align:center}
.stat-num{font-size:28px;font-weight:900;color:var(--accent)}
.stat-label{font-size:12px;color:var(--tx2);margin-top:4px}
.history-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--sf);border-radius:var(--rs);margin-bottom:8px;border:1px solid var(--bd)}
.history-score{font-size:18px;font-weight:800;color:var(--accent)}
.history-info{flex:1}
.history-title{font-size:13px;font-weight:600}
.history-date{font-size:11px;color:var(--tx3)}

/* ── BOTTOM NAV ── */
#bottomNav{display:flex;height:56px;min-height:56px;background:var(--sf);border-top:1px solid var(--bd);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--tx3);font-size:10px;font-weight:700;transition:.2s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}

/* ── LANGUAGE MODAL ── */
#langModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#langModal.show{display:flex}
.lang-modal-box{background:var(--sf);border-radius:var(--r);padding:24px;width:280px;text-align:center}
.lang-modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lang-option{padding:14px;border-radius:var(--rs);background:var(--sf2);border:2px solid transparent;font-size:14px;font-weight:700;transition:.2s}
.lang-option:hover,.lang-option.selected{border-color:var(--accent);background:var(--accent-dim)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.fade-up{animation:fadeUp .4s ease both}
.scale-in{animation:scaleIn .5s ease both}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div><span class="logo">SnapTalk</span><span class="logo-badge">Snap Dubbing</span></div>
    <div class="header-right">
      <div class="streak-badge" id="streakBadge">🔥 0일</div>
      <button class="lang-btn" id="langToggle">🇰🇷→🇺🇸</button>
    </div>
  </div>

  <!-- CONTENT TABS -->
  <div id="contentTabs">
    <button class="ctab active" data-tab="us">🇺🇸 English</button>
    <button class="ctab" data-tab="kr">🇰🇷 한국어</button>
  </div>

  <!-- FEED SCREEN -->
  <div class="screen active" id="feedScreen"></div>

  <!-- PLAYER SCREEN -->
  <div class="screen" id="playerScreen">
    <div class="player-top">
      <button class="back-btn" id="backBtn">←</button>
      <div class="speed-ctrl">
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn active" data-speed="1">1.0x</button>
        <button class="speed-btn" data-speed="1.2">1.2x</button>
      </div>
    </div>
    <div id="ytContainer"></div>
    <div class="step-mode-label watch" id="stepModeLabel">👀 표현 학습 — 영상을 보면서 표현을 익히세요</div>
    <div id="dubbingArea">
      <div class="dub-progress">
        <span class="dub-step active" id="stepLabel">1/4</span>
        <div class="dub-bar-wrap"><div class="dub-bar" id="dubBar"></div></div>
      </div>
      <div class="sentence-area">
        <div class="sentence-original" id="sentenceOriginal"></div>
        <div class="sentence-main" id="sentenceMain"></div>
      </div>
      <div class="timer-wrap"><div class="timer-bar-bg"><div class="timer-bar" id="timerBar"></div></div></div>
      <div class="dub-controls">
        <button class="hint-btn" id="hintBtn" title="힌트">💡</button>
        <button class="mic-btn" id="micBtn">🎤</button>
        <button class="skip-btn" id="skipBtn" title="다음">⏭</button>
      </div>
    </div>
  </div>

  <!-- SCORE SCREEN -->
  <div class="screen" id="scoreScreen">
    <div class="score-title scale-in">더빙 완료! 🎉</div>
    <div class="score-ring scale-in">
      <svg viewBox="0 0 180 180" width="160" height="160">
        <circle class="score-ring-bg" cx="90" cy="90" r="80"/>
        <circle class="score-ring-fill" id="scoreRing" cx="90" cy="90" r="80" stroke-dasharray="502" stroke-dashoffset="502"/>
      </svg>
      <div class="score-number" id="scoreNumber">0</div>
    </div>
    <div class="score-stars" id="scoreStars"></div>
    <div class="score-detail" id="scoreDetail"></div>
    <div class="auto-next-bar"><div class="auto-next-fill" id="autoNextFill"></div></div>
    <div class="auto-next-text" id="autoNextText"></div>
    <div class="score-actions">
      <button class="score-btn score-btn-retry" id="retryBtn">🔄 다시하기</button>
      <button class="score-btn score-btn-next" id="nextBtn">다음 숏츠 →</button>
    </div>
  </div>

  <!-- MY ROOM -->
  <div class="screen" id="roomScreen">
    <div class="room-section">
      <div class="room-title">🔥 나의 스트릭</div>
      <div class="streak-card">
        <div class="streak-num" id="roomStreak">0</div>
        <div class="streak-label">연속 더빙일</div>
        <div class="streak-badges">
          <span class="badge" data-day="7">7일</span>
          <span class="badge" data-day="30">30일</span>
          <span class="badge" data-day="100">100일</span>
        </div>
      </div>
    </div>
    <div class="room-section">
      <div class="room-title">📊 통계</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="totalDubs">0</div><div class="stat-label">총 더빙</div></div>
        <div class="stat-card"><div class="stat-num" id="avgScore">0</div><div class="stat-label">평균 점수</div></div>
      </div>
    </div>
    <div class="room-section">
      <div class="room-title">📝 최근 더빙</div>
      <div id="historyList"><div style="color:var(--tx3);font-size:13px;padding:12px">아직 더빙 기록이 없어요. 시작해볼까요?</div></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <button class="nav-btn active" data-screen="feed"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-btn" data-screen="room"><span class="nav-icon">📁</span>나의 방</button>
  </div>
</div>

<!-- LANGUAGE MODAL -->
<div id="langModal">
  <div class="lang-modal-box">
    <div class="lang-modal-title">UI 언어 선택</div>
    <div class="lang-grid">
      <button class="lang-option selected" data-lang="ko">🇰🇷 한국어</button>
      <button class="lang-option" data-lang="en">🇺🇸 English</button>
      <button class="lang-option" data-lang="ja">🇯🇵 日本語</button>
      <button class="lang-option" data-lang="zh">🇨🇳 中文</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  SNAPTALK SNAP DUBBING — PHASE 1 ENGINE
// ═══════════════════════════════════════════

// ── CONTENT DATABASE ──
const SHORTS = {
  us: [
    {
      id:'4O6qj9JWNzE', title:'NYC Street Interview', cat:'interview', catIcon:'🎤',
      diff:'beginner', dubs:1247,
      sentences:[
        {en:"What do you do for a living?", ko:"직업이 뭐예요?"},
        {en:"I work in finance downtown.", ko:"저는 다운타운에서 금융 일해요."},
        {en:"Do you like living in New York?", ko:"뉴욕에 사는 거 좋아요?"},
        {en:"I love it, there is always something happening.", ko:"좋아요, 항상 뭔가 일어나거든요."}
      ]
    },
    {
      id:'ikYVBHLSOpY', title:'Dollar Pizza in NYC', cat:'food', catIcon:'🍕',
      diff:'beginner', dubs:2341,
      sentences:[
        {en:"This is the best dollar pizza in New York.", ko:"이게 뉴욕 최고의 1달러 피자야."},
        {en:"Look at that cheese pull.", ko:"저 치즈 늘어나는 거 봐."},
        {en:"You cannot beat this for one dollar.", ko:"1달러에 이건 못 이겨."},
        {en:"I could eat this every single day.", ko:"매일 먹을 수 있어."}
      ]
    },
    {
      id:'dQw4w9WgXcQ', title:'Morning Routine Talk', cat:'daily', catIcon:'☀️',
      diff:'intermediate', dubs:856,
      sentences:[
        {en:"I usually wake up around six thirty.", ko:"보통 6시 반에 일어나요."},
        {en:"First thing I do is make coffee.", ko:"제일 먼저 커피를 내려요."},
        {en:"Then I go for a quick morning jog.", ko:"그다음 가볍게 조깅을 해요."},
        {en:"It helps me stay focused all day.", ko:"하루 종일 집중하는 데 도움이 돼요."}
      ]
    }
  ],
  kr: [
    {
      id:'hPM29so2mMc', title:'한국 편의점 먹방', cat:'food', catIcon:'🍜',
      diff:'beginner', dubs:1893,
      sentences:[
        {en:"This is a Korean convenience store.", ko:"여기는 한국 편의점이에요."},
        {en:"Let me try this spicy ramen.", ko:"이 매운 라면 먹어볼게요."},
        {en:"Oh wow, it is really spicy!", ko:"와, 진짜 매워요!"},
        {en:"But it tastes so good.", ko:"근데 진짜 맛있어요."}
      ]
    },
    {
      id:'NXivkUHQpXw', title:'K-pop Dance Challenge', cat:'kpop', catIcon:'💃',
      diff:'intermediate', dubs:3102,
      sentences:[
        {en:"Today we are learning this dance.", ko:"오늘 이 춤을 배울 거예요."},
        {en:"Follow my moves step by step.", ko:"제 동작을 따라 해보세요."},
        {en:"The chorus part is the hardest.", ko:"후렴 부분이 제일 어려워요."},
        {en:"You did amazing, great job!", ko:"대단해요, 잘했어요!"}
      ]
    }
  ]
};

// ── STATE ──
let currentTab = 'us';
let currentShort = null;
let currentStep = 0;
let score = 0;
let hintPenalty = 0;
let timerInterval = null;
let timerLeft = 0;
const TIMER_TOTAL = 6;
let ytPlayer = null;
let playbackRate = 1;
let isListening = false;
let audioCtx = null;
let analyser = null;
let micStream = null;
let autoNextTimer = null;

// ── LOCALSTORAGE HELPERS ──
function getStore(key, def){ try{ return JSON.parse(localStorage.getItem('st_'+key)) || def; }catch(e){ return def; } }
function setStore(key, val){ localStorage.setItem('st_'+key, JSON.stringify(val)); }

// ── STREAK ──
function getStreak(){
  const s = getStore('streak',{count:0,last:null});
  const today = new Date().toDateString();
  if(s.last){
    const lastD = new Date(s.last);
    const diff = Math.floor((new Date(today)-lastD)/(1000*60*60*24));
    if(diff>1) s.count=0;
  }
  return s;
}
function updateStreak(){
  const s = getStreak();
  const today = new Date().toDateString();
  if(s.last !== today){
    s.count++;
    s.last = today;
    setStore('streak', s);
  }
  renderStreak();
}
function renderStreak(){
  const s = getStreak();
  document.getElementById('streakBadge').textContent = '🔥 '+s.count+'일';
  document.getElementById('roomStreak').textContent = s.count;
  document.querySelectorAll('.streak-badges .badge').forEach(b=>{
    if(s.count >= parseInt(b.dataset.day)) b.classList.add('earned');
    else b.classList.remove('earned');
  });
}

// ── INTEREST SCORING ──
function getInterest(){ return getStore('interest',{}); }
function addInterest(cat, type){
  const i = getInterest();
  if(!i[cat]) i[cat]={view:0,dub:0,save:0,skip:0};
  if(type==='view') i[cat].view++;
  if(type==='dub') i[cat].dub += 5;
  if(type==='skip') i[cat].skip++;
  setStore('interest', i);
}
function scoreFeed(shorts){
  const i = getInterest();
  return [...shorts].sort((a,b)=>{
    const sa = i[a.cat] ? (i[a.cat].view + i[a.cat].dub - i[a.cat].skip) : 0;
    const sb = i[b.cat] ? (i[b.cat].view + i[b.cat].dub - i[b.cat].skip) : 0;
    return sb - sa;
  });
}

// ── HISTORY ──
function addHistory(short, sc){
  const h = getStore('history',[]);
  h.unshift({title:short.title, score:sc, date:new Date().toISOString()});
  if(h.length>20) h.pop();
  setStore('history', h);
  const stats = getStore('stats',{total:0,sumScore:0});
  stats.total++;
  stats.sumScore += sc;
  setStore('stats', stats);
}

// ── RENDER FEED ──
function renderFeed(){
  const feed = document.getElementById('feedScreen');
  const shorts = scoreFeed(SHORTS[currentTab] || []);
  // Insert discovery every 5th
  feed.innerHTML = '';
  shorts.forEach((s, idx)=>{
    const thumb = `https://img.youtube.com/vi/${s.id}/mqdefault.jpg`;
    const diffClass = 'diff-'+s.diff;
    const diffLabel = s.diff === 'beginner' ? 'Beginner' : s.diff === 'intermediate' ? 'Intermediate' : 'Advanced';
    const card = document.createElement('div');
    card.className = 'feed-card fade-up';
    card.style.animationDelay = (idx*0.06)+'s';
    card.innerHTML = `
      <div class="card-thumb" style="background-image:url('${thumb}')">
        <span class="card-diff ${diffClass}">${diffLabel}</span>
        <span class="card-cat">${s.catIcon}</span>
        <div class="card-play"><div class="card-play-icon"></div></div>
      </div>
      <div class="card-info">
        <div class="card-title">${s.title}</div>
        <div class="card-meta">
          <span>${s.sentences.length} 문장</span>
          <span class="card-dub-count">🎤 ${s.dubs.toLocaleString()}명 더빙</span>
        </div>
      </div>`;
    card.addEventListener('click', ()=> startPlayer(s));
    feed.appendChild(card);
  });
}

// ── TAB SWITCHING ──
document.querySelectorAll('.ctab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;

// ── SCREEN SWITCHING ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id+'Screen').classList.add('active');
  const tabs = document.getElementById('contentTabs');
  tabs.style.display = (id==='feed') ? 'flex' : 'none';
}

// ── NAV ──
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const screen = btn.dataset.screen;
    if(screen==='feed') showScreen('feed');
    if(screen==='room'){ renderRoom(); showScreen('room'); }
    stopPlayer();
  });
});

// ── MY ROOM ──
function renderRoom(){
  renderStreak();
  const stats = getStore('stats',{total:0,sumScore:0});
  document.getElementById('totalDubs').textContent = stats.total;
  document.getElementById('avgScore').textContent = stats.total ? Math.round(stats.sumScore/stats.total) : 0;
  const h = getStore('history',[]);
  const list = document.getElementById('historyList');
  if(h.length===0){ list.innerHTML = '<div style="color:var(--tx3);font-size:13px;padding:12px">아직 더빙 기록이 없어요!</div>'; return; }
  list.innerHTML = h.slice(0,10).map(item=>{
    const d = new Date(item.date);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="history-item"><div class="history-score">${item.score}</div><div class="history-info"><div class="history-title">${item.title}</div><div class="history-date">${ds}</div></div></div>`;
  }).join('');
}

// ── YOUTUBE PLAYER ──
let ytReady = false;
function loadYTAPI(){
  if(window.YT && window.YT.Player){ ytReady=true; return; }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}
window.onYouTubeIframeAPIReady = ()=>{ ytReady = true; };

function createPlayer(videoId){
  document.getElementById('ytContainer').innerHTML = '<div id="ytPlayer"></div>';
  ytPlayer = new YT.Player('ytPlayer',{
    videoId: videoId,
    playerVars:{autoplay:1, controls:0, modestbranding:1, rel:0, playsinline:1, fs:0, cc_load_policy:0, iv_load_policy:3, hl:'en', cc_lang_pref:'off'},
    events:{
      onReady:(e)=>{ e.target.setPlaybackRate(playbackRate); e.target.playVideo(); try{ e.target.unloadModule('captions'); e.target.unloadModule('cc'); }catch(ex){} },
      onStateChange:(e)=>{ if(e.data===YT.PlayerState.ENDED) { /* video ended */ } }
    }
  });
}
function stopPlayer(){
  if(ytPlayer && ytPlayer.destroy){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer=null; }
  stopTimer();
  stopMic();
  if(autoNextTimer){ clearInterval(autoNextTimer); autoNextTimer=null; }
}

// ── START PLAYER ──
function startPlayer(short){
  currentShort = short;
  currentStep = 0;
  score = 100;
  hintPenalty = 0;
  addInterest(short.cat, 'view');
  showScreen('player');
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('ytContainer').classList.remove('pip');
  createPlayer(short.id);
  // Wait a moment for video, then start dubbing
  setTimeout(()=>{ renderSentence(); }, 2000);
}

// ── RENDER SENTENCE (Progressive Blanks) ──
function renderSentence(){
  if(currentStep >= currentShort.sentences.length){
    finishDubbing();
    return;
  }
  const s = currentShort.sentences[currentStep];
  const total = currentShort.sentences.length;

  // Update progress
  document.getElementById('stepLabel').textContent = `${currentStep+1}/${total}`;
  document.getElementById('dubBar').style.width = ((currentStep+1)/total*100)+'%';

  // ── PIP MODE TOGGLE ──
  const ytEl = document.getElementById('ytContainer');
  const modeLabel = document.getElementById('stepModeLabel');
  if(currentStep === 0){
    // Step 1: Full video — watch & learn expressions
    ytEl.classList.remove('pip');
    modeLabel.className = 'step-mode-label watch';
    modeLabel.textContent = '👀 표현 학습 — 영상을 보면서 표현을 익히세요';
  } else {
    // Step 2+: PIP — focus on dubbing blanks
    ytEl.classList.add('pip');
    modeLabel.className = 'step-mode-label dub';
    modeLabel.textContent = '🎤 더빙 모드 — 듣고 빈칸을 채워보세요';
  }

  // Show original (translation)
  document.getElementById('sentenceOriginal').textContent = s.ko;

  // Progressive blanks based on step
  const words = s.en.split(' ');
  const blankRatio = [0, 0.3, 0.5, 0.8][Math.min(currentStep, 3)];
  const blankCount = Math.round(words.length * blankRatio);

  // Pick random words to blank
  let blankIndices = [];
  if(blankCount > 0){
    const indices = words.map((_,i)=>i);
    // Shuffle
    for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
    blankIndices = indices.slice(0, blankCount);
  }

  const main = document.getElementById('sentenceMain');
  main.innerHTML = '';
  words.forEach((w, i)=>{
    const span = document.createElement('span');
    if(blankIndices.includes(i)){
      span.className = 'word word-blank';
      span.textContent = w;
      span.dataset.word = w;
      span.addEventListener('click', ()=> revealHint(span));
    } else {
      span.className = 'word word-visible';
      span.textContent = w;
    }
    main.appendChild(span);
  });

  // TTS
  speakSentence(s.en);

  // Start timer
  startTimer();
}

// ── TTS ──
function speakSentence(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = playbackRate;
  // Galaxy fix: keep short
  u.volume = 1;
  window.speechSynthesis.speak(u);
  // Galaxy 15s bug workaround
  let keepAlive = setInterval(()=>{
    if(!window.speechSynthesis.speaking){ clearInterval(keepAlive); return; }
    window.speechSynthesis.pause();
    window.speechSynthesis.resume();
  }, 10000);
}

// ── HINT ──
function revealHint(span){
  if(span.classList.contains('revealed')) return;
  span.classList.add('revealed');
  span.style.color = 'var(--accent)';
  hintPenalty += 15;
}

document.getElementById('hintBtn').addEventListener('click', ()=>{
  const blanks = document.querySelectorAll('.word-blank:not(.revealed)');
  if(blanks.length > 0) revealHint(blanks[0]);
});

// ── TIMER ──
function startTimer(){
  stopTimer();
  timerLeft = TIMER_TOTAL;
  const bar = document.getElementById('timerBar');
  bar.style.width = '100%';
  bar.classList.remove('danger');
  timerInterval = setInterval(()=>{
    timerLeft -= 0.1;
    const pct = Math.max(0, timerLeft/TIMER_TOTAL*100);
    bar.style.width = pct+'%';
    if(timerLeft <= 2) bar.classList.add('danger');
    if(timerLeft <= 0){
      stopTimer();
      nextSentence();
    }
  }, 100);
}
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
}

// ── MIC (Voice Detection) ──
document.getElementById('micBtn').addEventListener('click', toggleMic);

function toggleMic(){
  if(isListening) stopMic();
  else startMic();
}
async function startMic(){
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    detectVoice();
  }catch(e){
    console.log('Mic error:', e);
  }
}
function stopMic(){
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  if(audioCtx){ audioCtx.close(); audioCtx=null; }
}
function detectVoice(){
  if(!isListening || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b)=>a+b,0)/data.length;
  // Voice threshold
  if(avg > 30){
    // User is speaking — add small bonus
    score = Math.min(100, score + 0.5);
  }
  requestAnimationFrame(detectVoice);
}

// ── NEXT SENTENCE ──
function nextSentence(){
  // Calculate step score deductions
  const blanks = document.querySelectorAll('.word-blank');
  const revealed = document.querySelectorAll('.word-blank.revealed');
  // Deduct for unrevealed blanks (missed) and hints
  const missed = blanks.length - revealed.length;
  // No extra deduction for missed since they attempted
  currentStep++;
  renderSentence();
}

document.getElementById('skipBtn').addEventListener('click', ()=>{
  score = Math.max(0, score - 10);
  addInterest(currentShort.cat, 'skip');
  currentStep++;
  renderSentence();
});

// ── FINISH DUBBING ──
function finishDubbing(){
  stopTimer();
  stopMic();
  if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();

  const finalScore = Math.max(0, Math.round(score - hintPenalty));
  updateStreak();
  addInterest(currentShort.cat, 'dub');
  addHistory(currentShort, finalScore);

  showScreen('score');
  document.getElementById('bottomNav').style.display = 'none';

  // Animate score ring
  const ring = document.getElementById('scoreRing');
  const circumference = 2 * Math.PI * 80; // ~502
  setTimeout(()=>{
    ring.style.strokeDashoffset = circumference - (circumference * finalScore / 100);
  }, 200);

  // Score number count up
  let count = 0;
  const numEl = document.getElementById('scoreNumber');
  const countUp = setInterval(()=>{
    count += 2;
    if(count >= finalScore){ count = finalScore; clearInterval(countUp); }
    numEl.textContent = count;
  }, 20);

  // Stars
  const stars = finalScore >= 90 ? '⭐⭐⭐' : finalScore >= 70 ? '⭐⭐' : '⭐';
  document.getElementById('scoreStars').textContent = stars;

  // Detail
  document.getElementById('scoreDetail').innerHTML =
    `${currentShort.sentences.length}문장 완료<br>힌트 사용: -${hintPenalty}점`;

  // Auto-next countdown (3 seconds)
  let autoCount = 3;
  const fill = document.getElementById('autoNextFill');
  const txt = document.getElementById('autoNextText');
  fill.style.width = '0%';
  txt.textContent = `다음 숏츠까지 ${autoCount}초`;
  autoNextTimer = setInterval(()=>{
    autoCount--;
    const pct = ((3 - autoCount) / 3 * 100);
    fill.style.width = pct + '%';
    txt.textContent = autoCount > 0 ? `다음 숏츠까지 ${autoCount}초` : '';
    if(autoCount <= 0){
      clearInterval(autoNextTimer);
      autoNextTimer = null;
      playNext();
    }
  }, 1000);
}

// ── PLAY NEXT ──
function playNext(){
  if(autoNextTimer){ clearInterval(autoNextTimer); autoNextTimer=null; }
  const list = SHORTS[currentTab];
  const idx = list.indexOf(currentShort);
  const next = list[(idx + 1) % list.length];
  startPlayer(next);
}

// ── SCORE BUTTONS ──
document.getElementById('retryBtn').addEventListener('click', ()=>{
  if(autoNextTimer){ clearInterval(autoNextTimer); autoNextTimer=null; }
  startPlayer(currentShort);
});
document.getElementById('nextBtn').addEventListener('click', playNext);

// ── BACK BUTTON ──
document.getElementById('backBtn').addEventListener('click', ()=>{
  stopPlayer();
  document.getElementById('bottomNav').style.display = 'flex';
  showScreen('feed');
});

document.querySelectorAll('.speed-btn').forEach(btn=>{

    btn.classList.add('active');

    if(ytPlayer && ytPlayer.setPlaybackRate) ytPlayer.setPlaybackRate(playbackRate);

document.getElementById('langToggle').addEventListener('click',()=>{

});
document.getElementById('langModal').addEventListener('click',(e)=>{

    opt.classList.add('selected');

  });

// ── INIT ──
loadYTAPI();
renderStreak();
renderFeed();
</script>
