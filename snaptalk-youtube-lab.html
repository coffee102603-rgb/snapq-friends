{id:"v9",title:"NYC Morning Routine ☀️",vid:"",dur:40,cat:"daily",emo:"☀️",diff:"intermediate",tags:["daily","narration"],ex:[{en:"First things first, I need my coffee.",ko:"커피 먼저.",nt:"first things first"},{en:"I'm running a bit late.",ko:"좀 늦었어.",nt:"running late"},{en:"Let's get this day started!",ko:"시작하자!",nt:"get started"}],sn:[{en:"Good morning everyone! It's 7 AM in New York.",ko:"좋은 아침! 뉴욕 7시.",s:0,e:5},{en:"First things first, I need my coffee.",ko:"커피부터.",s:5,e:9},{en:"Okay, I'm running a bit late today.",ko:"오늘 좀 늦었어.",s:9,e:13},{en:"Quick shower, get dressed, out the door.",ko:"샤워, 옷, 출발.",s:13,e:18},{en:"Let's get this day started!",ko:"시작하자!",s:18,e:22}]},
{id:"v10",title:"Gen Z Slang 🔥",vid:"",dur:25,cat:"slang",emo:"🔥",diff:"advanced",tags:["slang","comedy"],ex:[{en:"That's fire!",ko:"대박!",nt:"fire"},{en:"No cap.",ko:"진짜야.",nt:"no cap"},{en:"It hits different.",ko:"느낌 다르다.",nt:"hits different"}],sn:[{en:"Yo, this outfit is fire!",ko:"이 옷 대박!",s:0,e:3},{en:"No cap, this is the best I've ever had.",ko:"진짜 최고.",s:3,e:7},{en:"Late night pizza just hits different.",ko:"밤 피자는 느낌 달라.",s:7,e:11},{en:"I'm dead, that was so funny!",ko:"죽겠어!",s:11,e:14}]},
{id:"v11",title:"How to Compliment 💬",vid:"",dur:25,cat:"slang",emo:"💬",diff:"intermediate",tags:["slang","daily"],ex:[{en:"You look amazing today!",ko:"오늘 멋져!",nt:"look amazing"},{en:"I love your vibe.",ko:"분위기 좋아.",nt:"vibe"},{en:"You nailed it!",ko:"완벽해!",nt:"nailed it"}],sn:[{en:"Hey, you look amazing today!",ko:"오늘 멋져!",s:0,e:3},{en:"Seriously, I love your vibe.",ko:"분위기 좋아.",s:3,e:6},{en:"That presentation? You totally nailed it!",ko:"완전 완벽했어!",s:6,e:10},{en:"Keep it up, you're doing great!",ko:"잘하고 있어!",s:10,e:14}]}
];
const CATS=[{k:"all",lb:"All",emo:"⚡",cls:"cat-all"},{k:"interview",lb:"Interview",emo:"🎤",cls:"cat-interview"},{k:"food",lb:"Food",emo:"🍕",cls:"cat-food"},{k:"travel",lb:"Travel",emo:"✈️",cls:"cat-travel"},{k:"daily",lb:"Daily",emo:"☕",cls:"cat-daily"},{k:"slang",lb:"Slang",emo:"🔥",cls:"cat-slang"}];
let cf='all',cs=null,spIdx=0,ds={si:0,sk:0,bl:1,rec:false,mr:null,ac:[],ab:null,au:null},mrt='d';
const gN=()=>{try{return JSON.parse(localStorage.getItem('sn')||'[]')}catch{return[]}};const sN=a=>localStorage.setItem('sn',JSON.stringify(a));
const gD=()=>{try{return JSON.parse(localStorage.getItem('sd')||'[]')}catch{return[]}};const sD=a=>localStorage.setItem('sd',JSON.stringify(a));
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2000)}
function showP(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}
function nav(p){document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));if(p==='home'){showP('p-home');document.getElementById('nh').classList.add('on')}else{showP('p-mr');document.getElementById('nm').classList.add('on');rMR()}}
function goH(){sRec();nav('home')}

/* HOME */
function rCats(){document.getElementById('cats').innerHTML=CATS.map(c=>`<button class="cat ${c.k===cf?c.cls:'cat-off'}" onclick="actA();sF('${c.k}')"><i class="ce">${c.emo}</i>${c.lb}</button>`).join('')}
function sF(k){cf=k;rCats();rFeed()}
function rFeed(){const f=document.getElementById('feed');const items=cf==='all'?L:L.filter(s=>s.cat===cf||s.tags.includes(cf));if(!items.length){f.innerHTML='<div class="me"><i>🔍</i><p>준비 중...</p></div>';return}
f.innerHTML=items.map((x,i)=>{const hV=!!x.vid;const th=hV?`<img src="https://img.youtube.com/vi/${x.vid}/hqdefault.jpg" alt="" onerror="this.style.display='none'">`:'';const dc=x.diff==='beginner'?'d-b':x.diff==='intermediate'?'d-i':'d-a';
return`<div class="fc fu" style="animation-delay:${i*.05}s" onclick="actA();oL('${x.id}')"><div class="fc-thumb"${hV?'':' style="background:linear-gradient(135deg,#1a1a3e,#2a1a3e)"'}>${th}<span class="fc-emo"${hV?' style="display:none"':''}>${x.emo}</span><div class="fc-grad"></div><span class="fc-dur">${x.dur}s</span><div class="fc-play"></div></div><div class="fc-info"><div class="fc-title">${x.title}</div><div class="fc-row"><span class="fc-meta">${x.sn.length}문장</span><span class="fc-diff ${dc}">${x.diff}</span></div><div class="fc-tags">${x.tags.map(t=>`<span class="fc-tag">${t}</span>`).join('')}</div></div></div>`}).join('')}

/* LEARN - Step 1 */
function oL(id){cs=L.find(s=>s.id===id);if(!cs)return;showP('p-learn');
const vc=document.getElementById('lv');vc.innerHTML=cs.vid?`<button class="bb" onclick="goH()">←</button><iframe src="https://www.youtube.com/embed/${cs.vid}?playsinline=1&rel=0&modestbranding=1&loop=1&playlist=${cs.vid}" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`:`<button class="bb" onclick="goH()">←</button><div class="vp"><div class="ve">${cs.emo}</div><div class="vt">${cs.title}</div><div class="vs">영상 준비 중</div></div>`;
document.getElementById('lsc').textContent=`${cs.sn.length}문장 · ${cs.dur}초`;
const sn=gN();document.getElementById('lex').innerHTML=cs.ex.map((e,i)=>{const sv=sn.some(n=>n.en===e.en);return`<div class="ec fu" style="animation-delay:${i*.06}s"><div style="flex:1"><div class="een">${e.en}</div><div class="eko">${e.ko}</div>${e.nt?`<div class="eno">💡 ${e.nt}</div>`:''}</div><div class="ea"><button class="eb" onclick="tts('${e.en.replace(/'/g,"\\'")}')">🔊</button><button class="eb ${sv?'sv':''}" onclick="tN(this,'${e.en.replace(/'/g,"\\'")}','${e.ko.replace(/'/g,"\\'")}')">📌</button></div></div>`}).join('')}
function goL(){if(cs)oL(cs.id)}
function tN(b,en,ko){let n=gN();const i=n.findIndex(x=>x.en===en);if(i>=0){n.splice(i,1);b.classList.remove('sv');toast('📌 삭제')}else{n.push({en,ko,t:Date.now()});b.classList.add('sv');toast('📌 저장!')}sN(n)}

/* SCRIPT PRACTICE - Step 2 */
function goSP(){if(!cs)return;spIdx=0;showP('p-sp');
const vc=document.getElementById('spv');vc.innerHTML=cs.vid?`<button class="bb" onclick="goL()">←</button><iframe src="https://www.youtube.com/embed/${cs.vid}?playsinline=1&rel=0&modestbranding=1" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`:`<button class="bb" onclick="goL()">←</button><div class="vp"><div class="ve">${cs.emo}</div><div class="vt">${cs.title}</div></div>`;
renderSP()}

function renderSP(){const ctrl=document.getElementById('spCtrl');const s=cs.sn[spIdx];if(!s){ctrl.innerHTML=`<div class="sp-done"><div style="font-size:40px;margin-bottom:12px">✅</div><h3 style="font-size:18px;font-weight:800;margin-bottom:6px">스크립트 연습 완료!</h3><p style="font-size:13px;color:var(--dim);margin-bottom:16px">${cs.sn.length}문장 모두 들었어요</p><button class="big-btn btn-accent" onclick="goD()">🎬 Step 3: 더빙 시작!</button></div>`;return}
ctrl.innerHTML=`
<div class="sp-counter"><b>${spIdx+1}</b> / ${cs.sn.length} 문장</div>
<button class="sp-btn" onclick="tts('${s.en.replace(/'/g,"\\'")}')"><i>🔄</i>다시 듣기</button>
<button class="sp-btn" onclick="togR('en${spIdx}')"><i>👀</i>영어 스크립트 보기</button>
<div class="sp-reveal" id="en${spIdx}"><div class="sp-en">${s.en}</div></div>
<button class="sp-btn" onclick="togR('ko${spIdx}')"><i>🇰🇷</i>한국어 해석 보기</button>
<div class="sp-reveal" id="ko${spIdx}"><div class="sp-ko">${s.ko}</div></div>
<button class="sp-next" onclick="nxSP()">➡️ 다음 문장</button>`;
tts(s.en)}

function togR(id){document.getElementById(id).classList.toggle('open')}
function nxSP(){spIdx++;renderSP()}

/* DUB - Step 3 */
function goD(){if(!cs)return;showP('p-dub');ds={si:0,sk:0,bl:1,rec:false,mr:null,ac:[],ab:null,au:null};
const dv=document.getElementById('dv');dv.innerHTML=cs.vid?`<iframe src="https://www.youtube.com/embed/${cs.vid}?playsinline=1&rel=0&modestbranding=1&mute=1&autoplay=1&loop=1&playlist=${cs.vid}" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0"></iframe><div class="dso" id="dso"><div class="dst" id="dsub"></div><div class="dkh" id="dhint"></div></div>`:`<div class="vp"><div class="ve">${cs.emo}</div><div class="vt">${cs.title}</div></div><div class="dso" id="dso"><div class="dst" id="dsub"></div><div class="dkh" id="dhint"></div></div>`;
document.getElementById('dctl').style.display='flex';document.getElementById('dcmp').classList.remove('sh');shS();stRec()}
function shS(){const s=cs.sn[ds.si];if(!s)return;const w=s.en.split(' ');const bc=Math.min(ds.bl,Math.floor(w.length*.6));const av=w.map((_,i)=>i);const idx=[];for(let i=0;i<bc;i++){if(!av.length)break;const p=Math.floor(Math.random()*av.length);idx.push(av[p]);av.splice(p,1)}
document.getElementById('dsub').innerHTML=w.map((x,i)=>idx.includes(i)?'<span class="bl">&nbsp;</span>':x).join(' ');document.getElementById('dhint').textContent=document.getElementById('hck').checked?s.ko:'';document.getElementById('dstar').textContent='⭐'.repeat(Math.min(ds.bl,3));document.getElementById('dcnt').textContent=`${ds.si+1} / ${cs.sn.length}`}
function nxS(){ds.sk++;if(ds.sk>=3){ds.bl=Math.min(ds.bl+1,5);ds.sk=0}ds.si++;if(ds.si>=cs.sn.length){fnD();return}shS()}
function tH(){if(!cs)return;const s=cs.sn[ds.si];document.getElementById('dhint').textContent=document.getElementById('hck').checked?(s?s.ko:''):''}
async function stRec(){try{const st=await navigator.mediaDevices.getUserMedia({audio:true});ds.mr=new MediaRecorder(st);ds.ac=[];ds.mr.ondataavailable=e=>{if(e.data.size>0)ds.ac.push(e.data)};ds.mr.onstop=()=>{ds.ab=new Blob(ds.ac,{type:'audio/webm'});ds.au=URL.createObjectURL(ds.ab);st.getTracks().forEach(t=>t.stop())};ds.mr.start();ds.rec=true}catch(e){toast('🎤 마이크 권한 필요')}}
function sRec(){if(ds.mr&&ds.rec){try{ds.mr.stop()}catch(e){}ds.rec=false}}
function fnD(){sRec();document.getElementById('dctl').style.display='none';const o=document.getElementById('dso');if(o)o.style.display='none';document.getElementById('dcmp').classList.add('sh');document.getElementById('dcmi').textContent=`${cs.title} — ${cs.sn.length}문장 완료!`}
function pbD(){if(ds.au){new Audio(ds.au).play();toast('▶ 재생 중...')}else toast('녹음 없음')}
function svD(){const d=gD();d.unshift({id:cs.id,title:cs.title,emo:cs.emo,sn:cs.sn.length,t:Date.now()});sD(d);toast('💾 저장!')}
function smr(tab,el){mrt=tab;document.querySelectorAll('.mt').forEach(t=>t.classList.remove('on'));el.classList.add('on');rMR()}
function rMR(){const c=document.getElementById('mrc');if(mrt==='d'){const d=gD();if(!d.length){c.innerHTML='<div class="me"><i>🎬</i><p>더빙 없어요<br>도전!</p></div>';return}c.innerHTML=d.map((x,i)=>`<div class="mi fu" style="animation-delay:${i*.05}s"><i>${x.emo}</i><div class="mx"><h4>${x.title}</h4><p>${x.sn}문장 · ${new Date(x.t).toLocaleDateString()}</p></div><button class="mb" onclick="dD(${i})">🗑</button></div>`).join('')}else{const n=gN();if(!n.length){c.innerHTML='<div class="me"><i>📝</i><p>표현 없어요<br>📌저장!</p></div>';return}c.innerHTML=n.map((x,i)=>`<div class="mi fu" style="animation-delay:${i*.05}s"><i>📝</i><div class="mx"><h4>${x.en}</h4><p>${x.ko}</p></div><div style="display:flex;gap:4px"><button class="mb" onclick="tts('${x.en.replace(/'/g,"\\'")}')">🔊</button><button class="mb" onclick="dN(${i})">🗑</button></div></div>`).join('')}}
function dD(i){const d=gD();d.splice(i,1);sD(d);rMR();toast('🗑')}
function dN(i){const n=gN();n.splice(i,1);sN(n);rMR();toast('🗑')}
rCats();rFeed();
</script>
</body>
</html>
