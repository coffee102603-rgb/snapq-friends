<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c18;
  --bg2: #0f1525;
  --bg3: #161d30;
  --text: #f0f0f0;
  --text2: #a0a8c0;
  --accent: #FF6B35;
  --accent2: #FF8F65;
  --interview: #7C3AED;
  --food: #EF4444;
  --travel: #0EA5E9;
  --daily: #F59E0B;
  --slang: #EC4899;
  --beginner: #22C55E;
  --intermediate: #F59E0B;
  --advanced: #EF4444;
  --step-done: #22C55E;
  --step-current: #FF6B35;
  --step-wait: #2a3050;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { 
  height:100%; overflow:hidden; 
  font-family:'Outfit',sans-serif; 
  background:var(--bg); color:var(--text);
}
button { font-family:inherit; cursor:pointer; border:none; outline:none; }

/* ── APP SHELL ── */
#app {
  max-width:430px; margin:0 auto; height:100dvh;
  display:flex; flex-direction:column; position:relative;
  overflow:hidden;
}

/* ── BOTTOM NAV ── */
#bottomNav {
  display:flex; height:56px; min-height:56px;
  background:var(--bg2); border-top:1px solid #1a2040;
  z-index:100;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; 
  align-items:center; justify-content:center; gap:2px;
  background:none; color:var(--text2); font-size:11px; font-weight:500;
  transition:color .2s;
}
.nav-btn.active { color:var(--accent); }
.nav-btn span.icon { font-size:22px; }

/* ── SCREENS ── */
.screen { 
  flex:1; overflow-y:auto; overflow-x:hidden;
  display:none; flex-direction:column;
  -webkit-overflow-scrolling:touch;
}
.screen.active { display:flex; }

/* ── HOME ── */
#homeScreen .home-header {
  padding:16px 16px 0;
  display:flex; align-items:center; gap:10px;
}
.logo { font-size:22px; font-weight:800; color:var(--accent); }
.logo-tag { 
  font-size:11px; font-weight:600; color:var(--text2); 
  background:var(--bg3); padding:2px 8px; border-radius:20px;
}

/* Chip Filters */
.chips {
  display:flex; gap:8px; padding:14px 16px;
  overflow-x:auto; scrollbar-width:none;
}
.chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:7px 16px; border-radius:20px;
  font-size:13px; font-weight:600; background:var(--bg3);
  color:var(--text2); border:1.5px solid transparent;
  transition:all .2s; white-space:nowrap;
}
.chip.active { color:#fff; border-color:currentColor; }

/* Feed Cards */
.feed { padding:0 16px 20px; display:flex; flex-direction:column; gap:14px; }
.card {
  border-radius:var(--radius); overflow:hidden;
  background:var(--bg2); cursor:pointer;
  transition:transform .15s;
}
.card:active { transform:scale(.97); }
.card-thumb {
  position:relative; width:100%; aspect-ratio:16/9;
  background:#111; overflow:hidden;
}
.card-thumb img { width:100%; height:100%; object-fit:cover; }
.card-thumb .play-overlay {
  position:absolute; inset:0; 
  background:linear-gradient(transparent 40%,rgba(0,0,0,.7));
  display:flex; align-items:center; justify-content:center;
}
.play-icon {
  width:48px; height:48px; border-radius:50%;
  background:rgba(255,255,255,.2); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
}
.card-info { padding:12px 14px; }
.card-title { font-size:15px; font-weight:700; margin-bottom:6px; line-height:1.3; }
.card-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.badge {
  font-size:10px; font-weight:700; padding:3px 8px; 
  border-radius:6px; text-transform:uppercase; letter-spacing:.3px;
}
.badge-beginner { background:rgba(34,197,94,.15); color:var(--beginner); }
.badge-intermediate { background:rgba(245,158,11,.15); color:var(--intermediate); }
.badge-advanced { background:rgba(239,68,68,.15); color:var(--advanced); }
.card-sentences { font-size:11px; color:var(--text2); }
.card-tags { display:flex; gap:4px; margin-top:4px; }
.tag-dot {
  width:8px; height:8px; border-radius:50%;
}

/* ── LESSON SCREEN ── */
#lessonScreen { background:var(--bg); }

/* Video Area */
.video-area {
  width:100%; aspect-ratio:9/16; max-height:52vh;
  background:#000; position:relative; flex-shrink:0;
  overflow:hidden;
}
.video-area iframe { width:100%; height:100%; border:none; }
.video-area .subtitle-overlay {
  position:absolute; bottom:12px; left:8px; right:8px;
  text-align:center; z-index:10;
}
.subtitle-text {
  display:inline-block; padding:6px 14px;
  background:rgba(0,0,0,.75); border-radius:10px;
  font-size:15px; font-weight:600; line-height:1.5;
  color:#fff; backdrop-filter:blur(4px);
}
.subtitle-text .blank {
  display:inline-block; min-width:60px; 
  border-bottom:2.5px solid var(--accent);
  margin:0 3px; vertical-align:baseline;
}
.subtitle-text .hint-word { color:var(--accent2); }

/* Korean hint toggle - overlays on video */
.kr-hint-toggle {
  position:absolute; top:10px; right:10px; z-index:20;
  background:rgba(0,0,0,.5); border-radius:20px;
  padding:4px 12px; font-size:11px; font-weight:600;
  color:#fff; backdrop-filter:blur(6px);
}
.kr-hint-toggle.off { opacity:.5; }

/* Progress Bar */
.progress-bar {
  display:flex; gap:6px; padding:10px 16px;
  background:var(--bg2);
}
.step-dot {
  flex:1; height:5px; border-radius:3px;
  background:var(--step-wait);
  transition:background .3s;
}
.step-dot.done { background:var(--step-done); }
.step-dot.current { background:var(--step-current); }

/* Content Area */
.lesson-content {
  flex:1; overflow-y:auto; padding:14px 16px 20px;
}

/* ── Step 1: Expressions ── */
.expr-card {
  background:var(--bg3); border-radius:var(--radius-sm);
  padding:14px; margin-bottom:10px;
  border-left:3px solid var(--accent);
}
.expr-en { font-size:16px; font-weight:700; margin-bottom:4px; }
.expr-kr { font-size:13px; color:var(--text2); margin-bottom:8px; }
.expr-actions { display:flex; gap:8px; align-items:center; }
.expr-btn {
  padding:5px 12px; border-radius:8px; font-size:12px; font-weight:600;
  background:var(--bg2); color:var(--text2); transition:all .2s;
}
.expr-btn:active { background:var(--accent); color:#fff; }
.expr-note {
  margin-top:8px; padding:8px 10px; border-radius:8px;
  background:rgba(255,107,53,.08); font-size:12px; color:var(--accent2);
  display:none;
}
.expr-note.show { display:block; }

.step-next-btn {
  display:block; width:100%; padding:14px; margin-top:14px;
  border-radius:var(--radius-sm); font-size:15px; font-weight:700;
  background:linear-gradient(135deg,var(--interview),#9333EA);
  color:#fff; text-align:center;
}

/* ── Step 2: Script Practice ── */
.script-sentence {
  background:var(--bg3); border-radius:var(--radius-sm);
  padding:14px; margin-bottom:10px;
}
.script-num { 
  font-size:11px; font-weight:700; color:var(--accent);
  margin-bottom:6px;
}
.script-controls { display:flex; flex-wrap:wrap; gap:8px; }
.sc-btn {
  padding:7px 14px; border-radius:8px; font-size:12px; font-weight:600;
  background:var(--bg2); color:var(--text2); transition:all .15s;
}
.sc-btn:active { background:var(--accent); color:#fff; }
.sc-reveal {
  width:100%; padding:10px; margin-top:8px; border-radius:8px;
  background:var(--bg2); font-size:14px; line-height:1.6;
  display:none;
}
.sc-reveal.show { display:block; }
.sc-reveal-en { color:var(--text); font-weight:600; }
.sc-reveal-kr { color:var(--text2); font-size:13px; }

/* ── Step 3: Dubbing ── */
.dub-controls {
  display:flex; flex-direction:column; gap:12px;
}

/* Speed Buttons */
.speed-row {
  display:flex; gap:8px; justify-content:center;
}
.speed-btn {
  padding:8px 18px; border-radius:20px; font-size:13px; font-weight:700;
  background:var(--bg3); color:var(--text2); transition:all .2s;
  border:2px solid transparent;
}
.speed-btn.active { border-color:var(--accent); color:var(--accent); }

/* Voice Status */
.voice-status {
  text-align:center; padding:10px;
  border-radius:var(--radius-sm); background:var(--bg3);
}
.voice-indicator {
  display:inline-flex; align-items:center; gap:8px;
  font-size:14px; font-weight:600;
}
.mic-dot {
  width:12px; height:12px; border-radius:50%;
  background:#555; transition:background .2s;
}
.mic-dot.listening { background:var(--beginner); animation:pulse 1s infinite; }
.mic-dot.speaking { background:var(--accent); animation:pulse .5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.dub-sentence-display {
  text-align:center; padding:12px;
  font-size:18px; font-weight:700; min-height:60px;
  display:flex; align-items:center; justify-content:center;
}
.dub-hint-kr {
  text-align:center; font-size:13px; color:var(--text2);
  min-height:20px;
}

/* Star Level */
.star-level {
  text-align:center; font-size:22px; letter-spacing:4px;
}

/* Dub action buttons */
.dub-action-row {
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
}
.dub-act-btn {
  padding:10px 18px; border-radius:var(--radius-sm);
  font-size:13px; font-weight:700; 
  background:var(--bg3); color:var(--text);
  transition:all .15s;
}
.dub-act-btn:active { transform:scale(.95); }
.dub-act-btn.primary { background:var(--accent); color:#fff; }
.dub-act-btn.start-btn {
  background:linear-gradient(135deg,var(--accent),#FF8F65);
  color:#fff; font-size:16px; padding:14px 32px;
}

/* Manual fallback button */
.manual-next {
  padding:10px 24px; border-radius:20px;
  background:var(--bg3); color:var(--text2);
  font-size:13px; font-weight:600; margin:0 auto; display:block;
}

/* ── MY ROOM ── */
#myRoomScreen { background:var(--bg); }
.room-header {
  padding:16px; font-size:20px; font-weight:800;
}
.room-tabs {
  display:flex; padding:0 16px; gap:8px; margin-bottom:14px;
}
.room-tab {
  flex:1; padding:10px; border-radius:var(--radius-sm);
  text-align:center; font-size:13px; font-weight:700;
  background:var(--bg3); color:var(--text2); transition:all .2s;
}
.room-tab.active { background:var(--accent); color:#fff; }
.room-list { padding:0 16px 20px; }
.room-item {
  background:var(--bg2); border-radius:var(--radius-sm);
  padding:14px; margin-bottom:8px;
  display:flex; justify-content:space-between; align-items:center;
}
.room-item-info { flex:1; }
.room-item-title { font-size:14px; font-weight:700; }
.room-item-sub { font-size:12px; color:var(--text2); margin-top:2px; }
.room-item-actions { display:flex; gap:8px; }
.room-btn {
  padding:6px 12px; border-radius:8px; font-size:18px;
  background:var(--bg3); color:var(--text2);
}
.empty-state {
  text-align:center; padding:40px 20px;
  color:var(--text2); font-size:14px;
}

/* Dub completion screen */
.dub-complete {
  display:none; flex-direction:column; align-items:center; gap:14px;
  padding:20px; text-align:center;
}
.dub-complete.show { display:flex; }
.complete-emoji { font-size:48px; }
.complete-title { font-size:20px; font-weight:800; }
.complete-sub { font-size:13px; color:var(--text2); }

/* Scrollbar hide */
.lesson-content::-webkit-scrollbar,
.screen::-webkit-scrollbar,
.room-list::-webkit-scrollbar { width:0; display:none; }

/* Back button */
.back-btn {
  position:absolute; top:10px; left:10px; z-index:20;
  width:36px; height:36px; border-radius:50%;
  background:rgba(0,0,0,.5); backdrop-filter:blur(6px);
  color:#fff; font-size:18px; display:flex;
  align-items:center; justify-content:center;
}
</style>
</head>

      <div class="logo">SnapTalk</div>

    </div>

    <div class="feed" id="feedContainer"></div>

  <!-- ========== MY ROOM ========== -->
  <div id="myRoomScreen" class="screen">
    <div class="room-header">📁 나의 방</div>

      <button class="room-tab active" onclick="switchRoomTab('dubs')">🎬 나의 더빙</button>

    <div class="room-list" id="roomList"></div>

  <!-- ========== BOTTOM NAV ========== -->
  <div id="bottomNav">
    <button class="nav-btn active" onclick="showScreen('home')" id="navHome">

    </button>
    <button class="nav-btn" onclick="showScreen('myRoom')" id="navRoom">

  </div>
</div>

function openLesson(id) {
  currentLesson = CONTENT.find(c => c.id === id);
  if (!currentLesson) return;
  currentStep = 1;
  showScreen('lesson');
  updateProgressBar();
  renderStep1();
  initYTPlayer();
}

function initYTPlayer() {
  destroyPlayer();
  if (!currentLesson.ytId) {
    document.getElementById('ytPlayer').innerHTML = '<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px">영상 준비중</div>';
    return;
  }
  if (!ytReady) {
    setTimeout(initYTPlayer, 300);
    return;
  }
  player = new YT.Player('ytPlayer', {
    videoId: currentLesson.ytId,
    playerVars: { playsinline:1, controls:0, rel:0, modestbranding:1, fs:0 },
    events: {
      onReady: () => { player.setVolume(50); }
    }
  });
}

function destroyPlayer() {
  if (player && player.destroy) {
    try { player.destroy(); } catch(e) {}
    player = null;
  }
  document.getElementById('ytPlayer').innerHTML = '';
}

function updateProgressBar() {
  const d1 = document.getElementById('dot1');
  const d2 = document.getElementById('dot2');
  const d3 = document.getElementById('dot3');
  d1.className = 'step-dot ' + (currentStep > 1 ? 'done' : currentStep === 1 ? 'current' : '');
  d2.className = 'step-dot ' + (currentStep > 2 ? 'done' : currentStep === 2 ? 'current' : '');
  d3.className = 'step-dot ' + (currentStep >= 3 ? 'current' : '');
}

  });

async function startDubbing() {
  // Request mic
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser);
    isMicActive = true;

    // Start MediaRecorder
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(micStream);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      dubState.audioBlob = new Blob(recordedChunks, {type:'audio/webm'});
    };
    mediaRecorder.start();
  } catch(e) {
    alert('마이크 권한이 필요합니다! 설정에서 허용해주세요.');
    return;
  }

  dubState.isRunning = true;
  dubState.sentenceIdx = 0;
  dubState.successCount = 0;
  dubState.starLevel = 1;

  // Mute + play video
  if (player && player.mute) {
    player.mute();
    player.setPlaybackRate(dubState.speed);
    player.seekTo(0);
    player.playVideo();
  }

  renderDubUI();
  runDubSentence();
}

  const lc = document.getElementById('lessonContent');

        <button class="speed-btn ${dubState.speed===0.5?'active':''}" onclick="setSpeed(0.5)">🐢 0.5x</button>
        <button class="speed-btn ${dubState.speed===1.0?'active':''}" onclick="setSpeed(1.0)">🚶 1.0x</button>
        <button class="speed-btn ${dubState.speed===1.2?'active':''}" onclick="setSpeed(1.2)">🏃 1.2x</button>
      </div>

  `;
}

function runDubSentence() {
  if (!dubState.isRunning) return;
  const L = currentLesson;
  if (dubState.sentenceIdx >= L.sentences.length) {
    completeDubbing();
    return;
  }

  const s = L.sentences[dubState.sentenceIdx];

  // Pause video at sentence time
  if (player && player.pauseVideo) {
    player.seekTo(s.time);
    setTimeout(() => { if(player && player.pauseVideo) player.pauseVideo(); }, 300);
  }

  // Show subtitle with blanks
  showSubtitle(s.en, dubState.starLevel);

  // Show sentence in content area
  const display = document.getElementById('dubSentenceDisplay');
  const hintKr = document.getElementById('dubHintKr');
  if (display) display.innerHTML = makeBlanks(s.en, dubState.starLevel);
  if (hintKr) hintKr.textContent = dubState.krHint ? s.kr : '';

  // Show manual button
  const mb = document.getElementById('manualNextBtn');
  if (mb) mb.style.display = 'block';

  // Update voice label
  updateVoiceLabel('🎤 말해보세요!');

  // Reset hint
  dubState.hintLevel = 0;
  clearSilenceTimer();

  // Start voice detection loop
  startVoiceDetection(s);
}

function showSubtitle(text, starLevel) {
  const overlay = document.getElementById('subtitleOverlay');
  const st = document.getElementById('subtitleText');
  overlay.style.display = 'block';
  st.innerHTML = makeBlanks(text, starLevel);
}

function makeBlanks(text, starLevel) {
  const words = text.split(' ');
  if (words.length <= 1) return text;
  
  // Star level determines how many blanks
  let blankCount = 0;
  if (starLevel === 1) blankCount = 1;
  else if (starLevel === 2) blankCount = Math.ceil(words.length * 0.4);
  else blankCount = Math.ceil(words.length * 0.7);
  
  // Choose which words to blank (spread evenly)
  const blankIndices = new Set();
  const step = Math.max(1, Math.floor(words.length / blankCount));
  for (let i = 0; i < blankCount && blankIndices.size < words.length; i++) {
    let idx = (step * i + Math.floor(step/2)) % words.length;
    blankIndices.add(idx);
  }

  return words.map((w, i) => 
    blankIndices.has(i) ? '<span class="blank"></span>' : w
  ).join(' ');
}

// ═══════════════════════════════════════════
// VOICE DETECTION (Web Audio API)
// ═══════════════════════════════════════════
const VOLUME_THRESHOLD = 25;
let silenceStart = 0;
let wasSpeaking = false;

function startVoiceDetection(sentence) {
  if (dubState.detectionLoop) cancelAnimationFrame(dubState.detectionLoop);
  
  silenceStart = Date.now();
  wasSpeaking = false;
  let spokeDuration = 0;
  
  // Progressive hint timer
  startSilenceHintTimer(sentence);

  function detect() {
    if (!dubState.isRunning || !analyser) return;

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const volume = data.reduce((a,b) => a+b,0) / data.length;
    const speaking = volume > VOLUME_THRESHOLD;

    const dot = document.getElementById('micDot');
    if (dot) {
      dot.className = 'mic-dot' + (speaking ? ' speaking' : ' listening');
    }

    if (speaking) {
      wasSpeaking = true;
      spokeDuration++;
      silenceStart = Date.now();
      clearSilenceTimer(); // Reset hint timer while speaking
      updateVoiceLabel('🔴 듣고 있어요...');
    } else if (wasSpeaking) {
      const silenceDur = Date.now() - silenceStart;
      if (silenceDur > 1500 && spokeDuration > 15) {
        // User spoke then stopped → advance
        dubState.successCount++;
        if (dubState.successCount >= 3) {
          dubState.starLevel = Math.min(3, dubState.starLevel + 1);
          dubState.successCount = 0;
          const sd = document.getElementById('starDisplay');
          if (sd) sd.textContent = '⭐'.repeat(dubState.starLevel);
        }
        advanceSentence();
        return;
      }
    }

    dubState.detectionLoop = requestAnimationFrame(detect);
  }

  dubState.detectionLoop = requestAnimationFrame(detect);
}

function advanceSentence() {
  cancelAnimationFrame(dubState.detectionLoop);
  clearSilenceTimer();
  
  // Resume video briefly
  if (player && player.playVideo) player.playVideo();

  updateVoiceLabel('✅ 좋아요!');

  dubState.sentenceIdx++;
  setTimeout(() => {
    if (player && player.pauseVideo) player.pauseVideo();
    runDubSentence();
  }, 1200);
}

function manualNext() {
  if (!dubState.isRunning) return;
  dubState.successCount++;
  if (dubState.successCount >= 3) {
    dubState.starLevel = Math.min(3, dubState.starLevel + 1);
    dubState.successCount = 0;
    const sd = document.getElementById('starDisplay');
    if (sd) sd.textContent = '⭐'.repeat(dubState.starLevel);
  }
  advanceSentence();
}

function updateVoiceLabel(text) {
  const vl = document.getElementById('voiceLabel');
  if (vl) vl.textContent = text;
}

// ═══════════════════════════════════════════
// PROGRESSIVE HINTS
// ═══════════════════════════════════════════
function startSilenceHintTimer(sentence) {
  clearSilenceTimer();
  dubState.hintLevel = 0;
  const words = sentence.en.split(' ');

  dubState.silenceTimer = setInterval(() => {
    if (!dubState.isRunning) { clearSilenceTimer(); return; }
    
    dubState.hintLevel++;
    
    if (dubState.hintLevel > words.length) {
      // Full sentence TTS → auto advance
      clearSilenceTimer();
      tts(sentence.en);
      updateVoiceLabel('💡 전체 힌트 재생 후 넘어갑니다');
      setTimeout(() => {
        dubState.sentenceIdx++;
        dubState.successCount = 0; // Reset on full hint
        runDubSentence();
      }, 3000);
      return;
    }

    // Speak partial hint
    const hint = words.slice(0, dubState.hintLevel).join(' ');
    tts(hint);
    updateVoiceLabel(`💡 힌트: "${hint}..."`);
    
    // Show hint words in subtitle
    const st = document.getElementById('subtitleText');
    if (st) {
      st.innerHTML = words.map((w, i) => {
        if (i < dubState.hintLevel) return `<span class="hint-word">${w}</span>`;
        return '<span class="blank"></span>';
      }).join(' ');
    }
  }, 3000);
}

function clearSilenceTimer() {
  if (dubState.silenceTimer) {
    clearInterval(dubState.silenceTimer);
    dubState.silenceTimer = null;
  }
}

// ═══════════════════════════════════════════
// DUB COMPLETE
// ═══════════════════════════════════════════
function completeDubbing() {
  dubState.isRunning = false;
  cancelAnimationFrame(dubState.detectionLoop);
  clearSilenceTimer();

  // Stop recording
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }

  document.getElementById('subtitleOverlay').style.display = 'none';
  if (player && player.pauseVideo) player.pauseVideo();

  const lc = document.getElementById('lessonContent');
  lc.innerHTML = `
    <div class="dub-complete show">
      <div class="complete-emoji">🎉</div>
      <div class="complete-title">더빙 완료!</div>
      <div class="complete-sub">${currentLesson.title}</div>
      <div class="star-level">${'⭐'.repeat(dubState.starLevel)}</div>
      <div class="dub-action-row">
        <button class="dub-act-btn" onclick="playMyDub()">▶ 내 더빙 듣기</button>
        <button class="dub-act-btn primary" onclick="saveDub()">💾 저장</button>
      </div>
      <div class="dub-action-row">
        <button class="dub-act-btn" onclick="goStep3()">🔄 다시</button>
        <button class="dub-act-btn" onclick="goHome()">🏠 홈</button>
      </div>
    </div>
  `;
}

function playMyDub() {
  if (dubState.audioBlob) {
    const url = URL.createObjectURL(dubState.audioBlob);
    new Audio(url).play();
  } else {
    alert('녹음 데이터가 없습니다.');
  }
}

function saveDub() {
  if (!dubState.audioBlob) { alert('녹음 없음'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    savedDubs.push({
      title: currentLesson.title,
      date: new Date().toLocaleDateString(),
      audioData: reader.result,
      stars: dubState.starLevel
    });
    localStorage.setItem('sd', JSON.stringify(savedDubs));
    alert('💾 더빙 저장 완료!');
  };
  reader.readAsDataURL(dubState.audioBlob);
}

function stopDubbing() {
  dubState.isRunning = false;
  if (dubState.detectionLoop) cancelAnimationFrame(dubState.detectionLoop);
  clearSilenceTimer();
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    try { mediaRecorder.stop(); } catch(e) {}
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  isMicActive = false;
}

// ═══════════════════════════════════════════
// KOREAN HINT TOGGLE
// ═══════════════════════════════════════════
function toggleKrHint() {
  dubState.krHint = !dubState.krHint;
  const btn = document.getElementById('krToggle');
  btn.textContent = dubState.krHint ? '🇰🇷 ON' : '🇰🇷 OFF';
  btn.classList.toggle('off', !dubState.krHint);
  // Update current hint if in dubbing
  const hk = document.getElementById('dubHintKr');
  if (hk && currentLesson && dubState.sentenceIdx < currentLesson.sentences.length) {
    hk.textContent = dubState.krHint ? currentLesson.sentences[dubState.sentenceIdx].kr : '';
  }
}

// ═══════════════════════════════════════════
// TTS (Galaxy Fix)
// ═══════════════════════════════════════════
function tts(text) {
  if (!text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  // Find English voice
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en-US')) || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) u.voice = enVoice;
  
  // Galaxy 15-sec bug fix: pause/resume
  let keepAlive;
  u.onstart = () => {
    keepAlive = setInterval(() => {
      speechSynthesis.pause();
      speechSynthesis.resume();
    }, 10000);
  };
  u.onend = () => clearInterval(keepAlive);
  u.onerror = () => clearInterval(keepAlive);
  
  speechSynthesis.speak(u);
}

// Load voices
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// ═══════════════════════════════════════════
// MY ROOM
// ═══════════════════════════════════════════
function switchRoomTab(tab) {
  roomTab = tab;
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderRoom();
}

function renderRoom() {
  const list = document.getElementById('roomList');
  
  if (roomTab === 'dubs') {
    if (savedDubs.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 저장된 더빙이 없어요 🎬<br>숏츠를 골라 더빙해보세요!</div>';
      return;
    }
    list.innerHTML = savedDubs.map((d, i) => `
      <div class="room-item">
        <div class="room-item-info">
          <div class="room-item-title">${'⭐'.repeat(d.stars||1)} ${d.title}</div>
          <div class="room-item-sub">${d.date}</div>
        </div>
        <div class="room-item-actions">
          <button class="room-btn" onclick="playRoomDub(${i})">▶</button>
          <button class="room-btn" onclick="deleteRoomDub(${i})">🗑</button>
        </div>
      </div>
    `).join('');
  } else {
    if (savedNotes.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 저장된 표현이 없어요 📝<br>Step 1에서 📌 저장해보세요!</div>';
      return;
    }
    list.innerHTML = savedNotes.map((n, i) => `
      <div class="room-item">
        <div class="room-item-info">
          <div class="room-item-title">${n.en}</div>
          <div class="room-item-sub">${n.kr}</div>
        </div>
        <div class="room-item-actions">
          <button class="room-btn" onclick="tts('${n.en.replace(/'/g,"\\'")}')">🔊</button>
          <button class="room-btn" onclick="deleteRoomNote(${i})">🗑</button>
        </div>
      </div>
    `).join('');
  }
}

function playRoomDub(i) {
  const d = savedDubs[i];
  if (d && d.audioData) {
    new Audio(d.audioData).play();
  }
}

function deleteRoomDub(i) {
  if (confirm('이 더빙을 삭제할까요?')) {
    savedDubs.splice(i, 1);
    localStorage.setItem('sd', JSON.stringify(savedDubs));
    renderRoom();
  }
}

function deleteRoomNote(i) {
  if (confirm('이 표현을 삭제할까요?')) {
    savedNotes.splice(i, 1);
    localStorage.setItem('sn', JSON.stringify(savedNotes));
    renderRoom();
  }
}
