<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c18;--bg2:#0f1525;--bg3:#161d30;--text:#f0f0f0;--text2:#a0a8c0;--accent:#FF6B35;--accent2:#FF8F65;--beginner:#22C55E;--intermediate:#F59E0B;--advanced:#EF4444;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-user-select:none;user-select:none}

/* ===== ONBOARDING (outside #app, hardcoded HTML) ===== */
#setup{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#setup.gone{display:none!important}
#setup h1{font-size:36px;font-weight:800;color:var(--accent);margin-bottom:2px}
#setup .sub{font-size:13px;color:var(--text2);margin-bottom:36px}
#setup h2{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--text2)}
.pick-row{display:flex;gap:10px;margin-bottom:28px;justify-content:center;flex-wrap:wrap}
.pick-btn{width:72px;height:82px;border-radius:14px;background:var(--bg2);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:12px;font-weight:600;border:2.5px solid transparent;transition:all .15s;touch-action:manipulation}
.pick-btn:active{transform:scale(.93)}
.pick-btn.on{border-color:var(--accent);background:rgba(255,107,53,.12)}
.pick-btn .fg{font-size:30px;line-height:1}
#goBtn{width:100%;max-width:300px;padding:16px;border-radius:var(--rs);font-size:17px;font-weight:800;color:#fff;background:#333;pointer-events:none;transition:all .2s;touch-action:manipulation}
#goBtn.rdy{background:var(--accent);pointer-events:auto}

/* ===== APP ===== */
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
#bnav{display:flex;height:56px;min-height:56px;background:var(--bg2);border-top:1px solid #1a2040;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--text2);font-size:11px;font-weight:500}.nb.on{color:var(--accent)}.nb .ic{font-size:22px}
.sc{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}.sc.on{display:flex}

/* Home */
.hh{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.la{display:flex;align-items:center;gap:10px}.lg{font-size:22px;font-weight:800;color:var(--accent)}.lt{font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:20px}
.ls{padding:6px 14px;border-radius:20px;background:var(--bg3);font-size:14px;font-weight:700;color:var(--accent);border:1.5px solid rgba(255,107,53,.3);touch-action:manipulation}
.chips{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.ch{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text2);border:1.5px solid transparent;transition:all .2s;white-space:nowrap;touch-action:manipulation}.ch.on{color:#fff;border-color:currentColor}
.feed{padding:0 16px 20px;display:flex;flex-direction:column;gap:14px}
.cd{border-radius:16px;overflow:hidden;background:var(--bg2);cursor:pointer;transition:transform .15s;touch-action:manipulation}.cd:active{transform:scale(.97)}
.ct{position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden}.ct img{width:100%;height:100%;object-fit:cover}
.po{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.7));display:flex;align-items:center;justify-content:center}
.pi{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:22px}
.ci{padding:12px 14px}.cn{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.cm{display:flex;gap:8px;align-items:center}.bd{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase}
.bd-b{background:rgba(34,197,94,.15);color:var(--beginner)}.bd-i{background:rgba(245,158,11,.15);color:var(--intermediate)}.bd-a{background:rgba(239,68,68,.15);color:var(--advanced)}
.cs{font-size:11px;color:var(--text2)}.lf{font-size:18px}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.8}

/* Lesson */
.va{width:100%;aspect-ratio:9/16;max-height:52vh;background:#000;position:relative;flex-shrink:0;overflow:hidden}.va iframe{width:100%;height:100%;border:none}
.so{position:absolute;bottom:12px;left:8px;right:8px;text-align:center;z-index:10}
.stt{display:inline-block;padding:6px 14px;background:rgba(0,0,0,.75);border-radius:10px;font-size:15px;font-weight:600;line-height:1.5;color:#fff}.stt .bl{display:inline-block;min-width:50px;border-bottom:2.5px solid var(--accent);margin:0 3px}.stt .hw{color:var(--accent2)}
.ht{position:absolute;top:10px;right:10px;z-index:20;background:rgba(0,0,0,.5);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#fff;touch-action:manipulation}.ht.off{opacity:.5}
.bb{position:absolute;top:10px;left:10px;z-index:20;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.pb{display:flex;gap:6px;padding:10px 16px;background:var(--bg2)}.sd{flex:1;height:5px;border-radius:3px;background:#2a3050;transition:.3s}.sd.dn{background:var(--beginner)}.sd.cr{background:var(--accent)}
.lc{flex:1;overflow-y:auto;padding:14px 16px 20px}.lc::-webkit-scrollbar{width:0;display:none}
.ec{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px;border-left:3px solid var(--accent)}
.ee{font-size:16px;font-weight:700;margin-bottom:4px}.ek{font-size:13px;color:var(--text2);margin-bottom:8px}
.ea{display:flex;gap:8px;flex-wrap:wrap}
.eb{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--text2);touch-action:manipulation}.eb:active{background:var(--accent);color:#fff}
.en{margin-top:8px;padding:8px 10px;border-radius:8px;background:rgba(255,107,53,.08);font-size:12px;color:var(--accent2);display:none}.en.sh{display:block}
.snb{display:block;width:100%;padding:14px;margin-top:14px;border-radius:var(--rs);font-size:15px;font-weight:700;background:linear-gradient(135deg,#7C3AED,#9333EA);color:#fff;text-align:center;touch-action:manipulation}
.ss{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.sn2{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px}
.scl{display:flex;flex-wrap:wrap;gap:8px}
.sb{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--text2);touch-action:manipulation}.sb:active{background:var(--accent);color:#fff}
.rv{width:100%;padding:10px;margin-top:8px;border-radius:8px;background:var(--bg2);font-size:14px;line-height:1.6;display:none}.rv.sh{display:block}
.spr{display:flex;gap:8px;justify-content:center}
.spb{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2);border:2px solid transparent;touch-action:manipulation}.spb.on{border-color:var(--accent);color:var(--accent)}
.vs{text-align:center;padding:10px;border-radius:var(--rs);background:var(--bg3)}
.vi{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.mic{width:12px;height:12px;border-radius:50%;background:#555;transition:.2s}.mic.li{background:var(--beginner);animation:pu 1s infinite}.mic.sp{background:var(--accent);animation:pu .5s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.dsd{text-align:center;padding:12px;font-size:18px;font-weight:700;min-height:60px;display:flex;align-items:center;justify-content:center}
.dhk{text-align:center;font-size:13px;color:var(--text2);min-height:20px}
.sl{text-align:center;font-size:22px;letter-spacing:4px}
.da{padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:700;background:var(--bg3);color:var(--text);touch-action:manipulation}.da:active{transform:scale(.95)}.da.pm{background:var(--accent);color:#fff}
.da.big{background:linear-gradient(135deg,var(--accent),#FF8F65);color:#fff;font-size:16px;padding:14px 32px}
.mn{padding:10px 24px;border-radius:20px;background:var(--bg3);color:var(--text2);font-size:13px;font-weight:600;margin:0 auto;display:block;touch-action:manipulation}
.rh{padding:16px;font-size:20px;font-weight:800}
.rts{display:flex;padding:0 16px;gap:8px;margin-bottom:14px}
.rt{flex:1;padding:10px;border-radius:var(--rs);text-align:center;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2);touch-action:manipulation}.rt.on{background:var(--accent);color:#fff}
.rl{padding:0 16px 20px}
.ri{background:var(--bg2);border-radius:var(--rs);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.rin{flex:1}.rit{font-size:14px;font-weight:700}.ris{font-size:12px;color:var(--text2);margin-top:2px}
.rb{padding:6px 12px;border-radius:8px;font-size:18px;background:var(--bg3);color:var(--text2);touch-action:manipulation}
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center}.mo.sh{display:flex}
.ms{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;max-height:70vh;overflow-y:auto}
.mt2{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.mp{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--rs);background:var(--bg3);margin-bottom:8px;cursor:pointer;border:2px solid transparent;touch-action:manipulation}.mp:active,.mp.cur{border-color:var(--accent);background:rgba(255,107,53,.1)}.mpf{font-size:20px}.mpt{font-size:14px;font-weight:600}
</style>
</head>

<div id="setup">
  <h1>SnapTalk</h1>
  <div class="sub">Talk changes everything.</div>

  <h2>I speak...</h2>
  <div class="pick-row" id="nRow">
    <button class="pick-btn" ontouchend="pickN('ko',this)" onclick="pickN('ko',this)"><span class="fg">🇰🇷</span>한국어</button>
    <button class="pick-btn" ontouchend="pickN('en',this)" onclick="pickN('en',this)"><span class="fg">🇺🇸</span>English</button>
    <button class="pick-btn" ontouchend="pickN('ja',this)" onclick="pickN('ja',this)"><span class="fg">🇯🇵</span>日本語</button>
    <button class="pick-btn" ontouchend="pickN('zh',this)" onclick="pickN('zh',this)"><span class="fg">🇨🇳</span>中文</button>
  </div>

  <h2>I want to learn...</h2>
  <div class="pick-row" id="tRow">
    <button class="pick-btn" ontouchend="pickT('ko',this)" onclick="pickT('ko',this)"><span class="fg">🇰🇷</span>한국어</button>
    <button class="pick-btn" ontouchend="pickT('en',this)" onclick="pickT('en',this)"><span class="fg">🇺🇸</span>English</button>
    <button class="pick-btn" ontouchend="pickT('ja',this)" onclick="pickT('ja',this)"><span class="fg">🇯🇵</span>日本語</button>
    <button class="pick-btn" ontouchend="pickT('zh',this)" onclick="pickT('zh',this)"><span class="fg">🇨🇳</span>中文</button>
  </div>

  <button id="goBtn" ontouchend="gogo()" onclick="gogo()">Start! →</button>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <div id="hm" class="sc on">
    <div class="hh"><div class="la"><div class="lg">SnapTalk</div><div class="lt">Snap Dubbing</div></div><button class="ls" id="lsel" onclick="openLP()"></button></div>

  </div>
  <div id="les" class="sc">
    <div class="va"><button class="bb" onclick="goH()">←</button><div id="yp"></div>
      <button class="ht" id="htB" onclick="togHint()"></button>
      <div class="so" id="sO" style="display:none"><div class="stt" id="sT"></div></div></div>
    <div class="pb"><div class="sd" id="d1"></div><div class="sd" id="d2"></div><div class="sd" id="d3"></div></div>
    <div class="lc" id="lC"></div>
  </div>
  <div id="mr" class="sc">
    <div class="rh" id="mrH"></div><div class="rts"><button class="rt on" onclick="srTab('d',this)" id="rtD"></button><button class="rt" onclick="srTab('n',this)" id="rtN"></button></div><div class="rl" id="rL"></div>
  </div>
  <div id="bnav"><button class="nb on" onclick="nav('h')" id="nH"><span class="ic">🏠</span>Home</button><button class="nb" onclick="nav('r')" id="nR"><span class="ic">📁</span>My Room</button></div>
</div>
<div class="mo" id="lM"><div class="ms"><div class="mt2" id="lMt"></div><div id="lPs"></div></div></div>

// ========== ONBOARDING ==========
var _n='',_t='';
var S=null;
try{S=JSON.parse(localStorage.getItem('stl'));}catch(e){}
if(S&&S.n&&S.t){document.getElementById('setup').classList.add('gone');}

function pickN(c,el){
  _n=c;
  document.querySelectorAll('#nRow .pick-btn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  checkReady();
}
function pickT(c,el){
  _t=c;
  document.querySelectorAll('#tRow .pick-btn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  checkReady();
}
function checkReady(){
  var ok=_n&&_t&&_n!==_t;
  document.getElementById('goBtn').className=ok?'rdy':'';
  document.getElementById('goBtn').id='goBtn';
  if(ok)document.getElementById('goBtn').classList.add('rdy');
}
function gogo(){
  if(!_n||!_t||_n===_t)return;
  S={n:_n,t:_t};
  localStorage.setItem('stl',JSON.stringify(S));
  document.getElementById('setup').classList.add('gone');
  initApp();
}

function rDS(){if(!ds.run)return;if(ds.si>=cl.ss.length){cD();return;}var s=cl.ss[ds.si];if(pl&&pl.pauseVideo){pl.seekTo(s.t);setTimeout(function(){if(pl&&pl.pauseVideo)pl.pauseVideo();},300);}sSub(s.o,ds.sl);var d=document.getElementById('dSD');if(d)d.innerHTML=mBl(s.o,ds.sl);var h=document.getElementById('dH');if(h)h.textContent=ds.nh?gTr(s):'';var mb=document.getElementById('mB');if(mb)mb.style.display='block';uV('🎤 '+t('speak'));ds.hl=0;cST();sVD(s);}
function sSub(tx,sl){document.getElementById('sO').style.display='block';document.getElementById('sT').innerHTML=mBl(tx,sl);}
function mBl(tx,sl){var w=tx.split(/\s+/);if(w.length<=1)return tx;var bc=sl===1?1:sl===2?Math.ceil(w.length*.4):Math.ceil(w.length*.7);var bi={};var step=Math.max(1,Math.floor(w.length/bc));for(var i=0;i<bc&&Object.keys(bi).length<w.length;i++)bi[(step*i+Math.floor(step/2))%w.length]=1;return w.map(function(x,i){return bi[i]?'<span class="bl"></span>':x;}).join(' ');}

var sS=0,wS=false;
function sVD(sn){if(ds.dl)cancelAnimationFrame(ds.dl);sS=Date.now();wS=false;var sk=0;sSHT(sn);function det(){if(!ds.run||!an)return;var d=new Uint8Array(an.frequencyBinCount);an.getByteFrequencyData(d);var v=0;for(var i=0;i<d.length;i++)v+=d[i];v/=d.length;var s=v>25;var dot=document.getElementById('mD');if(dot)dot.className='mic'+(s?' sp':' li');if(s){wS=true;sk++;sS=Date.now();cST();uV('🔴 '+t('lng'));}else if(wS&&Date.now()-sS>1500&&sk>15){ds.sc++;if(ds.sc>=3){ds.sl=Math.min(3,ds.sl+1);ds.sc=0;var sd=document.getElementById('sDD');if(sd)sd.textContent='⭐'.repeat(ds.sl);}aS();return;}ds.dl=requestAnimationFrame(det);}ds.dl=requestAnimationFrame(det);}
function aS(){cancelAnimationFrame(ds.dl);cST();if(pl&&pl.playVideo)pl.playVideo();uV('✅ '+t('great'));ds.si++;setTimeout(function(){if(pl&&pl.pauseVideo)pl.pauseVideo();rDS();},1200);}
function mN(){if(!ds.run)return;ds.sc++;if(ds.sc>=3){ds.sl=Math.min(3,ds.sl+1);ds.sc=0;var sd=document.getElementById('sDD');if(sd)sd.textContent='⭐'.repeat(ds.sl);}aS();}
function uV(x){var v=document.getElementById('vL');if(v)v.textContent=x;}
function sSHT(sn){cST();ds.hl=0;var w=sn.o.split(/\s+/);ds.st=setInterval(function(){if(!ds.run){cST();return;}ds.hl++;if(ds.hl>w.length){cST();sp(sn.o,cl.lang);uV('💡 '+t('fhint'));setTimeout(function(){ds.si++;ds.sc=0;rDS();},3000);return;}var h=w.slice(0,ds.hl).join(' ');sp(h,cl.lang);uV('💡 '+t('hint')+' "'+h+'..."');var st=document.getElementById('sT');if(st)st.innerHTML=w.map(function(x,i){return i<ds.hl?'<span class="hw">'+x+'</span>':'<span class="bl"></span>';}).join(' ');},3000);}
function cST(){if(ds.st){clearInterval(ds.st);ds.st=null;}}
function cD(){ds.run=false;if(ds.dl)cancelAnimationFrame(ds.dl);cST();if(mr&&mr.state!=='inactive')mr.stop();document.getElementById('sO').style.display='none';if(pl&&pl.pauseVideo)pl.pauseVideo();document.getElementById('lC').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;text-align:center"><div style="font-size:48px">🎉</div><div style="font-size:20px;font-weight:800">'+t('done')+'</div><div style="font-size:13px;color:var(--text2)">'+cl.tl+'</div><div class="sl">'+'⭐'.repeat(ds.sl)+'</div><div style="display:flex;gap:8px"><button class="da" onclick="pMD()">▶ '+t('play')+'</button><button class="da pm" onclick="svDub()">💾 '+t('save')+'</button></div><div style="display:flex;gap:8px"><button class="da" onclick="gS3()">🔄 '+t('again')+'</button><button class="da" onclick="goH()">🏠 '+t('home')+'</button></div></div>';}
function pMD(){if(ds.ab)new Audio(URL.createObjectURL(ds.ab)).play();}
function svDub(){if(!ds.ab)return;var r=new FileReader();r.onload=function(){sD.push({tl:cl.tl,dt:new Date().toLocaleDateString(),ad:r.result,st:ds.sl});localStorage.setItem('sd2',JSON.stringify(sD));alert(t('saved'));};r.readAsDataURL(ds.ab);}
function stopD(){ds.run=false;if(ds.dl)cancelAnimationFrame(ds.dl);cST();if(mr&&mr.state!=='inactive')try{mr.stop();}catch(e){}if(ms2){ms2.getTracks().forEach(function(t){t.stop();});ms2=null;}}
function togHint(){ds.nh=!ds.nh;var b=document.getElementById('htB');b.textContent=F[S.n]+' '+(ds.nh?t('hOn'):t('hOff'));b.classList.toggle('off',!ds.nh);var h=document.getElementById('dH');if(h&&cl&&ds.si<cl.ss.length)h.textContent=ds.nh?gTr(cl.ss[ds.si]):'';}
function svN(o,m){if(sN.filter(function(n){return n.en===o;}).length)return;sN.push({en:o,kr:m,dt:new Date().toLocaleDateString()});localStorage.setItem('sn2',JSON.stringify(sN));alert(t('saved'));}

function sp(tx,lang){if(!tx)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(tx);var lm={en:'en-US',ko:'ko-KR',ja:'ja-JP',zh:'zh-CN'};u.lang=lm[lang||S.t]||'en-US';u.rate=0.9;var vs=speechSynthesis.getVoices();var v=vs.filter(function(v){return v.lang.indexOf(u.lang)===0;})[0];if(v)u.voice=v;var ka;u.onstart=function(){ka=setInterval(function(){speechSynthesis.pause();speechSynthesis.resume();},10000);};u.onend=function(){clearInterval(ka);};u.onerror=function(){clearInterval(ka);};speechSynthesis.speak(u);}
speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};

function srTab(tab,el){rT=tab;document.querySelectorAll('.rt').forEach(function(t){t.classList.remove('on');});el.classList.add('on');rRm();}
function rRm(){var l=document.getElementById('rL');if(rT==='d'){if(!sD.length){l.innerHTML='<div class="empty">'+t('noD')+'</div>';return;}l.innerHTML=sD.map(function(d,i){return'<div class="ri"><div class="rin"><div class="rit">'+'⭐'.repeat(d.st||1)+' '+d.tl+'</div><div class="ris">'+d.dt+'</div></div><div style="display:flex;gap:8px"><button class="rb" onclick="new Audio(sD['+i+'].ad).play()">▶</button><button class="rb" onclick="if(confirm(\'Delete?\')){sD.splice('+i+',1);localStorage.setItem(\'sd2\',JSON.stringify(sD));rRm();}">🗑</button></div></div>';}).join('');}else{if(!sN.length){l.innerHTML='<div class="empty">'+t('noN')+'</div>';return;}l.innerHTML=sN.map(function(n,i){return'<div class="ri"><div class="rin"><div class="rit">'+n.en+'</div><div class="ris">'+n.kr+'</div></div><div style="display:flex;gap:8px"><button class="rb" onclick="sp(\''+n.en.replace(/'/g,"\\'")+'\')">🔊</button><button class="rb" onclick="if(confirm(\'Delete?\')){sN.splice('+i+',1);localStorage.setItem(\'sn2\',JSON.stringify(sN));rRm();}">🗑</button></div></div>';}).join('');}}
</script>
