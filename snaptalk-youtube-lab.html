<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>SnapTalk — Snap Dubbing</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c18;--bg2:#0f1525;--bg3:#161d30;--text:#f0f0f0;--text2:#a0a8c0;--accent:#FF6B35;--accent2:#FF8F65;--beginner:#22C55E;--intermediate:#F59E0B;--advanced:#EF4444;--radius:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}button{font-family:inherit;cursor:pointer;border:none;outline:none}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Onboarding */
#ob{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;transition:opacity .3s}
#ob.hide{display:none}
.ob-logo{font-size:34px;font-weight:800;color:var(--accent)}.ob-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
.ob-q{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px;margin-bottom:20px}
.ob-b{padding:18px 10px;border-radius:var(--rs);background:var(--bg2);color:var(--text);font-size:15px;font-weight:600;text-align:center;border:2px solid transparent;transition:.2s}
.ob-b.sel{border-color:var(--accent);background:rgba(255,107,53,.12)}.ob-b .f{font-size:30px;display:block;margin-bottom:4px}
.ob-go{width:100%;max-width:300px;padding:14px;border-radius:var(--rs);font-size:16px;font-weight:700;background:var(--accent);color:#fff;opacity:.35;pointer-events:none;transition:.2s}
.ob-go.rdy{opacity:1;pointer-events:auto}
.ob-st{font-size:12px;color:var(--text2);margin-bottom:12px}

/* Nav */
#nav{display:flex;height:56px;min-height:56px;background:var(--bg2);border-top:1px solid #1a2040;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--text2);font-size:11px;font-weight:500}.nb.on{color:var(--accent)}.nb .ic{font-size:22px}
.sc{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}.sc.on{display:flex}

/* Home */
.hh{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.la{display:flex;align-items:center;gap:10px}.lg{font-size:22px;font-weight:800;color:var(--accent)}.lt{font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:20px}
.ls{padding:6px 14px;border-radius:20px;background:var(--bg3);font-size:14px;font-weight:700;color:var(--accent);border:1.5px solid rgba(255,107,53,.3)}
.chips{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.ch{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text2);border:1.5px solid transparent;transition:.2s;white-space:nowrap}.ch.on{color:#fff;border-color:currentColor}
.feed{padding:0 16px 20px;display:flex;flex-direction:column;gap:14px}
.cd{border-radius:var(--radius);overflow:hidden;background:var(--bg2);cursor:pointer;transition:transform .15s}.cd:active{transform:scale(.97)}
.ct{position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden}.ct img{width:100%;height:100%;object-fit:cover}
.po{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.7));display:flex;align-items:center;justify-content:center}
.pi{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:22px}
.ci{padding:12px 14px}.cn{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.cm{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bd{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase}.bd-b{background:rgba(34,197,94,.15);color:var(--beginner)}.bd-i{background:rgba(245,158,11,.15);color:var(--intermediate)}.bd-a{background:rgba(239,68,68,.15);color:var(--advanced)}
.cs{font-size:11px;color:var(--text2)}.lf{font-size:18px}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}

/* Lesson */

.so{position:absolute;bottom:12px;left:8px;right:8px;text-align:center;z-index:10}
.st{display:inline-block;padding:6px 14px;background:rgba(0,0,0,.75);border-radius:10px;font-size:15px;font-weight:600;line-height:1.5;color:#fff}.st .bl{display:inline-block;min-width:50px;border-bottom:2.5px solid var(--accent);margin:0 3px}.st .hw{color:var(--accent2)}
.ht{position:absolute;top:10px;right:10px;z-index:20;background:rgba(0,0,0,.5);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#fff}.ht.off{opacity:.5}
.bb{position:absolute;top:10px;left:10px;z-index:20;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.pb{display:flex;gap:6px;padding:10px 16px;background:var(--bg2)}.sd{flex:1;height:5px;border-radius:3px;background:#2a3050;transition:.3s}.sd.dn{background:var(--beginner)}.sd.cr{background:var(--accent)}
.lc{flex:1;overflow-y:auto;padding:14px 16px 20px}.lc::-webkit-scrollbar{width:0;display:none}

.ec{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px;border-left:3px solid var(--accent)}
.ee{font-size:16px;font-weight:700;margin-bottom:4px}.ek{font-size:13px;color:var(--text2);margin-bottom:8px}
.ea{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.eb{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--text2);transition:.2s}.eb:active{background:var(--accent);color:#fff}
.en{margin-top:8px;padding:8px 10px;border-radius:8px;background:rgba(255,107,53,.08);font-size:12px;color:var(--accent2);display:none}.en.sh{display:block}
.snb{display:block;width:100%;padding:14px;margin-top:14px;border-radius:var(--rs);font-size:15px;font-weight:700;background:linear-gradient(135deg,#7C3AED,#9333EA);color:#fff;text-align:center}

.ss{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.sn{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px}
.scl{display:flex;flex-wrap:wrap;gap:8px}
.sb{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--text2);transition:.15s}.sb:active{background:var(--accent);color:#fff}
.rv{width:100%;padding:10px;margin-top:8px;border-radius:8px;background:var(--bg2);font-size:14px;line-height:1.6;display:none}.rv.sh{display:block}

.spr{display:flex;gap:8px;justify-content:center}

.vs{text-align:center;padding:10px;border-radius:var(--rs);background:var(--bg3)}
.vi{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.md{width:12px;height:12px;border-radius:50%;background:#555;transition:.2s}.md.li{background:var(--beginner);animation:pu 1s infinite}.md.sp{background:var(--accent);animation:pu .5s infinite}

/* Room */
.rh{padding:16px;font-size:20px;font-weight:800}
.rts{display:flex;padding:0 16px;gap:8px;margin-bottom:14px}
.rt{flex:1;padding:10px;border-radius:var(--rs);text-align:center;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2);transition:.2s}.rt.on{background:var(--accent);color:#fff}

.rin{flex:1}.rit{font-size:14px;font-weight:700}.ris{font-size:12px;color:var(--text2);margin-top:2px}
.rb{padding:6px 12px;border-radius:8px;font-size:18px;background:var(--bg3);color:var(--text2)}

/* Modal */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center}.mo.sh{display:flex}
.ms{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;max-height:70vh;overflow-y:auto}
.mt{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.mp{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--rs);background:var(--bg3);margin-bottom:8px;cursor:pointer;transition:.15s;border:2px solid transparent}
.mp:active,.mp.cur{border-color:var(--accent);background:rgba(255,107,53,.1)}.mpf{font-size:20px}.mpt{font-size:14px;font-weight:600}

function sp(tx,lang){if(!tx)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(tx);const lm={en:'en-US',ko:'ko-KR',ja:'ja-JP',zh:'zh-CN'};u.lang=lm[lang||S.t]||'en-US';u.rate=0.9;const vs=speechSynthesis.getVoices();const v=vs.find(v=>v.lang.startsWith(u.lang));if(v)u.voice=v;let ka;u.onstart=()=>{ka=setInterval(()=>{speechSynthesis.pause();speechSynthesis.resume()},10000)};u.onend=()=>clearInterval(ka);u.onerror=()=>clearInterval(ka);speechSynthesis.speak(u)}
