<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--a:#FF6B35;--bg:#08080f;--c1:#14142a;--c2:#1e1e3c;--t:#eaeaf4;--m:#777799;--g:#4ade80;--r:#f4364c;--cy:#22d3ee;--p:#818cf8;--w:#fbbf24}
body{background:var(--bg);color:var(--t);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;max-width:520px;margin:0 auto}
button{font-family:inherit;cursor:pointer}
.nav{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--c1);position:sticky;top:0;background:var(--bg);z-index:50}
.nav-back{background:none;border:none;color:var(--t);font-size:18px;padding:0 8px 0 0;display:none}
.nav-logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--a),#ff8f65);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-badge{background:var(--a);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:12px;margin-left:4px;vertical-align:top}
.nav-room{background:none;border:1px solid var(--c2);color:var(--m);font-size:11px;padding:5px 10px;border-radius:8px;margin-left:auto;font-weight:600}
.vid-box{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.vid-box iframe{width:100%;height:100%;border:none}
.vid-sub{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.85));pointer-events:none;min-height:50px}
.vid-sub *{pointer-events:auto}
.sub-en{color:#fff;font-size:16px;font-weight:700;text-align:center;line-height:1.5;text-shadow:0 2px 12px rgba(0,0,0,.9)}
.sub-ko{color:rgba(255,255,255,.4);font-size:11px;text-align:center;margin-top:2px}
.vid-badge{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;color:#fff}
.vid-rec{position:absolute;top:6px;right:6px;padding:3px 10px;border-radius:5px;background:rgba(244,54,76,.85);color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;gap:5px}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ct{padding:14px 16px;overflow-y:auto}
.card{background:var(--c1);border:1px solid var(--c2);border-radius:12px;padding:14px;margin-bottom:8px}
.btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:700;color:#fff;transition:.2s}
.btn-a{background:linear-gradient(135deg,var(--a),#ff8f65)}
.btn-r{background:linear-gradient(135deg,var(--r),var(--a))}
.btn-g{background:linear-gradient(135deg,var(--g),var(--cy))}
.btn-p{background:var(--p)}
.btn-d{background:var(--c2);color:var(--t)}
.btn-m{background:var(--c2);color:var(--m)}
.btn-row{display:flex;gap:6px}.btn-row .btn{flex:1}
.pill{display:inline-block;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;border:none}
.mb6{margin-bottom:6px}.mb10{margin-bottom:10px}.mb14{margin-bottom:14px}
.lesson-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--c1);border:1px solid var(--c2);margin-bottom:6px;cursor:pointer;transition:.15s}
.lesson-item:active{transform:scale(.98)}
.lesson-num{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.lesson-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-sub{font-size:11px;color:var(--m)}
.expr-card{padding:12px;border-radius:12px;background:var(--c1);border:1px solid var(--c2);margin-bottom:6px;cursor:pointer;transition:.15s}
.expr-card:active{transform:scale(.98)}
.expr-en{font-size:15px;font-weight:700;margin-bottom:3px}
.expr-ko{font-size:12px;color:var(--a);font-weight:600}
.expr-note{font-size:11px;color:var(--m);margin-top:4px}
.save-btn{background:none;border:1px solid var(--c2);color:var(--m);font-size:11px;padding:3px 8px;border-radius:6px;float:right}
.save-btn.saved{border-color:var(--g);color:var(--g)}
.gw{display:inline-block;border-bottom:2.5px solid var(--a);min-width:24px;color:transparent;background:rgba(255,107,53,.12);border-radius:2px;padding:0 2px;margin:0 1px}
.gw.show{color:var(--g)!important;background:rgba(74,222,128,.1);border-color:var(--g)}
.pbar{height:4px;background:var(--c2);border-radius:2px;overflow:hidden}.pfill{height:100%;border-radius:2px;transition:width .4s}
.room-section{margin-bottom:16px}
.room-label{font-size:12px;font-weight:700;color:var(--a);margin-bottom:8px}
.room-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--c1);border:1px solid var(--c2);margin-bottom:5px}
.room-play{background:var(--g);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.room-del{background:none;border:none;color:var(--m);font-size:14px}
</style>
</head>
<body>
<div class="nav" id="nav">
  <button class="nav-back" id="navBack" onclick="goBack()">←</button>
  <span class="nav-logo">SnapTalk</span>
  <span class="nav-badge">Snap Dubbing</span>
  <button class="nav-room" id="navRoom" onclick="showRoom()">📁 나의방</button>
</div>
<div class="vid-box" id="vidBox" style="display:none">
  <div id="ytPlayer"></div>
  <div id="vidBadge" class="vid-badge" style="display:none"></div>
  <div id="vidRec" class="vid-rec"><span class="rec-dot"></span>REC</div>
  <div class="vid-sub"><div id="subEn" class="sub-en"></div><div id="subKo" class="sub-ko"></div></div>
</div>
<div class="ct" id="ct"></div>
<script>
var tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";document.head.appendChild(tag);
var player,playerReady=false;
function onYouTubeIframeAPIReady(){player=new YT.Player('ytPlayer',{width:'100%',height:'100%',videoId:'',playerVars:{playsinline:1,controls:0,rel:0,modestbranding:1,disablekb:1,fs:0,iv_load_policy:3},events:{onReady:function(){playerReady=true},onStateChange:function(){}}})}
let videoUrl='',videoId='',totalMin=0,splitMin=3,lessons=[],currentLesson=-1;
let savedNotes=JSON.parse(localStorage.getItem('st_notes')||'[]');
let savedDubs=JSON.parse(localStorage.getItem('st_dubs')||'[]');
let history=[];
const $=id=>document.getElementById(id);
function speak(t,r,cb){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r||.82;if(cb)u.onend=cb;speechSynthesis.speak(u)}
function showVid(){$('vidBox').style.display='block'}
function hideVid(){$('vidBox').style.display='none'}
function sub(en,ko){$('subEn').innerHTML=en||'';$('subKo').textContent=ko||''}
function badge(t,bg){const b=$('vidBadge');if(!t){b.style.display='none';return}b.textContent=t;b.style.background=bg||'rgba(255,107,53,.85)';b.style.display='block'}
function extractVid(u){const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s?#]+)/);return m?m[1]:null}
function saveNotes(){localStorage.setItem('st_notes',JSON.stringify(savedNotes))}
function saveDubs(){localStorage.setItem('st_dubs',JSON.stringify(savedDubs))}
function makeGap(text,level){const ws=text.split(' '),p=level===1?.25:level===2?.45:level===3?.65:.8;const n=Math.max(1,Math.round(ws.length*p)),picks=new Set();const cd=ws.map((w,i)=>[w,i]).filter(([w])=>w.length>2);while(picks.size<n&&picks.size<cd.length)picks.add(cd[Math.floor(Math.random()*cd.length)][1]);return ws.map((w,i)=>picks.has(i)?'<span class="gw">'+w+'</span>':w).join(' ')}
function goBack(){history.pop();const p=history[history.length-1];if(!p||p==='home'){history=['home'];showHome()}else if(p==='lessons')showLessons();else if(p==='room')showRoom();else showHome()}
function pushPage(n){history.push(n);$('navBack').style.display=history.length>1?'block':'none'}

function showHome(){
  history=['home'];$('navBack').style.display='none';hideVid();$('navRoom').style.display='block';
  $('ct').innerHTML='<div style="text-align:center;padding:30px 0 20px"><div style="font-size:44px;margin-bottom:8px">🎬✂️</div><h1 style="font-size:21px;font-weight:800;line-height:1.4;margin-bottom:6px">YouTube 영상을<br><span style="color:var(--a)">스냅더빙</span>하세요</h1><p style="font-size:13px;color:var(--m)">영상 URL → 분할 → 학습 → 내 목소리로 더빙!</p></div><div class="card"><p style="font-size:12px;color:var(--m);margin-bottom:8px">YouTube URL</p><input id="urlInput" type="text" placeholder="https://youtube.com/watch?v=..." style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--c2);background:var(--bg);color:var(--t);font-size:14px;outline:none" value="'+videoUrl+'"></div><div class="card"><p style="font-size:12px;color:var(--m);margin-bottom:8px">영상 총 길이 (분)</p><input id="totalInput" type="number" placeholder="예: 18" min="1" max="120" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--c2);background:var(--bg);color:var(--t);font-size:14px;outline:none" value="'+(totalMin||'')+'"></div><div class="card"><p style="font-size:12px;color:var(--m);margin-bottom:10px">몇 분씩 끊을까요? <strong style="color:var(--a)" id="splitLabel">'+splitMin+'분</strong></p><div style="display:flex;gap:6px">'+[2,3,4,5].map(function(n){return '<button onclick="setSplit('+n+')" class="pill" style="flex:1;background:'+(splitMin===n?'rgba(255,107,53,.15)':'var(--c2)')+';color:'+(splitMin===n?'var(--a)':'var(--m)')+';border:'+(splitMin===n?'1.5px solid var(--a)':'1.5px solid transparent')+'">'+n+'분</button>'}).join('')+'</div><p style="font-size:11px;color:var(--m);margin-top:8px;text-align:center">'+(totalMin?'→ '+Math.ceil(totalMin/splitMin)+'개 강의 생성':'')+'</p></div><button class="btn btn-a" onclick="createLessons()">✂️ 스냅 분할하기</button><div style="margin-top:24px"><p style="font-size:11px;color:var(--m);font-weight:600;letter-spacing:1px;margin-bottom:8px">또는 데모 체험 →</p><div class="lesson-item" onclick="loadDemo()"><div class="lesson-num" style="background:rgba(255,107,53,.12);color:var(--a)">🗽</div><div style="flex:1"><div class="lesson-title">NYC Travel — Sarah Funky</div><div class="lesson-sub">18분 영상 · 3분씩 6강</div></div></div></div>';
}
function setSplit(n){splitMin=n;showHome()}
function loadDemo(){videoUrl='https://www.youtube.com/watch?v=4kYFFoWI4Jg';videoId='4kYFFoWI4Jg';totalMin=18;splitMin=3;createLessons()}
function createLessons(){
  if(!videoUrl){var u=$('urlInput')?.value?.trim();if(!u)return alert('YouTube URL을 입력하세요');videoUrl=u;videoId=extractVid(u);if(!videoId)return alert('올바른 YouTube URL을 입력하세요')}
  if(!totalMin){var t=parseInt($('totalInput')?.value);if(!t||t<1)return alert('영상 길이(분)를 입력하세요');totalMin=t}
  var count=Math.ceil(totalMin/splitMin);lessons=[];
  for(var i=0;i<count;i++){var s=i*splitMin,e=Math.min((i+1)*splitMin,totalMin);lessons.push({idx:i,startSec:s*60,endSec:e*60,label:s+':00 ~ '+e+':00',title:(i+1)+'강 — '+s+':00~'+e+':00'})}
  showLessons();
}
function showLessons(){
  pushPage('lessons');hideVid();$('navRoom').style.display='block';
  var dubbed=savedDubs.filter(function(d){return d.videoId===videoId}).length;
  $('ct').innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div><h2 style="font-size:17px;font-weight:800">📋 강의 목록</h2><p style="font-size:11px;color:var(--m)">'+totalMin+'분 영상 · '+splitMin+'분 단위 · '+lessons.length+'강</p></div><div class="pill" style="background:rgba(74,222,128,.12);color:var(--g)">'+dubbed+'/'+lessons.length+' 더빙</div></div>'+lessons.map(function(l,i){var done=savedDubs.some(function(d){return d.videoId===videoId&&d.lesson===i});return '<div class="lesson-item" onclick="openLesson('+i+')"><div class="lesson-num" style="background:'+(done?'rgba(74,222,128,.15)':'rgba(255,107,53,.12)')+';color:'+(done?'var(--g)':'var(--a)')+'">'+(done?'✓':i+1)+'</div><div style="flex:1"><div class="lesson-title">'+l.title+'</div><div class="lesson-sub">'+l.label+' · '+splitMin+'분</div></div><span style="font-size:12px;color:var(--m)">→</span></div>'}).join('');
}
function openLesson(idx){
  currentLesson=idx;pushPage('learn');showVid();$('navRoom').style.display='none';
  var l=lessons[idx];
  if(playerReady){player.loadVideoById({videoId:videoId,startSeconds:l.startSec,endSeconds:l.endSec});player.pauseVideo()}
  badge((idx+1)+'강 · '+l.label,'rgba(255,107,53,.85)');sub('📖 핵심 표현을 먼저 익히세요!','');
  var exprs=getExprs(idx);
  $('ct').innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><h3 style="font-size:15px;font-weight:800">'+(idx+1)+'강 핵심 표현</h3><button class="pill" style="background:rgba(129,140,248,.12);color:var(--p)" onclick="goToDub('+idx+')">🎬 더빙 →</button></div>'+exprs.map(function(e,i){var saved=savedNotes.some(function(n){return n.en===e.en});return '<div class="expr-card" onclick="speak(\''+e.en.replace(/'/g,"\\'")+'\')">'+'<button class="save-btn '+(saved?'saved':'')+'" onclick="event.stopPropagation();toggleNote('+idx+','+i+')" id="saveBtn'+i+'">'+(saved?'✓ 저장됨':'📌 저장')+'</button>'+'<div class="expr-en">🔊 '+e.en+'</div><div class="expr-ko">'+e.ko+'</div>'+(e.note?'<div class="expr-note">💡 '+e.note+'</div>':'')+'</div>'}).join('')+'<div class="card" style="text-align:center;background:rgba(255,107,53,.05);border-color:rgba(255,107,53,.2)"><p style="font-size:13px;font-weight:700;color:var(--a);margin-bottom:4px">표현을 익혔으면?</p><p style="font-size:12px;color:var(--m);margin-bottom:10px">영상 속 주인공 대신 내가 말한다!</p></div><button class="btn btn-r" style="font-size:17px" onclick="goToDub('+idx+')">🎬 스냅더빙 시작!</button>';
}
function toggleNote(li,ei){var exprs=getExprs(li),e=exprs[ei],i=savedNotes.findIndex(function(n){return n.en===e.en});if(i>=0)savedNotes.splice(i,1);else savedNotes.push({en:e.en,ko:e.ko,note:e.note||'',lesson:li+1,date:new Date().toLocaleDateString()});saveNotes();var b=$('saveBtn'+ei);if(b){b.className='save-btn '+(i>=0?'':'saved');b.textContent=i>=0?'📌 저장':'✓ 저장됨'}}

var dubMR=null,dubChunks=[],dubStream=null,dubRunning=false,dubSentIdx=0,dubGapLevel=1,dubStreak=0,dubSents=[],hintMode=true;
function goToDub(idx){currentLesson=idx;pushPage('dub');showVid();$('navRoom').style.display='none';var l=lessons[idx];dubSents=getSents(idx);dubSentIdx=0;dubGapLevel=1;dubStreak=0;dubRunning=false;if(playerReady){player.loadVideoById({videoId:videoId,startSeconds:l.startSec,endSeconds:l.endSec});player.pauseVideo();player.mute()}badge((idx+1)+'강 더빙','rgba(244,54,76,.85)');sub('🎬 더빙 준비','');renderDubReady(idx)}
function renderDubReady(idx){$('ct').innerHTML='<div class="card" style="background:rgba(74,222,128,.04);border-color:rgba(74,222,128,.15)"><p style="font-size:14px;font-weight:700;color:var(--g);margin-bottom:6px">🎬 스냅더빙 — '+(idx+1)+'강</p><p style="font-size:12px;color:var(--m);line-height:1.6">영상이 <strong style="color:var(--a)">음소거</strong>로 재생됩니다.<br>문장마다 영상이 <strong style="color:var(--a)">멈추고</strong> 기다려요.<br>자막을 보고 <strong style="color:var(--a)">내가 직접 말하면</strong> 다음으로!<br>잘하면 빈칸이 늘어납니다 ⭐</p></div><div style="display:flex;gap:6px;margin-bottom:10px"><button class="pill" style="flex:1;background:rgba(251,191,36,.12);color:var(--w);border:none" id="hintToggle" onclick="toggleHint()">🇰🇷 한글힌트 ON</button><button class="pill" style="flex:1;background:var(--c2);color:var(--m);border:none" onclick="speak(dubSents[0]?.en||\'\')">🔊 첫문장 미리듣기</button></div><button class="btn btn-r mb6" style="font-size:18px" onclick="startDub()">🔴 더빙 시작!</button><button class="btn btn-d" onclick="openLesson('+idx+')">← 표현학습으로</button>'}
function toggleHint(){hintMode=!hintMode;var b=$('hintToggle');if(b){b.textContent=hintMode?'🇰🇷 한글힌트 ON':'🇰🇷 한글힌트 OFF';b.style.background=hintMode?'rgba(251,191,36,.12)':'var(--c2)';b.style.color=hintMode?'var(--w)':'var(--m)'}}
async function startDub(){try{dubStream=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e){alert('마이크 허용이 필요해요!');return}dubMR=new MediaRecorder(dubStream);dubChunks=[];dubMR.ondataavailable=function(e){if(e.data.size>0)dubChunks.push(e.data)};dubMR.onstop=function(){var url=URL.createObjectURL(new Blob(dubChunks,{type:'audio/webm'}));dubStream.getTracks().forEach(function(t){t.stop()});finishDub(url)};dubMR.start();dubRunning=true;dubSentIdx=0;dubGapLevel=1;dubStreak=0;$('vidRec').style.display='flex';if(playerReady){var l=lessons[currentLesson];player.seekTo(l.startSec);player.mute();player.playVideo()}showDubSent()}
function showDubSent(){if(dubSentIdx>=dubSents.length){if(playerReady)player.pauseVideo();if(dubMR&&dubMR.state==='recording')dubMR.stop();$('vidRec').style.display='none';return}var s=dubSents[dubSentIdx];if(playerReady)player.pauseVideo();sub(makeGap(s.en,dubGapLevel),hintMode?s.ko:'');badge((dubSentIdx+1)+'/'+dubSents.length+' · '+'⭐'.repeat(Math.min(dubGapLevel,4)),'rgba(244,54,76,.85)');$('ct').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:var(--m)">'+(dubSentIdx+1)+'/'+dubSents.length+'</span><span style="font-size:11px;color:var(--w)">'+'⭐'.repeat(Math.min(dubGapLevel,4))+'</span></div><div class="pbar mb10"><div class="pfill" style="width:'+(dubSentIdx/dubSents.length*100)+'%;background:linear-gradient(90deg,var(--r),var(--a))"></div></div><div class="card" style="text-align:center"><p style="font-size:11px;color:var(--m);margin-bottom:8px">🎤 자막을 보고 큰 소리로 말하세요!</p><button class="btn btn-a mb6" onclick="dubNext(true)" style="font-size:16px">✅ 말했어요!</button><div class="btn-row"><button class="btn btn-d" onclick="speak(\''+s.en.replace(/'/g,"\\'")+'\',0.7)">🔊 듣기</button><button class="btn btn-d" onclick="dubNext(false)">⏭ 건너뛰기</button></div></div><button class="btn btn-m" style="margin-top:8px;font-size:12px" onclick="stopDub()">⏹ 녹음 중단</button>'}
function dubNext(ok){if(ok){dubStreak++;if(dubStreak%3===0&&dubGapLevel<4)dubGapLevel++}else{dubStreak=0;if(dubGapLevel>1)dubGapLevel--}dubSentIdx++;if(playerReady&&dubSentIdx<dubSents.length){var l=lessons[currentLesson],sec=l.startSec+(dubSentIdx*((l.endSec-l.startSec)/dubSents.length));player.seekTo(sec);player.playVideo();setTimeout(function(){if(playerReady)player.pauseVideo();showDubSent()},1500)}else showDubSent()}
function stopDub(){dubRunning=false;if(playerReady)player.pauseVideo();if(dubMR&&dubMR.state==='recording')dubMR.stop();$('vidRec').style.display='none'}
function finishDub(url){dubRunning=false;savedDubs.push({videoId:videoId,lesson:currentLesson,url:url,date:new Date().toLocaleDateString(),title:(currentLesson+1)+'강 더빙'});saveDubs();sub('🎬 더빙 완성!','');badge('완성!','rgba(74,222,128,.85)');$('ct').innerHTML='<div style="text-align:center;padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,107,53,.06),rgba(74,222,128,.06));border:1px solid rgba(255,107,53,.15);margin-bottom:12px"><div style="font-size:40px">🏆🎬</div><h3 style="font-size:18px;font-weight:800;margin:6px 0">'+(currentLesson+1)+'강 더빙 완성!</h3><p style="font-size:12px;color:var(--m)">빈칸 레벨: ⭐'+dubGapLevel+'</p></div><button class="btn btn-g mb6" onclick="playDubResult(\''+url+'\')">▶ 영상 + 내 더빙 재생</button><button class="btn btn-p mb6" onclick="dlAudio(\''+url+'\')">💾 오디오 저장</button><button class="btn btn-d mb6" onclick="goToDub('+currentLesson+')">🔄 다시 녹음</button><button class="btn btn-m" onclick="showLessons()">📋 강의 목록</button>'}
function playDubResult(url){if(playerReady){var l=lessons[currentLesson];player.seekTo(l.startSec);player.mute();player.playVideo()}var a=new Audio(url);a.play();a.onended=function(){if(playerReady)player.pauseVideo()}}
function dlAudio(url){var a=document.createElement('a');a.href=url;a.download='snaptalk-dub-'+(currentLesson+1)+'.webm';a.click()}

function showRoom(){
  pushPage('room');hideVid();$('navRoom').style.display='block';
  $('ct').innerHTML='<h2 style="font-size:18px;font-weight:800;margin-bottom:14px">📁 나의 방</h2><div class="room-section"><div class="room-label">🎬 나의 더빙 ('+savedDubs.length+')</div>'+(savedDubs.length?savedDubs.map(function(d,i){return '<div class="room-item"><button class="room-play" onclick="playRoomDub('+i+')">▶</button><div style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.title+' <span style="color:var(--m);font-size:10px">'+d.date+'</span></div><button class="room-del" onclick="delDub('+i+')">✕</button></div>'}).join(''):'<p style="font-size:12px;color:var(--m);padding:12px">아직 더빙이 없어요!</p>')+'</div><div class="room-section"><div class="room-label">📝 나의 노트 ('+savedNotes.length+')</div>'+(savedNotes.length?savedNotes.map(function(n,i){return '<div class="room-item" onclick="speak(\''+n.en.replace(/'/g,"\\'")+'\')"><span style="font-size:16px">🔊</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+n.en+'</div><div style="font-size:11px;color:var(--a)">'+n.ko+'</div></div><button class="room-del" onclick="event.stopPropagation();delNote('+i+')">✕</button></div>'}).join(''):'<p style="font-size:12px;color:var(--m);padding:12px">📌 저장 버튼으로 표현을 저장하세요!</p>')+'</div>'+(lessons.length?'<button class="btn btn-a" onclick="showLessons()">📋 강의 목록</button>':'');
}
function playRoomDub(i){if(savedDubs[i]?.url){var a=new Audio(savedDubs[i].url);a.play()}}
function delDub(i){savedDubs.splice(i,1);saveDubs();showRoom()}
function delNote(i){savedNotes.splice(i,1);saveNotes();showRoom()}
