<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c18;--bg2:#0f1525;--bg3:#161d30;
  --text:#f0f0f0;--text2:#a0a8c0;
  --accent:#FF6B35;--accent2:#FF8F65;
  --beginner:#22C55E;--intermediate:#F59E0B;--advanced:#EF4444;
  --radius:16px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}

#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* Bottom Nav */
#bottomNav{display:flex;height:56px;min-height:56px;background:var(--bg2);border-top:1px solid #1a2040;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;color:var(--text2);font-size:11px;font-weight:500;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn span.icon{font-size:22px}

.screen{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}

/* Home */
#homeScreen .home-header{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.logo-area{display:flex;align-items:center;gap:10px}
.logo{font-size:22px;font-weight:800;color:var(--accent)}
.logo-tag{font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:20px}
.lang-sel{padding:7px 14px;border-radius:20px;background:var(--bg3);font-size:14px;font-weight:700;color:var(--accent);border:1.5px solid rgba(255,107,53,.3)}

.chips{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text2);border:1.5px solid transparent;transition:all .2s;white-space:nowrap}
.chip.active{color:#fff;border-color:currentColor}

.feed{padding:0 16px 20px;display:flex;flex-direction:column;gap:14px}
.card{border-radius:var(--radius);overflow:hidden;background:var(--bg2);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-thumb{position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.play-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.7));display:flex;align-items:center;justify-content:center}
.play-icon{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:22px}
.card-info{padding:12px 14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase}
.badge-b{background:rgba(34,197,94,.15);color:var(--beginner)}
.badge-i{background:rgba(245,158,11,.15);color:var(--intermediate)}
.badge-a{background:rgba(239,68,68,.15);color:var(--advanced)}
.card-sen{font-size:11px;color:var(--text2)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.8}

/* Lesson */
.video-area{width:100%;aspect-ratio:9/16;max-height:52vh;background:#000;position:relative;flex-shrink:0;overflow:hidden}
.video-area iframe{width:100%;height:100%;border:none}
.subtitle-overlay{position:absolute;bottom:12px;left:8px;right:8px;text-align:center;z-index:10}
.subtitle-text{display:inline-block;padding:6px 14px;background:rgba(0,0,0,.75);border-radius:10px;font-size:15px;font-weight:600;line-height:1.5;color:#fff;backdrop-filter:blur(4px)}
.subtitle-text .blank{display:inline-block;min-width:50px;border-bottom:2.5px solid var(--accent);margin:0 3px}
.subtitle-text .hint-word{color:var(--accent2)}
.hint-toggle{position:absolute;top:10px;right:10px;z-index:20;background:rgba(0,0,0,.5);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#fff;backdrop-filter:blur(6px)}
.hint-toggle.off{opacity:.5}
.back-btn{position:absolute;top:10px;left:10px;z-index:20;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.progress-bar{display:flex;gap:6px;padding:10px 16px;background:var(--bg2)}
.step-dot{flex:1;height:5px;border-radius:3px;background:#2a3050;transition:background .3s}
.step-dot.done{background:var(--beginner)}.step-dot.current{background:var(--accent)}
.lesson-content{flex:1;overflow-y:auto;padding:14px 16px 20px}
.lesson-content::-webkit-scrollbar{width:0;display:none}

.expr-card{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px;border-left:3px solid var(--accent)}
.expr-en{font-size:16px;font-weight:700;margin-bottom:4px}
.expr-kr{font-size:13px;color:var(--text2);margin-bottom:8px}
.expr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.expr-btn{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--text2);transition:all .2s}
.expr-btn:active{background:var(--accent);color:#fff}
.expr-note{margin-top:8px;padding:8px 10px;border-radius:8px;background:rgba(255,107,53,.08);font-size:12px;color:var(--accent2);display:none}
.expr-note.show{display:block}
.step-next-btn{display:block;width:100%;padding:14px;margin-top:14px;border-radius:var(--rs);font-size:15px;font-weight:700;background:linear-gradient(135deg,#7C3AED,#9333EA);color:#fff;text-align:center}

.script-sentence{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.script-num{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px}
.sc-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--text2);transition:all .15s}
.sc-btn:active{background:var(--accent);color:#fff}
.sc-reveal{width:100%;padding:10px;margin-top:8px;border-radius:8px;background:var(--bg2);font-size:14px;line-height:1.6;display:none}
.sc-reveal.show{display:block}

.speed-row{display:flex;gap:8px;justify-content:center}
.speed-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2);transition:all .2s;border:2px solid transparent}
.speed-btn.active{border-color:var(--accent);color:var(--accent)}
.voice-status{text-align:center;padding:10px;border-radius:var(--rs);background:var(--bg3)}
.voice-indicator{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.mic-dot{width:12px;height:12px;border-radius:50%;background:#555;transition:background .2s}
.mic-dot.listening{background:var(--beginner);animation:pulse 1s infinite}
.mic-dot.speaking{background:var(--accent);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dub-display{text-align:center;padding:12px;font-size:18px;font-weight:700;min-height:60px;display:flex;align-items:center;justify-content:center}
.dub-hint{text-align:center;font-size:13px;color:var(--text2);min-height:20px}
.star-level{text-align:center;font-size:22px;letter-spacing:4px}
.dub-btn{padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:700;background:var(--bg3);color:var(--text);transition:all .15s}
.dub-btn:active{transform:scale(.95)}
.dub-btn.primary{background:var(--accent);color:#fff}
.dub-btn.start{background:linear-gradient(135deg,var(--accent),#FF8F65);color:#fff;font-size:16px;padding:14px 32px}
.manual-next{padding:10px 24px;border-radius:20px;background:var(--bg3);color:var(--text2);font-size:13px;font-weight:600;margin:0 auto;display:block}

/* My Room */
.room-header{padding:16px;font-size:20px;font-weight:800}
.room-tabs{display:flex;padding:0 16px;gap:8px;margin-bottom:14px}
.room-tab{flex:1;padding:10px;border-radius:var(--rs);text-align:center;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2);transition:all .2s}
.room-tab.active{background:var(--accent);color:#fff}
.room-list{padding:0 16px 20px}
.room-item{background:var(--bg2);border-radius:var(--rs);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.room-item-title{font-size:14px;font-weight:700}
.room-item-sub{font-size:12px;color:var(--text2);margin-top:2px}
.room-btn{padding:6px 12px;border-radius:8px;font-size:18px;background:var(--bg3);color:var(--text2)}

/* Lang Modal */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;max-height:70vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.lang-pair{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--rs);background:var(--bg3);margin-bottom:8px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.lang-pair:active,.lang-pair.current{border-color:var(--accent);background:rgba(255,107,53,.1)}
.lang-pair .lp-flags{font-size:20px}
.lang-pair .lp-text{font-size:14px;font-weight:600}
</style>
</head>
<body>

<div id="app">
  <!-- HOME -->
  <div id="homeScreen" class="screen active">
    <div class="home-header">
      <div class="logo-area"><div class="logo">SnapTalk</div><div class="logo-tag">Snap Dubbing</div></div>
      <button class="lang-sel" id="langSel" onclick="openLangModal()">🇰🇷→🇺🇸 ▾</button>
    </div>
    <div class="chips" id="chipBox"></div>
    <div class="feed" id="feedBox"></div>
  </div>

  <!-- LESSON -->
  <div id="lessonScreen" class="screen">
    <div class="video-area">
      <button class="back-btn" onclick="goHome()">←</button>
      <div id="ytPlayer"></div>
      <button class="hint-toggle" id="hintToggle" onclick="toggleHint()">🇰🇷 ON</button>
      <div class="subtitle-overlay" id="subOverlay" style="display:none">
        <div class="subtitle-text" id="subText"></div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="step-dot" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>
    <div class="lesson-content" id="lessonContent"></div>
  </div>

  <!-- MY ROOM -->
  <div id="myRoomScreen" class="screen">
    <div class="room-header" id="roomHeader">📁 나의 방</div>
    <div class="room-tabs">
      <button class="room-tab active" onclick="switchRoomTab('dubs',this)">🎬 나의 더빙</button>
      <button class="room-tab" onclick="switchRoomTab('notes',this)">📝 나의 노트</button>
    </div>
    <div class="room-list" id="roomList"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottomNav">
    <button class="nav-btn active" onclick="showScreen('home')" id="navHome"><span class="icon">🏠</span> Home</button>
    <button class="nav-btn" onclick="showScreen('myRoom')" id="navRoom"><span class="icon">📁</span> My Room</button>
  </div>
</div>

<!-- LANG MODAL -->
<div class="modal-bg" id="langModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-sheet">
    <div class="modal-title">언어 변경</div>
    <div id="langPairs"></div>
  </div>
</div>

function initPlayer() {
  destroyPlayer();
  if (!currentLesson.ytId) {
    document.getElementById('ytPlayer').innerHTML = '<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px">' + F[currentLesson.lang] + ' 영상 준비중</div>';
    return;
  }
  if (!ytReady) { setTimeout(initPlayer, 300); return; }
  player = new YT.Player('ytPlayer', {
    videoId: currentLesson.ytId,
    playerVars: {playsinline:1, controls:0, rel:0, modestbranding:1, fs:0},
    events: {onReady: function() { player.setVolume(50); }}
  });
}
function destroyPlayer() { if(player&&player.destroy)try{player.destroy();}catch(e){} player=null; document.getElementById('ytPlayer').innerHTML=''; }
function updateProgress() {
  ['dot1','dot2','dot3'].forEach(function(id,i) {
    var step = i+1;
    document.getElementById(id).className = 'step-dot ' + (currentStep>step?'done':currentStep===step?'current':'');
  });

function setSpeed(s) {
  dubState.speed = s;
  if(player&&player.setPlaybackRate) player.setPlaybackRate(s);
  document.querySelectorAll('.speed-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.indexOf(s===0.5?'0.5':s===1?'1.0':'1.2') >= 0);
  });
}

function startDubbing() {
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    micStream = stream;
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = function(e) { if(e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = function() { dubState.blob = new Blob(recordedChunks,{type:'audio/webm'}); };
    mediaRecorder.start();
    dubState.running = true; dubState.idx = 0; dubState.success = 0; dubState.stars = 1;
    if(player&&player.mute){player.mute();player.setPlaybackRate(dubState.speed);player.seekTo(0);player.playVideo();}
    renderDubUI(); runDubSentence();
  }).catch(function() { alert('마이크 권한이 필요합니다!'); });
}

function renderDubUI() {
  document.getElementById('lessonContent').innerHTML =
    '<div style="display:flex;flex-direction:column;gap:12px">' +
    '<div class="speed-row"><button class="speed-btn' + (dubState.speed===0.5?' active':'') + '" onclick="setSpeed(0.5)">🐢 0.5x</button><button class="speed-btn' + (dubState.speed===1?' active':'') + '" onclick="setSpeed(1)">🚶 1.0x</button><button class="speed-btn' + (dubState.speed===1.2?' active':'') + '" onclick="setSpeed(1.2)">🏃 1.2x</button></div>' +
    '<div class="voice-status"><div class="voice-indicator"><span class="mic-dot" id="micDot"></span><span id="voiceLabel">대기중...</span></div></div>' +
    '<div class="star-level" id="starDisp">⭐</div>' +
    '<div class="dub-display" id="dubDisp"></div>' +
    '<div class="dub-hint" id="dubHint"></div>' +
    '<button class="manual-next" id="manualBtn" onclick="manualNext()" style="display:none">말했어요! →</button></div>';
}

function runDubSentence() {
  if(!dubState.running) return;
  var L = currentLesson;
  if(dubState.idx >= L.sentences.length) { completeDub(); return; }
  var s = L.sentences[dubState.idx];
  if(player&&player.pauseVideo){player.seekTo(s.t);setTimeout(function(){if(player&&player.pauseVideo)player.pauseVideo();},300);}
  showSubtitle(s.o, dubState.stars);
  var d = document.getElementById('dubDisp'); if(d) d.innerHTML = makeBlanks(s.o, dubState.stars);
  var h = document.getElementById('dubHint'); if(h) h.textContent = dubState.showHint ? tr(s) : '';
  var mb = document.getElementById('manualBtn'); if(mb) mb.style.display = 'block';
  updateVoice('🎤 말해보세요!');
  dubState.hintLvl = 0; clearHintTimer(); startVoiceDetect(s);
}
function showSubtitle(text,sl) { document.getElementById('subOverlay').style.display='block'; document.getElementById('subText').innerHTML=makeBlanks(text,sl); }
function makeBlanks(text,sl) {
  var w = text.split(/\s+/); if(w.length<=1) return text;
  var bc = sl===1?1:sl===2?Math.ceil(w.length*.4):Math.ceil(w.length*.7);
  var bi = {}; var step = Math.max(1,Math.floor(w.length/bc));
  for(var i=0;i<bc&&Object.keys(bi).length<w.length;i++) bi[(step*i+Math.floor(step/2))%w.length]=1;
  return w.map(function(x,i){return bi[i]?'<span class="blank"></span>':x;}).join(' ');
}

// Voice Detection
var silenceStart=0, wasSpeaking=false;
function startVoiceDetect(sentence) {
  if(dubState.loop) cancelAnimationFrame(dubState.loop);
  silenceStart=Date.now(); wasSpeaking=false; var spoke=0;
  startHintTimer(sentence);
  function detect() {
    if(!dubState.running||!analyser) return;
    var data=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data);
    var vol=0; for(var i=0;i<data.length;i++)vol+=data[i]; vol/=data.length;
    var speaking=vol>25;
    var dot=document.getElementById('micDot');
    if(dot) dot.className='mic-dot'+(speaking?' speaking':' listening');
    if(speaking){wasSpeaking=true;spoke++;silenceStart=Date.now();clearHintTimer();updateVoice('🔴 듣고 있어요...');}
    else if(wasSpeaking&&Date.now()-silenceStart>1500&&spoke>15){
      dubState.success++;
      if(dubState.success>=3){dubState.stars=Math.min(3,dubState.stars+1);dubState.success=0;var sd=document.getElementById('starDisp');if(sd)sd.textContent='⭐'.repeat(dubState.stars);}
      advanceSentence(); return;
    }
    dubState.loop=requestAnimationFrame(detect);
  }
  dubState.loop=requestAnimationFrame(detect);
}
function advanceSentence() {
  cancelAnimationFrame(dubState.loop); clearHintTimer();
  if(player&&player.playVideo) player.playVideo();
  updateVoice('✅ 좋아요!');
  dubState.idx++;
  setTimeout(function(){if(player&&player.pauseVideo)player.pauseVideo();runDubSentence();},1200);
}
function manualNext() {
  if(!dubState.running) return;
  dubState.success++;
  if(dubState.success>=3){dubState.stars=Math.min(3,dubState.stars+1);dubState.success=0;var sd=document.getElementById('starDisp');if(sd)sd.textContent='⭐'.repeat(dubState.stars);}
  advanceSentence();
}
function updateVoice(txt) { var v=document.getElementById('voiceLabel'); if(v)v.textContent=txt; }

// Progressive Hints
function startHintTimer(sentence) {
  clearHintTimer(); dubState.hintLvl=0;
  var words=sentence.o.split(/\s+/);
  dubState.timer=setInterval(function(){
    if(!dubState.running){clearHintTimer();return;}
    dubState.hintLvl++;
    if(dubState.hintLvl>words.length){clearHintTimer();tts(sentence.o,currentLesson.lang);updateVoice('💡 전체 힌트 후 넘어갑니다');setTimeout(function(){dubState.idx++;dubState.success=0;runDubSentence();},3000);return;}
    var hint=words.slice(0,dubState.hintLvl).join(' ');
    tts(hint,currentLesson.lang);
    updateVoice('💡 힌트: "'+hint+'..."');
    var st=document.getElementById('subText');
    if(st)st.innerHTML=words.map(function(w,i){return i<dubState.hintLvl?'<span class="hint-word">'+w+'</span>':'<span class="blank"></span>';}).join(' ');
  },3000);
}
function clearHintTimer() { if(dubState.timer){clearInterval(dubState.timer);dubState.timer=null;} }

function completeDub() {
  dubState.running=false; cancelAnimationFrame(dubState.loop); clearHintTimer();
  if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  document.getElementById('subOverlay').style.display='none';
  if(player&&player.pauseVideo) player.pauseVideo();
  document.getElementById('lessonContent').innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px;text-align:center">' +
    '<div style="font-size:48px">🎉</div><div style="font-size:20px;font-weight:800">더빙 완료!</div>' +
    '<div style="font-size:13px;color:var(--text2)">' + currentLesson.title + '</div>' +
    '<div class="star-level">' + '⭐'.repeat(dubState.stars) + '</div>' +
    '<div style="display:flex;gap:8px"><button class="dub-btn" onclick="playMyDub()">▶ 내 더빙 듣기</button><button class="dub-btn primary" onclick="saveDub()">💾 저장</button></div>' +
    '<div style="display:flex;gap:8px"><button class="dub-btn" onclick="goStep3()">🔄 다시</button><button class="dub-btn" onclick="goHome()">🏠 홈</button></div></div>';
}
function playMyDub() { if(dubState.blob) new Audio(URL.createObjectURL(dubState.blob)).play(); }
function saveDub() {
  if(!dubState.blob) return;
  var r=new FileReader();
  r.onload=function(){savedDubs.push({title:currentLesson.title,date:new Date().toLocaleDateString(),audioData:r.result,stars:dubState.stars});localStorage.setItem('snap_dubs',JSON.stringify(savedDubs));alert('💾 저장 완료!');};
  r.readAsDataURL(dubState.blob);
}
function stopDubbing() {
  dubState.running=false;
  if(dubState.loop)cancelAnimationFrame(dubState.loop); clearHintTimer();
  if(mediaRecorder&&mediaRecorder.state!=='inactive')try{mediaRecorder.stop();}catch(e){}
  if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
}
function toggleHint() {
  dubState.showHint=!dubState.showHint;
  var btn=document.getElementById('hintToggle');
  btn.textContent=F[S.n]+' '+(dubState.showHint?'ON':'OFF');
  btn.classList.toggle('off',!dubState.showHint);
  var h=document.getElementById('dubHint');
  if(h&&currentLesson&&dubState.idx<currentLesson.sentences.length) h.textContent=dubState.showHint?tr(currentLesson.sentences[dubState.idx]):'';
}
function saveNote(orig,meaning) {
  if(savedNotes.filter(function(n){return n.en===orig;}).length) return;
  savedNotes.push({en:orig,kr:meaning,date:new Date().toLocaleDateString()});
  localStorage.setItem('snap_notes',JSON.stringify(savedNotes));
  alert('📌 저장 완료!');
}

// ═══════════════════════════════════════
// TTS
// ═══════════════════════════════════════
function tts(text, lang) {
  if(!text) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  var langMap = {en:'en-US',ko:'ko-KR',ja:'ja-JP',zh:'zh-CN'};
  u.lang = langMap[lang||S.t] || 'en-US';
  u.rate = 0.9;
  var voices = speechSynthesis.getVoices();
  var v = voices.filter(function(v){return v.lang.indexOf(u.lang)===0;})[0];
  if(v) u.voice = v;
  var keepAlive;
  u.onstart = function(){keepAlive=setInterval(function(){speechSynthesis.pause();speechSynthesis.resume();},10000);};
  u.onend = function(){clearInterval(keepAlive);};
  u.onerror = function(){clearInterval(keepAlive);};
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };

// ═══════════════════════════════════════
// MY ROOM
// ═══════════════════════════════════════
function switchRoomTab(tab,el) {
  roomTab=tab;
  document.querySelectorAll('.room-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderRoom();
}
function renderRoom() {
  var list = document.getElementById('roomList');
  if(roomTab==='dubs'){
    if(!savedDubs.length){list.innerHTML='<div class="empty-state">아직 저장된 더빙이 없어요 🎬<br>숏츠를 골라 더빙해보세요!</div>';return;}
    list.innerHTML=savedDubs.map(function(d,i){
      return '<div class="room-item"><div><div class="room-item-title">'+'⭐'.repeat(d.stars||1)+' '+d.title+'</div><div class="room-item-sub">'+d.date+'</div></div><div style="display:flex;gap:8px"><button class="room-btn" onclick="new Audio(savedDubs['+i+'].audioData).play()">▶</button><button class="room-btn" onclick="if(confirm(\'삭제할까요?\')){savedDubs.splice('+i+',1);localStorage.setItem(\'snap_dubs\',JSON.stringify(savedDubs));renderRoom();}">🗑</button></div></div>';
    }).join('');
  } else {
    if(!savedNotes.length){list.innerHTML='<div class="empty-state">아직 저장된 표현이 없어요 📝<br>Step 1에서 📌 저장해보세요!</div>';return;}
    list.innerHTML=savedNotes.map(function(n,i){
      return '<div class="room-item"><div><div class="room-item-title">'+n.en+'</div><div class="room-item-sub">'+n.kr+'</div></div><div style="display:flex;gap:8px"><button class="room-btn" onclick="tts(\''+n.en.replace(/'/g,"\\'")+'\')">🔊</button><button class="room-btn" onclick="if(confirm(\'삭제할까요?\')){savedNotes.splice('+i+',1);localStorage.setItem(\'snap_notes\',JSON.stringify(savedNotes));renderRoom();}">🗑</button></div></div>';
    }).join('');
  }
}
</script>
