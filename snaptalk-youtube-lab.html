<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--a:#FF6B35;--a2:#ff8f65;--bg:#06060e;--c1:#111128;--c2:#1a1a36;--c3:#242450;--t:#eef0ff;--m:#7778a0;--g:#4ade80;--r:#f4364c;--cy:#22d3ee;--p:#818cf8;--w:#fbbf24;--gold:#ffd700}
body{background:var(--bg);color:var(--t);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}a{color:inherit;text-decoration:none}
.mx{max-width:520px;margin:0 auto;width:100%}

/* === NAV === */
.nav{position:sticky;top:0;z-index:90;background:rgba(6,6,14,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04);padding:0 16px;height:48px;display:flex;align-items:center}
.nav-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tag{background:var(--a);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:5px;letter-spacing:.3px}
.nav-right{margin-left:auto;display:flex;gap:6px}
.nav-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--m);font-size:11px;padding:5px 10px;border-radius:8px;font-weight:600;display:flex;align-items:center;gap:4px}
.nav-btn.active{border-color:var(--a);color:var(--a);background:rgba(255,107,53,.08)}

/* === BOTTOM TAB === */
.tab{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(6,6,14,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.05);display:flex;padding:6px 0 env(safe-area-inset-bottom,8px)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;color:var(--m);font-size:10px;font-weight:600;border:none;background:none}
.tab-item.on{color:var(--a)}
.tab-item .ti{font-size:20px}

/* === VIDEO === */
.vid-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.vid-wrap iframe{width:100%;height:100%;border:none}
.vid-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.88));pointer-events:none;min-height:44px}
.vid-overlay *{pointer-events:auto}
.sub-en{color:#fff;font-size:16px;font-weight:700;text-align:center;line-height:1.5;text-shadow:0 2px 12px rgba(0,0,0,.9)}
.sub-ko{color:rgba(255,255,255,.4);font-size:11px;text-align:center;margin-top:2px}
.vid-badge{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;color:#fff;display:none}
.vid-rec{position:absolute;top:6px;right:6px;padding:3px 10px;border-radius:5px;background:rgba(244,54,76,.88);color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;gap:5px}
.rdot{width:7px;height:7px;border-radius:50%;background:#fff;animation:bk 1s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}

/* === CONTENT === */
.ct{padding:0 16px 80px}

/* === HERO === */
.hero{text-align:center;padding:32px 0 24px}
.hero-icon{font-size:48px;margin-bottom:10px}
.hero h1{font-size:24px;font-weight:800;line-height:1.4;margin-bottom:6px}
.hero h1 span{color:var(--a)}
.hero p{font-size:13px;color:var(--m);line-height:1.5}

/* === TIER CARDS === */
.tier{border-radius:16px;padding:18px;margin-bottom:12px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.tier:active{transform:scale(.98)}
.tier-free{background:linear-gradient(135deg,rgba(34,211,238,.06),rgba(129,140,248,.06));border:1.5px solid rgba(34,211,238,.15)}
.tier-pro{background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(255,215,0,.05));border:1.5px solid rgba(255,107,53,.2)}
.tier-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700;margin-bottom:8px}
.tier h3{font-size:17px;font-weight:800;margin-bottom:4px}
.tier p{font-size:12px;color:var(--m);line-height:1.5}
.tier-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--m)}
.tier-pro .tier-badge{background:rgba(255,107,53,.15);color:var(--a)}
.tier-free .tier-badge{background:rgba(34,211,238,.12);color:var(--cy)}

/* === CATEGORY === */
.cat-title{font-size:14px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-card{min-width:140px;border-radius:14px;overflow:hidden;background:var(--c1);border:1px solid var(--c2);flex-shrink:0;cursor:pointer;transition:.15s}
.cat-card:active{transform:scale(.97)}
.cat-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px}
.cat-info{padding:8px 10px}
.cat-name{font-size:12px;font-weight:700}
.cat-sub{font-size:10px;color:var(--m);margin-top:2px}

/* === LESSON LIST === */
.ls-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--c1);border:1px solid var(--c2);margin-bottom:6px;cursor:pointer;transition:.15s}
.ls-item:active{transform:scale(.98)}
.ls-num{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.ls-title{font-size:13px;font-weight:700}
.ls-sub{font-size:11px;color:var(--m)}

/* === CARDS & BUTTONS === */
.card{background:var(--c1);border:1px solid var(--c2);border-radius:14px;padding:14px;margin-bottom:8px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;color:#fff;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-a{background:linear-gradient(135deg,var(--a),var(--a2))}
.btn-r{background:linear-gradient(135deg,var(--r),var(--a))}
.btn-g{background:linear-gradient(135deg,var(--g),var(--cy))}
.btn-p{background:var(--p)}
.btn-d{background:var(--c2);color:var(--t)}
.btn-m{background:var(--c2);color:var(--m)}
.btn-row{display:flex;gap:6px}.btn-row .btn{flex:1}
.pill{display:inline-block;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;border:none}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb14{margin-bottom:14px}

/* === EXPRESSION === */
.ex-card{padding:12px;border-radius:12px;background:var(--c1);border:1px solid var(--c2);margin-bottom:6px;cursor:pointer;transition:.15s}
.ex-card:active{transform:scale(.98)}
.save-btn{background:none;border:1px solid var(--c2);color:var(--m);font-size:11px;padding:3px 8px;border-radius:6px;float:right}
.save-btn.saved{border-color:var(--g);color:var(--g)}

/* === GAP WORD === */
.gw{display:inline-block;border-bottom:2.5px solid var(--a);min-width:22px;color:transparent;background:rgba(255,107,53,.1);border-radius:2px;padding:0 2px;margin:0 1px}
.gw.show{color:var(--g)!important;background:rgba(74,222,128,.08);border-color:var(--g)}

/* === PROGRESS === */
.pbar{height:4px;background:var(--c2);border-radius:2px;overflow:hidden}.pfill{height:100%;border-radius:2px;transition:width .4s}

/* === ROOM === */
.room-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--c1);border:1px solid var(--c2);margin-bottom:5px}
.room-play{background:var(--g);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.room-del{background:none;border:none;color:var(--m);font-size:14px}

/* === PREMIUM INPUT === */
.pro-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--c3);background:var(--c1);color:var(--t);font-size:14px;outline:none;transition:.2s}
.pro-input:focus{border-color:var(--a)}
.pro-input::placeholder{color:var(--m)}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <span class="nav-logo">SnapTalk</span>
  <span class="nav-tag">Snap Dubbing</span>
</div>

<!-- VIDEO (hidden until needed) -->
<div class="vid-wrap" id="vidBox" style="display:none">
  <div id="ytPlayer"></div>
  <div id="vidBadge" class="vid-badge"></div>
  <div id="vidRec" class="vid-rec"><span class="rdot"></span>REC</div>
  <div class="vid-overlay"><div id="subEn" class="sub-en"></div><div id="subKo" class="sub-ko"></div></div>
</div>

<!-- CONTENT -->
<div class="ct mx" id="ct"></div>

<!-- BOTTOM TAB -->
<div class="tab">
  <button class="tab-item on" id="tabHome" onclick="showMain()"><span class="ti">🏠</span>홈</button>
  <button class="tab-item" id="tabLib" onclick="showLibrary()"><span class="ti">📚</span>라이브러리</button>
  <button class="tab-item" id="tabStudio" onclick="showStudio()"><span class="ti">✂️</span>스튜디오</button>
  <button class="tab-item" id="tabRoom" onclick="showRoom()"><span class="ti">📁</span>나의방</button>
</div>

<script>
// === YT API ===
var tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";document.head.appendChild(tag);
var player,playerReady=false;
function onYouTubeIframeAPIReady(){player=new YT.Player('ytPlayer',{width:'100%',height:'100%',videoId:'',playerVars:{playsinline:1,controls:0,rel:0,modestbranding:1,disablekb:1,fs:0,iv_load_policy:3},events:{onReady:function(){playerReady=true}}})}

// === STATE ===
let videoUrl='',videoId='',totalMin=0,splitMin=3,lessons=[],curLesson=-1;
let savedNotes=JSON.parse(localStorage.getItem('sn')||'[]');
let savedDubs=JSON.parse(localStorage.getItem('sd')||'[]');
const $=id=>document.getElementById(id);
function speak(t,r,cb){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r||.82;if(cb)u.onend=cb;speechSynthesis.speak(u)}
function showVid(){$('vidBox').style.display='block'}
function hideVid(){$('vidBox').style.display='none'}
function sub(en,ko){$('subEn').innerHTML=en||'';$('subKo').textContent=ko||''}
function badge(t,bg){const b=$('vidBadge');if(!t){b.style.display='none';return}b.textContent=t;b.style.background=bg||'rgba(255,107,53,.85)';b.style.display='block'}
function extractVid(u){const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s?#]+)/);return m?m[1]:null}
function saveN(){localStorage.setItem('sn',JSON.stringify(savedNotes))}
function saveD(){localStorage.setItem('sd',JSON.stringify(savedDubs))}
function makeGap(t,lv){const ws=t.split(' '),p=lv===1?.25:lv===2?.45:lv===3?.65:.8;const n=Math.max(1,Math.round(ws.length*p)),pk=new Set(),cd=ws.map((w,i)=>[w,i]).filter(([w])=>w.length>2);while(pk.size<n&&pk.size<cd.length)pk.add(cd[Math.floor(Math.random()*cd.length)][1]);return ws.map((w,i)=>pk.has(i)?'<span class="gw">'+w+'</span>':w).join(' ')}
function setTab(id){document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('on'));$(id)?.classList.add('on')}

// === LIBRARY DATA ===
const LIB=[
  {id:'travel-nyc',cat:'travel',icon:'🗽',title:'NYC 여행 첫날',sub:'Sarah Funky · 18분 · 6강',vid:'4kYFFoWI4Jg',dur:18,split:3,bg:'linear-gradient(135deg,#1e3c72,#2a5298)'},
  {id:'travel-london',cat:'travel',icon:'🇬🇧',title:'런던 워킹투어',sub:'Travel Vlog · 15분 · 5강',vid:'dQw4w9WgXcQ',dur:15,split:3,bg:'linear-gradient(135deg,#373B44,#4286f4)'},
  {id:'travel-tokyo',cat:'travel',icon:'🗼',title:'도쿄 3일 여행',sub:'Japan Guide · 12분 · 4강',vid:'dQw4w9WgXcQ',dur:12,split:3,bg:'linear-gradient(135deg,#c94b4b,#4b134f)'},
  {id:'biz-meeting',cat:'business',icon:'💼',title:'영어 미팅 필수 표현',sub:'Business English · 9분 · 3강',vid:'dQw4w9WgXcQ',dur:9,split:3,bg:'linear-gradient(135deg,#0f2027,#2c5364)'},
  {id:'biz-email',cat:'business',icon:'📧',title:'이메일 영어',sub:'Professional · 12분 · 4강',vid:'dQw4w9WgXcQ',dur:12,split:3,bg:'linear-gradient(135deg,#141E30,#243B55)'},
  {id:'daily-cafe',cat:'daily',icon:'☕',title:'카페 주문 영어',sub:'Daily English · 6분 · 2강',vid:'dQw4w9WgXcQ',dur:6,split:3,bg:'linear-gradient(135deg,#3E2723,#795548)'},
  {id:'daily-shop',cat:'daily',icon:'🛍️',title:'쇼핑 영어',sub:'Shopping · 9분 · 3강',vid:'dQw4w9WgXcQ',dur:9,split:3,bg:'linear-gradient(135deg,#134e5e,#71b280)'},
  {id:'news-tech',cat:'news',icon:'📱',title:'테크 뉴스 영어',sub:'CNN Style · 6분 · 2강',vid:'dQw4w9WgXcQ',dur:6,split:3,bg:'linear-gradient(135deg,#0f0c29,#302b63)'},
];
const CATS=[
  {id:'travel',icon:'✈️',name:'여행 영어',color:'var(--cy)'},
  {id:'business',icon:'💼',name:'비즈니스',color:'var(--p)'},
  {id:'daily',icon:'☕',name:'일상 영어',color:'var(--g)'},
  {id:'news',icon:'📰',name:'뉴스/시사',color:'var(--w)'},
];

// =========================
// === MAIN HOME ===
// =========================
function showMain(){
  hideVid();setTab('tabHome');
  $('ct').innerHTML=`
    <div class="hero">
      <div class="hero-icon">🎬✂️🎙️</div>
      <h1>YouTube 영상을<br><span>스냅더빙</span>하세요</h1>
      <p>영상 속 주인공 대신 내가 말한다!<br>내 목소리로 더빙하면서 영어가 는다.</p>
    </div>

    <!-- FREE LIBRARY -->
    <div class="tier tier-free" onclick="showLibrary()">
      <span class="tier-badge">무료 · FREE</span>
      <h3>📚 라이브러리</h3>
      <p>여행, 비즈니스, 일상 등<br>준비된 영상으로 바로 더빙 연습!</p>
      <span class="tier-arrow">→</span>
    </div>

    <!-- PREMIUM STUDIO -->
    <div class="tier tier-pro" onclick="showStudio()">
      <span class="tier-badge">프리미엄 · PRO</span>
      <h3>✂️ 나만의 스튜디오</h3>
      <p>내가 원하는 YouTube 영상을<br>직접 잘라서 맞춤형 더빙!</p>
      <span class="tier-arrow">→</span>
    </div>

    <!-- POPULAR -->
    <div class="cat-title">🔥 인기 콘텐츠</div>
    <div class="cat-scroll">
      ${LIB.slice(0,4).map(l=>`
        <div class="cat-card" onclick="openLib('${l.id}')">
          <div class="cat-img" style="background:${l.bg}">${l.icon}</div>
          <div class="cat-info"><div class="cat-name">${l.title}</div><div class="cat-sub">${l.sub}</div></div>
        </div>
      `).join('')}
    </div>

    <!-- HOW IT WORKS -->
    <div class="cat-title">📖 이렇게 배워요</div>
    <div class="card" style="padding:12px">
      ${[
        ['✂️','영상 분할','긴 영상을 3분씩 잘라서 강의로'],
        ['📖','표현 학습','핵심 표현 먼저 익히기 + 노트 저장'],
        ['🎬','스냅더빙','영상 속 주인공 대신 내가 말한다!'],
        ['📁','나의 방','더빙 녹음 + 나만의 노트 보관'],
      ].map(([icon,t,d])=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${icon==='📁'?'':'border-bottom:1px solid var(--c2)'}">
          <span style="font-size:20px;width:28px;text-align:center">${icon}</span>
          <div><div style="font-size:13px;font-weight:700">${t}</div><div style="font-size:11px;color:var(--m)">${d}</div></div>
        </div>
      `).join('')}
    </div>
  `;
}

// =========================
// === LIBRARY ===
// =========================
function showLibrary(){
  hideVid();setTab('tabLib');
  $('ct').innerHTML=`
    <h2 style="font-size:18px;font-weight:800;margin:16px 0 4px">📚 라이브러리</h2>
    <p style="font-size:12px;color:var(--m);margin-bottom:14px">준비된 영상으로 바로 더빙 연습하세요!</p>
    ${CATS.map(c=>`
      <div class="cat-title" style="color:${c.color}">${c.icon} ${c.name}</div>
      <div class="cat-scroll">
        ${LIB.filter(l=>l.cat===c.id).map(l=>`
          <div class="cat-card" onclick="openLib('${l.id}')">
            <div class="cat-img" style="background:${l.bg}">${l.icon}</div>
            <div class="cat-info"><div class="cat-name">${l.title}</div><div class="cat-sub">${l.sub}</div></div>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `;
}

function openLib(id){
  const lib=LIB.find(l=>l.id===id);if(!lib)return;
  videoUrl='https://youtube.com/watch?v='+lib.vid;videoId=lib.vid;totalMin=lib.dur;splitMin=lib.split;
  buildLessons();showLessons(lib.title,lib.icon);
}

// =========================
// === PREMIUM STUDIO ===
// =========================
function showStudio(){
  hideVid();setTab('tabStudio');
  $('ct').innerHTML=`
    <div style="text-align:center;padding:24px 0 16px">
      <div style="font-size:40px;margin-bottom:6px">✂️</div>
      <h2 style="font-size:20px;font-weight:800;margin-bottom:4px">나만의 스튜디오</h2>
      <div class="pill" style="background:rgba(255,107,53,.12);color:var(--a);margin-bottom:8px">PRO</div>
      <p style="font-size:13px;color:var(--m)">내가 원하는 YouTube 영상으로<br>맞춤형 더빙 수업을 만드세요!</p>
    </div>
    <div class="card">
      <p style="font-size:12px;color:var(--m);margin-bottom:8px">YouTube URL</p>
      <input class="pro-input mb8" id="urlIn" type="text" placeholder="https://youtube.com/watch?v=..." value="${videoUrl}">
      <p style="font-size:12px;color:var(--m);margin-bottom:8px">영상 총 길이 (분)</p>
      <input class="pro-input mb10" id="durIn" type="number" placeholder="예: 18" value="${totalMin||''}">
      <p style="font-size:12px;color:var(--m);margin-bottom:8px">몇 분씩 끊을까요?</p>
      <div style="display:flex;gap:6px;margin-bottom:14px">
        ${[2,3,4,5].map(n=>`<button onclick="splitMin=${n};showStudio()" class="pill" style="flex:1;background:${splitMin===n?'rgba(255,107,53,.15)':'var(--c2)'};color:${splitMin===n?'var(--a)':'var(--m)'};border:${splitMin===n?'1.5px solid var(--a)':'1.5px solid transparent'}">${n}분</button>`).join('')}
      </div>
      <button class="btn btn-a" onclick="studioCreate()">✂️ 스냅 분할하기</button>
    </div>
  `;
}

function studioCreate(){
  const u=$('urlIn')?.value?.trim();if(!u)return alert('YouTube URL을 입력하세요');
  const vid=extractVid(u);if(!vid)return alert('올바른 YouTube URL이 아니에요');
  const d=parseInt($('durIn')?.value);if(!d||d<1)return alert('영상 길이(분)를 입력하세요');
  videoUrl=u;videoId=vid;totalMin=d;
  buildLessons();showLessons('내 영상','✂️');
}

// =========================
// === LESSONS ===
// =========================
function buildLessons(){
  const cnt=Math.ceil(totalMin/splitMin);lessons=[];
  for(let i=0;i<cnt;i++){const s=i*splitMin,e=Math.min((i+1)*splitMin,totalMin);
    lessons.push({idx:i,ss:s*60,es:e*60,label:s+':00~'+e+':00',title:(i+1)+'강 — '+s+':00~'+e+':00'})}
}

function showLessons(title,icon){
  hideVid();setTab('tabLib');
  const dubbed=savedDubs.filter(d=>d.vid===videoId).length;
  $('ct').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin:14px 0 4px;cursor:pointer" onclick="showLibrary()">
      <span style="font-size:14px">←</span>
      <span style="font-size:24px">${icon||'🎬'}</span>
      <div><h2 style="font-size:17px;font-weight:800">${title||'강의 목록'}</h2>
      <p style="font-size:11px;color:var(--m)">${totalMin}분 · ${splitMin}분 단위 · ${lessons.length}강</p></div>
      <div class="pill" style="margin-left:auto;background:rgba(74,222,128,.1);color:var(--g)">${dubbed}/${lessons.length}</div>
    </div>
    ${lessons.map((l,i)=>{
      const done=savedDubs.some(d=>d.vid===videoId&&d.lesson===i);
      return `<div class="ls-item" onclick="openLearn(${i})">
        <div class="ls-num" style="background:${done?'rgba(74,222,128,.12)':'rgba(255,107,53,.1)'};color:${done?'var(--g)':'var(--a)'}">${done?'✓':i+1}</div>
        <div style="flex:1"><div class="ls-title">${l.title}</div><div class="ls-sub">${l.label}</div></div>
        <span style="color:var(--m)">→</span>
      </div>`}).join('')}
  `;
}

// =========================
// === LEARN EXPRESSIONS ===
// =========================
function openLearn(idx){
  curLesson=idx;showVid();
  const l=lessons[idx];
  if(playerReady){player.loadVideoById({videoId,startSeconds:l.ss,endSeconds:l.es});player.pauseVideo()}
  badge((idx+1)+'강','rgba(255,107,53,.85)');sub('📖 핵심 표현을 먼저 익히세요!','');
  const ex=getEx(idx);
  $('ct').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin:10px 0">
      <h3 style="font-size:15px;font-weight:800">${idx+1}강 핵심 표현</h3>
      <button class="pill" style="background:rgba(244,54,76,.1);color:var(--r)" onclick="goDub(${idx})">🎬 더빙 →</button>
    </div>
    ${ex.map((e,i)=>{const sv=savedNotes.some(n=>n.en===e.en);return `
      <div class="ex-card" onclick="speak('${e.en.replace(/'/g,"\\'")}')">
        <button class="save-btn ${sv?'saved':''}" onclick="event.stopPropagation();togNote(${idx},${i})" id="sb${i}">${sv?'✓ 저장됨':'📌 저장'}</button>
        <div style="font-size:15px;font-weight:700;margin-bottom:3px">🔊 ${e.en}</div>
        <div style="font-size:12px;color:var(--a);font-weight:600">${e.ko}</div>
        ${e.note?'<div style="font-size:11px;color:var(--m);margin-top:4px">💡 '+e.note+'</div>':''}
      </div>`}).join('')}
    <button class="btn btn-r mb6" style="font-size:17px;margin-top:8px" onclick="goDub(${idx})">🎬 스냅더빙 시작!</button>
    <button class="btn btn-d" onclick="showLessons()">← 강의 목록</button>
  `;
}
function togNote(li,ei){const ex=getEx(li),e=ex[ei],i=savedNotes.findIndex(n=>n.en===e.en);if(i>=0)savedNotes.splice(i,1);else savedNotes.push({en:e.en,ko:e.ko,note:e.note||'',date:new Date().toLocaleDateString()});saveN();const b=$('sb'+ei);if(b){b.className='save-btn '+(i>=0?'':'saved');b.textContent=i>=0?'📌 저장':'✓ 저장됨'}}

// =========================
// === SNAP DUBBING ===
// =========================
let dubMR=null,dubCh=[],dubStr=null,dubRun=false,dubSI=0,dubGL=1,dubSk=0,dubSents=[],hintOn=true;
function goDub(idx){curLesson=idx;showVid();
  dubSents=getSe(idx);dubSI=0;dubGL=1;dubSk=0;dubRun=false;
  const l=lessons[idx];
  if(playerReady){player.loadVideoById({videoId,startSeconds:l.ss,endSeconds:l.es});player.pauseVideo();player.mute()}
  badge((idx+1)+'강 더빙','rgba(244,54,76,.85)');sub('🎬 더빙 준비!','');
  $('ct').innerHTML=`
    <div class="card" style="background:rgba(74,222,128,.03);border-color:rgba(74,222,128,.12)">
      <p style="font-size:14px;font-weight:700;color:var(--g);margin-bottom:6px">🎬 스냅더빙</p>
      <p style="font-size:12px;color:var(--m);line-height:1.6">
        영상이 <strong style="color:var(--a)">음소거</strong>로 재생됩니다.<br>
        문장마다 <strong style="color:var(--a)">멈추고</strong> 기다려요.<br>
        자막 보고 <strong style="color:var(--a)">내가 직접 말하면</strong> 다음으로!<br>
        잘하면 빈칸↑ ⭐</p>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="pill" style="flex:1;background:${hintOn?'rgba(251,191,36,.12)':'var(--c2)'};color:${hintOn?'var(--w)':'var(--m)'};border:none" onclick="hintOn=!hintOn;goDub(${idx})">🇰🇷 한글힌트 ${hintOn?'ON':'OFF'}</button>
      <button class="pill" style="flex:1;background:var(--c2);color:var(--m);border:none" onclick="speak(dubSents[0]?.en||'')">🔊 미리듣기</button>
    </div>
    <button class="btn btn-r mb6" style="font-size:18px" onclick="startDub()">🔴 더빙 시작!</button>
    <button class="btn btn-d" onclick="openLearn(${idx})">← 표현학습</button>
  `;
}
async function startDub(){
  try{dubStr=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e){alert('마이크 허용 필요!');return}
  dubMR=new MediaRecorder(dubStr);dubCh=[];
  dubMR.ondataavailable=e=>{if(e.data.size>0)dubCh.push(e.data)};
  dubMR.onstop=()=>{const url=URL.createObjectURL(new Blob(dubCh,{type:'audio/webm'}));dubStr.getTracks().forEach(t=>t.stop());finDub(url)};
  dubMR.start();dubRun=true;dubSI=0;dubGL=1;dubSk=0;
  $('vidRec').style.display='flex';
  if(playerReady){player.seekTo(lessons[curLesson].ss);player.mute();player.playVideo()}
  showSent()
}
function showSent(){
  if(dubSI>=dubSents.length){if(playerReady)player.pauseVideo();if(dubMR?.state==='recording')dubMR.stop();$('vidRec').style.display='none';return}
  const s=dubSents[dubSI];if(playerReady)player.pauseVideo();
  sub(makeGap(s.en,dubGL),hintOn?s.ko:'');
  badge((dubSI+1)+'/'+dubSents.length+' ⭐'+dubGL,'rgba(244,54,76,.85)');
  $('ct').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:11px;color:var(--m)">${dubSI+1}/${dubSents.length}</span>
      <span style="font-size:11px;color:var(--w)">${'⭐'.repeat(Math.min(dubGL,4))}</span>
    </div>
    <div class="pbar mb10"><div class="pfill" style="width:${(dubSI/dubSents.length)*100}%;background:linear-gradient(90deg,var(--r),var(--a))"></div></div>
    <div class="card" style="text-align:center">
      <p style="font-size:11px;color:var(--m);margin-bottom:8px">🎤 자막 보고 큰 소리로!</p>
      <button class="btn btn-a mb6" onclick="dubOk(true)" style="font-size:16px">✅ 말했어요!</button>
      <div class="btn-row">
        <button class="btn btn-d" onclick="speak('${s.en.replace(/'/g,"\\'")}',0.7)">🔊 듣기</button>
        <button class="btn btn-d" onclick="dubOk(false)">⏭ 건너뛰기</button>
      </div>
    </div>
    <button class="btn btn-m" style="margin-top:8px;font-size:12px" onclick="stopDub()">⏹ 중단</button>
  `;
}
function dubOk(ok){if(ok){dubSk++;if(dubSk%3===0&&dubGL<4)dubGL++}else{dubSk=0;if(dubGL>1)dubGL--}dubSI++;
  if(playerReady&&dubSI<dubSents.length){const l=lessons[curLesson],sec=l.ss+(dubSI*((l.es-l.ss)/dubSents.length));player.seekTo(sec);player.playVideo();setTimeout(()=>{if(playerReady)player.pauseVideo();showSent()},1500)}else showSent()}
function stopDub(){dubRun=false;if(playerReady)player.pauseVideo();if(dubMR?.state==='recording')dubMR.stop();$('vidRec').style.display='none'}
function finDub(url){dubRun=false;savedDubs.push({vid:videoId,lesson:curLesson,url,date:new Date().toLocaleDateString(),title:(curLesson+1)+'강 더빙'});saveD();
  sub('🎬 더빙 완성!','');badge('완성!','rgba(74,222,128,.85)');
  $('ct').innerHTML=`
    <div style="text-align:center;padding:18px;border-radius:14px;background:linear-gradient(135deg,rgba(255,107,53,.05),rgba(74,222,128,.05));border:1px solid rgba(255,107,53,.12);margin-bottom:12px">
      <div style="font-size:40px">🏆🎬</div>
      <h3 style="font-size:18px;font-weight:800;margin:6px 0">${curLesson+1}강 더빙 완성!</h3>
      <p style="font-size:12px;color:var(--m)">빈칸 레벨: ⭐${dubGL}</p>
    </div>
    <button class="btn btn-g mb6" onclick="playDub('${url}')">▶ 영상 + 내 더빙 재생</button>
    <button class="btn btn-p mb6" onclick="dlAudio('${url}')">💾 오디오 저장</button>
    <button class="btn btn-d mb6" onclick="goDub(${curLesson})">🔄 다시 녹음</button>
    <button class="btn btn-m" onclick="showLessons()">📋 강의 목록</button>`}
function playDub(url){if(playerReady){player.seekTo(lessons[curLesson].ss);player.mute();player.playVideo()}const a=new Audio(url);a.play();a.onended=()=>{if(playerReady)player.pauseVideo()}}
function dlAudio(url){const a=document.createElement('a');a.href=url;a.download='snaptalk-dub.webm';a.click()}

// =========================
// === MY ROOM ===
// =========================
function showRoom(){
  hideVid();setTab('tabRoom');
  $('ct').innerHTML=`
    <h2 style="font-size:18px;font-weight:800;margin:14px 0 4px">📁 나의 방</h2>
    <p style="font-size:12px;color:var(--m);margin-bottom:14px">더빙 녹음과 저장한 표현을 관리하세요</p>

    <div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--a);margin-bottom:8px">🎬 나의 더빙 (${savedDubs.length})</div>
      ${savedDubs.length?savedDubs.map((d,i)=>`
        <div class="room-item">
          <button class="room-play" onclick="if(d='${d.url}')new Audio(d).play()">▶</button>
          <div style="flex:1;font-size:12px">${d.title} <span style="color:var(--m);font-size:10px">${d.date}</span></div>
          <button class="room-del" onclick="savedDubs.splice(${i},1);saveD();showRoom()">✕</button>
        </div>
      `).join(''):'<p style="font-size:12px;color:var(--m);padding:10px">아직 더빙이 없어요!</p>'}
    </div>

    <div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--p);margin-bottom:8px">📝 나의 노트 (${savedNotes.length})</div>
      ${savedNotes.length?savedNotes.map((n,i)=>`
        <div class="room-item" onclick="speak('${n.en.replace(/'/g,"\\'")}')">
          <span style="font-size:16px">🔊</span>
          <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${n.en}</div><div style="font-size:11px;color:var(--a)">${n.ko}</div></div>
          <button class="room-del" onclick="event.stopPropagation();savedNotes.splice(${i},1);saveN();showRoom()">✕</button>
        </div>
      `).join(''):'<p style="font-size:12px;color:var(--m);padding:10px">📌 표현학습에서 저장해보세요!</p>'}
    </div>
  `;
}

// === DATA ===
function getEx(i){const b=[[{en:"you gotta see this",ko:"이거 꼭 봐야 해",note:"gotta = got to"},{en:"I couldn't believe my eyes",ko:"내 눈을 의심했어",note:"감탄 표현"},{en:"it's absolutely stunning",ko:"정말 놀라워",note:"stunning = 놀라운"},{en:"at least once in your life",ko:"인생에 한 번은"},{en:"welcome to New York City",ko:"뉴욕시에 환영해요"}],[{en:"let me show you around",ko:"안내해줄게",note:"show around"},{en:"grab a bite to eat",ko:"뭐 좀 먹자",note:"grab a bite"},{en:"stroll down Broadway",ko:"브로드웨이를 거닐다",note:"stroll = 산책"},{en:"an amazing pizza place",ko:"맛있는 피자집"},{en:"I heard there's",ko:"~가 있다고 들었어"}],[{en:"the most iconic hot dogs",ko:"가장 상징적인 핫도그",note:"iconic"},{en:"it's totally worth it",ko:"완전 가치 있어",note:"worth it"},{en:"only three bucks",ko:"겨우 3달러",note:"bucks = 달러"},{en:"this street vendor",ko:"이 노점상"},{en:"you won't regret it",ko:"후회 안 해요"}],[{en:"heading to Central Park",ko:"센트럴 파크로",note:"head to"},{en:"the view is breathtaking",ko:"경치가 숨 막혀",note:"breathtaking"},{en:"escape the city noise",ko:"도시 소음을 벗어나다"},{en:"in just a few minutes",ko:"겨우 몇 분 만에"},{en:"I love how you can",ko:"~할 수 있다는 게 좋아"}],[{en:"I highly recommend it",ko:"강력 추천",note:"highly recommend"},{en:"the best day ever",ko:"최고의 날",note:"ever"},{en:"if you get a chance",ko:"기회가 되면"},{en:"see you tomorrow",ko:"내일 봐요"},{en:"incredible experience",ko:"놀라운 경험"}],[{en:"this city never sleeps",ko:"이 도시는 안 잠들어"},{en:"so much to explore",ko:"탐험할 게 많아",note:"explore"},{en:"can't wait to come back",ko:"다시 올 생각에 설레"},{en:"make sure to visit",ko:"꼭 방문해"},{en:"exceeded expectations",ko:"기대 이상",note:"exceed"}]];return b[i%b.length]}
function getSe(i){const b=[[{en:"Hey guys, welcome to New York City!",ko:"뉴욕시에 환영해요!"},{en:"We just arrived at Times Square.",ko:"타임스퀘어에 도착!"},{en:"I couldn't believe my eyes.",ko:"눈을 의심했어요."},{en:"The lights and energy are stunning.",ko:"조명과 에너지가 놀라워요."},{en:"You gotta see this at least once.",ko:"한 번은 꼭 봐야 해요."}],[{en:"Let me show you around.",ko:"안내해드릴게요."},{en:"We're strolling down Broadway.",ko:"브로드웨이를 걸어요."},{en:"Let's grab a bite to eat.",ko:"뭐 좀 먹자."},{en:"There's an amazing pizza place.",ko:"맛있는 피자집이 있어요."},{en:"This is the perfect spot.",ko:"딱 좋은 곳이에요."}],[{en:"This vendor has iconic hot dogs.",ko:"이 노점상이 핫도그를 팔아요."},{en:"It's totally worth it.",ko:"완전 가치 있어요."},{en:"Only three bucks!",ko:"겨우 3달러!"},{en:"The taste is incredible.",ko:"맛이 놀라워요."},{en:"You won't regret this.",ko:"후회 안 해요."}],[{en:"Now heading to Central Park.",ko:"센트럴 파크로."},{en:"The view is breathtaking.",ko:"경치가 숨 막혀요."},{en:"You can escape the noise.",ko:"소음을 벗어나요."},{en:"It takes just a few minutes.",ko:"몇 분이면 돼요."},{en:"This is my favorite spot.",ko:"가장 좋아하는 곳이에요."}],[{en:"I highly recommend New York.",ko:"뉴욕 강추해요."},{en:"Best first day ever!",ko:"최고의 첫날!"},{en:"There's so much to explore.",ko:"탐험할 게 더 많아요."},{en:"If you get a chance, visit!",ko:"기회가 되면 꼭!"},{en:"See you tomorrow!",ko:"내일 만나요!"}],[{en:"This city never sleeps.",ko:"이 도시는 안 잠들어요."},{en:"Every corner has something new.",ko:"모든 곳에 새로운 게."},{en:"I can't wait to come back.",ko:"다시 올 생각에 설레."},{en:"Make sure to visit.",ko:"꼭 방문하세요."},{en:"It exceeded all expectations.",ko:"기대를 넘었어요."}]];return b[i%b.length]}

// === INIT ===
showMain();
</script>
