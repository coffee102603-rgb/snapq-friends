<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapTalk — Snap Dubbing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══ DESIGN TOKENS ═══ */
:root{--bg:#0a0a0f;--sf:#14141f;--sf2:#1e1e2e;--sf3:#282840;--bd:rgba(255,255,255,.07);--accent:#00e5a0;--accent-d:rgba(0,229,160,.15);--purple:#7c6bff;--purple-d:rgba(124,107,255,.12);--orange:#ff6b35;--orange-d:rgba(255,107,53,.12);--warn:#ff6b6b;--gold:#ffc842;--tx:#f0f0f8;--tx2:#8888aa;--tx3:#555568;--r:16px;--rs:10px}

/* ═══ RESET ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none;color:inherit}

/* ═══ APP SHELL ═══ */
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ═══ HEADER ═══ */
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--bd);z-index:50;min-height:52px}
.logo{font-weight:900;font-size:20px;color:var(--accent);letter-spacing:-.5px}
.logo-badge{font-size:10px;background:var(--accent);color:var(--bg);padding:2px 8px;border-radius:20px;margin-left:8px;font-weight:700;vertical-align:middle}
.header-right{display:flex;gap:10px;align-items:center}
.lang-btn{font-size:13px;background:var(--sf2);padding:6px 12px;border-radius:20px;border:1px solid var(--bd);color:var(--tx2)}
.streak-badge{font-size:13px;background:linear-gradient(135deg,var(--orange),var(--gold));color:#000;padding:4px 10px;border-radius:20px;font-weight:700}

/* ═══ TABS ═══ */
#contentTabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px}
.ctab{flex:1;text-align:center;padding:10px 0;font-size:15px;font-weight:700;color:var(--tx3);border-bottom:3px solid transparent;transition:.2s}
.ctab.active{color:var(--tx);border-bottom-color:var(--accent)}

/* ═══ SCREENS ═══ */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ═══ FEED ═══ */
#feedScreen{overflow-y:auto;padding:12px 16px 80px;gap:14px}
.feed-card{background:var(--sf);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);transition:transform .15s;margin-bottom:14px}
.feed-card:active{transform:scale(.97)}
.card-thumb{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;position:relative}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.7))}
.card-diff{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;z-index:2}
.diff-beginner{background:#22c55e;color:#000}.diff-intermediate{background:#f59e0b;color:#000}.diff-advanced{background:#ef4444;color:#fff}
.card-cat{position:absolute;top:10px;right:10px;font-size:18px;z-index:2}
.card-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
.card-play-icon{width:48px;height:48px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.card-play-icon::after{content:'';border-left:16px solid #fff;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
.card-info{padding:12px 14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-meta{display:flex;gap:12px;font-size:12px;color:var(--tx2)}
.card-dub-count{color:var(--accent)}

/* ═══ PLAYER SHARED ═══ */
#playerScreen{background:var(--bg);position:relative}
.player-top{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--sf);border-bottom:1px solid var(--bd);z-index:50;gap:8px}
.back-btn{font-size:22px;color:var(--tx);padding:4px}
.step-indicator{display:flex;gap:4px;align-items:center}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--sf3);transition:.3s}
.step-dot.done{background:var(--accent)}
.step-dot.current{background:var(--accent);width:24px;border-radius:8px}
.speed-ctrl{display:flex;gap:4px}
.speed-btn{font-size:12px;color:var(--tx2);background:rgba(255,255,255,.08);padding:4px 10px;border-radius:16px;font-weight:700}
.speed-btn.active{background:var(--accent);color:#000}
.cover-toggle{padding:4px 10px;border-radius:16px;background:var(--sf3);font-size:11px;font-weight:700;color:var(--tx2);border:1px solid var(--bd);white-space:nowrap}
.cover-toggle.on{background:var(--accent-d);color:var(--accent);border-color:var(--accent)}

/* ═══ YOUTUBE + PIP ═══ */
#ytContainer{width:100%;aspect-ratio:9/16;max-height:55vh;background:#111;position:relative;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1);z-index:20}
#ytContainer iframe{width:100%;height:115%;position:absolute;top:0;left:0}
#ytContainer.pip{position:absolute;bottom:80px;left:12px;width:100px;height:140px;aspect-ratio:auto;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.6);border:2px solid var(--accent);z-index:40}
#ytContainer.pip iframe{height:150%;top:-15%}

/* Right-side Panel: Hints (top, scrollable) + Gauge (bottom, fixed) */
#rightPanel{position:absolute;top:0;right:0;bottom:0;width:92px;display:none;flex-direction:column;z-index:30;background:rgba(10,10,15,.8);backdrop-filter:blur(6px);pointer-events:none;border-left:1px solid var(--bd);max-height:55vh}
#rightPanel.show{display:flex}
#hintStack{flex:1 1 auto;display:flex;flex-direction:column-reverse;gap:5px;padding:14px 7px 6px;overflow-y:auto;justify-content:flex-start;min-height:0}
.hint-brick{background:linear-gradient(135deg,var(--gold),#ffa500);color:#000;padding:7px 6px;border-radius:6px;font-weight:800;font-size:12px;box-shadow:0 2px 8px rgba(255,200,66,.4);animation:brick-drop .5s ease;text-align:center;flex-shrink:0;word-break:break-word}
@keyframes brick-drop{0%{transform:translateY(-30px);opacity:0}60%{transform:translateY(3px);opacity:1}100%{transform:translateY(0);opacity:1}}
.gauge-section{flex-shrink:0;padding:0}
.understand-label-side{font-size:9px;font-weight:900;color:var(--accent);text-align:center;padding:4px;letter-spacing:.3px;background:rgba(0,229,160,.15);border-top:1px solid var(--accent)}
.understand-gauge{position:relative;height:44px;margin:4px 6px 6px;border:2px solid var(--bd);border-radius:6px;background:var(--sf);overflow:hidden}
.understand-gauge-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,var(--accent),var(--gold),var(--orange));transition:height .8s cubic-bezier(.3,.8,.3,1);border-radius:0 0 4px 4px}
.understand-gauge-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.9);z-index:2}

/* Subtle sound tap icon on corner of video */
.sound-prompt{position:absolute;top:8px;left:8px;z-index:45;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;pointer-events:auto;border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(4px)}
.sound-prompt.show{display:flex;animation:gentle-pulse 2s ease infinite}
@keyframes gentle-pulse{0%,100%{opacity:.9}50%{opacity:1}}

/* Subtitle cover bars */
.sub-cover{position:absolute;left:3%;width:94%;height:44px;background:rgba(30,30,30,.95);z-index:25;cursor:grab;touch-action:none;border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.sub-cover::after{content:'≡';color:rgba(255,255,255,.3);font-size:16px}
.sub-cover .cover-close{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;z-index:2}
.sub-cover .resize-edge{position:absolute;left:0;right:0;height:10px;touch-action:none}
.sub-cover .resize-edge.top{top:-5px}
.sub-cover .resize-edge.bot{bottom:-5px}

/* ═══ STEP BANNER ═══ */
.step-banner{text-align:center;padding:8px 16px;font-size:13px;font-weight:700;letter-spacing:.3px;transition:all .3s}
.step-banner.listen{color:var(--accent);background:var(--accent-d)}
.step-banner.shadow{color:var(--purple);background:var(--purple-d)}
.step-banner.dub{color:var(--orange);background:var(--orange-d)}

/* ═══ STEP 1: LISTEN CHALLENGE ═══ */
#listenArea{flex-shrink:0;display:flex;flex-direction:column;padding:10px 16px 14px;gap:10px}
.listen-info{text-align:center;font-size:13px;color:var(--tx2);font-weight:700}
.listen-info .n{color:var(--accent);font-size:16px;font-weight:900}
.listen-info .bricks{color:var(--gold);font-size:12px;margin-left:8px}
.listen-actions{display:flex;gap:10px;align-items:center}
.listen-replay{flex:1;padding:12px;border-radius:var(--r);background:var(--purple);color:#fff;font-size:14px;font-weight:800;text-align:center;transition:transform .15s}
.listen-replay:active{transform:scale(.95)}
.listen-next{flex:1;padding:12px;border-radius:var(--r);background:var(--accent);color:#000;font-size:14px;font-weight:800;text-align:center;transition:all .3s}
.listen-next:disabled{background:var(--sf3);color:var(--tx3);cursor:not-allowed}

/* ═══ STEP 2: 말해봐 (Shadow) ═══ */
#shadowArea{flex:1;display:flex;flex-direction:column;padding:16px;gap:14px;overflow-y:auto}
.shadow-moment{width:100%;max-width:280px;margin:0 auto;aspect-ratio:9/16;max-height:32vh;background:var(--sf2);border-radius:var(--r);border:2px solid var(--bd);background-size:cover;background-position:center;position:relative;overflow:hidden}
.shadow-moment::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,transparent 30%,rgba(0,0,0,.3))}
.shadow-moment-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;z-index:2}
.shadow-progress{text-align:center;font-size:12px;color:var(--tx3);font-weight:700}
.shadow-progress .cur{color:var(--accent);font-size:15px;font-weight:900}
.shadow-en-box{text-align:center;padding:0 8px}
.shadow-en{font-size:21px;font-weight:800;line-height:1.4}
.shadow-en .hl{background:linear-gradient(transparent 55%,rgba(255,200,66,.5) 55%,rgba(255,200,66,.5) 95%,transparent 95%);padding:0 3px;color:var(--gold);font-weight:900}
.shadow-ko{font-size:13px;color:var(--tx2);margin-top:6px}
.shadow-sync-box{display:flex;flex-direction:column;gap:6px;background:var(--sf);border-radius:var(--r);padding:12px;border:1px solid var(--bd)}
.shadow-sync-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.shadow-sync-label{color:var(--tx2);font-weight:700}
.shadow-sync-pct{font-size:20px;font-weight:900;color:var(--purple);transition:color .3s}
.shadow-sync-pct.mid{color:var(--gold)}
.shadow-sync-pct.high{color:var(--accent)}
.shadow-sync-bar{height:10px;background:var(--sf2);border-radius:10px;overflow:hidden}
.shadow-sync-fill{height:100%;background:linear-gradient(90deg,var(--warn),var(--gold),var(--accent));border-radius:10px;transition:width .5s cubic-bezier(.3,.8,.3,1)}
.shadow-hint{text-align:center;font-size:11px;color:var(--tx3);font-style:italic}
.shadow-controls{display:flex;gap:10px;align-items:center;justify-content:center;padding:4px 0}
.shadow-listen-btn,.shadow-skip,.shadow-save{width:52px;height:52px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.shadow-listen-btn:active,.shadow-skip:active,.shadow-save:active{transform:scale(.9)}
.shadow-save.saved{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.shadow-mic{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#9b8aff);font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,107,255,.3);transition:transform .15s;color:#fff}
.shadow-mic:active{transform:scale(.9)}
.shadow-mic.recording{animation:pulse-p 1s ease infinite}
@keyframes pulse-p{0%,100%{box-shadow:0 0 20px rgba(124,107,255,.3)}50%{box-shadow:0 0 40px rgba(124,107,255,.6)}}

/* ═══ STEP 3: DUB CHALLENGE ═══ */
#dubArea{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px}
.dub-instruction{text-align:center;font-size:14px;color:var(--tx2)}
.dub-timeline{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-left:116px}
.dub-line{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--sf);border-radius:var(--rs);border:1px solid var(--bd);transition:all .3s}
.dub-line.active{border-color:var(--orange);background:var(--orange-d)}
.dub-line.done{border-color:var(--accent);opacity:.85}
.dub-line.missed{border-color:var(--warn);opacity:.6}
.dub-line-num{font-size:12px;font-weight:900;color:var(--tx3);min-width:20px}
.dub-line-text{flex:1;font-size:14px;font-weight:600}
.dub-line-status{font-size:14px;font-weight:800;min-width:46px;text-align:right}
.dub-sync-bar{height:6px;background:var(--sf2);border-radius:6px;overflow:hidden}
.dub-sync-fill{height:100%;border-radius:6px;transition:width .3s;background:linear-gradient(90deg,var(--warn),var(--gold),var(--accent))}
.dub-score-live{text-align:center;font-size:28px;font-weight:900;color:var(--orange)}
.dub-bottom{display:flex;gap:12px;align-items:center;justify-content:center;padding:8px 0}
.dub-mic-btn{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#ff9b6b);font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,107,53,.3);transition:transform .15s}
.dub-mic-btn:active{transform:scale(.9)}
.dub-mic-btn.recording{animation:pulse-o 1s ease infinite}
@keyframes pulse-o{0%,100%{box-shadow:0 0 20px rgba(255,107,53,.3)}50%{box-shadow:0 0 40px rgba(255,107,53,.6)}}
.dub-retry{padding:10px 20px;border-radius:var(--rs);background:var(--sf2);border:1px solid var(--bd);font-size:14px;font-weight:700}

/* ═══ STEP 4: SHARE ═══ */
#shareArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}
.share-card{background:var(--sf);border-radius:var(--r);padding:24px;width:100%;max-width:320px;text-align:center;border:1px solid var(--bd)}
.share-title{font-size:20px;font-weight:900;margin-bottom:4px}
.share-subtitle{font-size:13px;color:var(--tx2);margin-bottom:16px}
.share-ring{position:relative;width:120px;height:120px;margin:0 auto 12px}
.share-ring svg{transform:rotate(-90deg)}
.share-ring-bg{fill:none;stroke:var(--sf2);stroke-width:8}
.share-ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
.share-score{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:var(--accent)}
.share-stars{font-size:28px;margin-bottom:8px}
.share-stats{font-size:12px;color:var(--tx2);line-height:1.6}
.share-actions{display:flex;gap:10px;width:100%;max-width:320px}
.share-btn{flex:1;padding:14px;border-radius:var(--rs);font-weight:700;font-size:14px;text-align:center}
.share-retry{background:var(--sf2);color:var(--tx)}
.share-save{background:var(--accent);color:#000}
.share-home{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}

/* ═══ MY ROOM ═══ */
#roomScreen{overflow-y:auto;padding:20px 16px 80px}
.room-section{margin-bottom:24px}
.room-title{font-size:18px;font-weight:800;margin-bottom:12px}
.streak-card{background:linear-gradient(135deg,var(--sf),var(--sf2));border-radius:var(--r);padding:20px;border:1px solid var(--bd);text-align:center}
.streak-num{font-size:48px;font-weight:900;color:var(--gold)}
.streak-label{font-size:14px;color:var(--tx2);margin-top:4px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--sf);border-radius:var(--rs);padding:16px;border:1px solid var(--bd);text-align:center}
.stat-num{font-size:28px;font-weight:900;color:var(--accent)}
.stat-label{font-size:12px;color:var(--tx2);margin-top:4px}
.history-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--sf);border-radius:var(--rs);margin-bottom:8px;border:1px solid var(--bd)}
.history-score{font-size:18px;font-weight:800;color:var(--accent);min-width:40px}
.history-info{flex:1}
.history-title{font-size:13px;font-weight:600}
.history-date{font-size:11px;color:var(--tx3)}
.note-item{background:var(--sf);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;border:1px solid var(--bd);border-left:3px solid var(--purple)}
.note-en{font-size:14px;font-weight:700;line-height:1.4}
.note-en .hl{background:linear-gradient(transparent 55%,rgba(255,200,66,.5) 55%);color:var(--gold);font-weight:900;padding:0 2px}
.note-ko{font-size:12px;color:var(--tx2);margin-top:4px}
.note-meta{font-size:10px;color:var(--tx3);margin-top:6px;display:flex;justify-content:space-between}

/* ═══ NAV & MODAL ═══ */
#bottomNav{display:flex;height:56px;min-height:56px;background:var(--sf);border-top:1px solid var(--bd);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--tx3);font-size:10px;font-weight:700;transition:.2s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}
#langModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
#langModal.show{display:flex}
.lang-modal-box{background:var(--sf);border-radius:var(--r);padding:24px;width:280px;text-align:center}
.lang-modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lang-option{padding:14px;border-radius:var(--rs);background:var(--sf2);border:2px solid transparent;font-size:14px;font-weight:700;transition:.2s}
.lang-option.selected{border-color:var(--accent);background:var(--accent-d)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.fade-up{animation:fadeUp .4s ease both}.scale-in{animation:scaleIn .5s ease both}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header"><div><span class="logo">SnapTalk</span><span class="logo-badge">Snap Dubbing</span></div><div class="header-right"><div class="streak-badge" id="streakBadge">🔥 0일</div><button class="lang-btn" id="langToggle">🇰🇷→🇺🇸</button></div></div>

  <!-- TABS -->
  <div id="contentTabs"><button class="ctab active" data-tab="us">🇺🇸 English</button><button class="ctab" data-tab="kr">🇰🇷 한국어</button></div>

  <!-- FEED -->
  <div class="screen active" id="feedScreen"></div>

  <!-- PLAYER -->
  <div class="screen" id="playerScreen">
    <div class="player-top">
      <button class="back-btn" id="backBtn">←</button>
      <button class="cover-toggle" id="coverToggle">+ 가리개</button>
      <div class="step-indicator" id="stepIndicator"><div class="step-dot current" data-s="0"></div><div class="step-dot" data-s="1"></div><div class="step-dot" data-s="2"></div><div class="step-dot" data-s="3"></div></div>
      <div class="speed-ctrl"><button class="speed-btn" data-speed="0.8">0.8x</button><button class="speed-btn active" data-speed="1">1.0x</button><button class="speed-btn" data-speed="1.2">1.2x</button></div>
    </div>
    <div id="ytContainer"></div>
    <div id="rightPanel">
      <div id="hintStack"></div>
      <div class="gauge-section">
        <div class="understand-label-side">🧱 이해벽돌</div>
        <div class="understand-gauge">
          <div class="understand-gauge-fill" id="understandFill" style="height:10%"></div>
          <div class="understand-gauge-pct" id="understandPct">10%</div>
        </div>
      </div>
    </div>

<!-- LANG MODAL -->
<div id="langModal"><div class="lang-modal-box"><div class="lang-modal-title">UI 언어 선택</div><div class="lang-grid"><button class="lang-option selected" data-lang="ko">🇰🇷 한국어</button><button class="lang-option" data-lang="en">🇺🇸 English</button><button class="lang-option" data-lang="ja">🇯🇵 日本語</button><button class="lang-option" data-lang="zh">🇨🇳 中文</button></div></div></div>

<script>
/* ═══════════════════════════════════════
 * CONTENT DATABASE
 * Each short: sentences with timestamps
 * Each sentence: hintWords = keywords revealed per listen
 * ═══════════════════════════════════════ */
const SHORTS={us:[
  {id:'4O6qj9JWNzE',title:'NYC Street Interview',cat:'interview',catIcon:'🎤',diff:'beginner',dubs:1247,
   sentences:[
    {en:"What do you do for a living?",ko:"직업이 뭐예요?",start:0.5,end:2.3,hints:['work','job','living'],key:['do','living']},
    {en:"I work in finance downtown.",ko:"저는 다운타운에서 금융 일해요.",start:3.0,end:5.1,hints:['finance','downtown'],key:['finance','downtown']},
    {en:"Do you like living in New York?",ko:"뉴욕에 사는 거 좋아요?",start:5.8,end:8.0,hints:['New York','live'],key:['like','living']},
    {en:"I love it, there is always something happening.",ko:"좋아요, 항상 뭔가 일어나거든요.",start:8.5,end:11.2,hints:['love','always','happening'],key:['love','always','happening']}
   ]},
  {id:'ikYVBHLSOpY',title:'Dollar Pizza in NYC',cat:'food',catIcon:'🍕',diff:'beginner',dubs:2341,
   sentences:[
    {en:"This is the best dollar pizza in New York.",ko:"이게 뉴욕 최고의 1달러 피자야.",start:0.3,end:2.8,hints:['dollar','pizza','best'],key:['best','dollar']},
    {en:"Look at that cheese pull.",ko:"저 치즈 늘어나는 거 봐.",start:3.2,end:5.0,hints:['cheese','pull'],key:['cheese','pull']},
    {en:"You cannot beat this for one dollar.",ko:"1달러에 이건 못 이겨.",start:5.5,end:7.8,hints:['beat','one dollar'],key:['cannot','beat']},
    {en:"I could eat this every single day.",ko:"매일 먹을 수 있어.",start:8.2,end:10.5,hints:['eat','every day'],key:['could','every']}
   ]},
  {id:'dQw4w9WgXcQ',title:'Morning Routine Talk',cat:'daily',catIcon:'☀️',diff:'intermediate',dubs:856,
   sentences:[
    {en:"I usually wake up around six thirty.",ko:"보통 6시 반에 일어나요.",start:0.5,end:2.5,hints:['wake up','6:30'],key:['usually','wake']},
    {en:"First thing I do is make coffee.",ko:"제일 먼저 커피를 내려요.",start:3.0,end:5.0,hints:['first','coffee'],key:['first','make']},
    {en:"Then I go for a quick morning jog.",ko:"그다음 가볍게 조깅을 해요.",start:5.5,end:7.8,hints:['morning','jog'],key:['quick','jog']},
    {en:"It helps me stay focused all day.",ko:"하루 종일 집중하는 데 도움이 돼요.",start:8.2,end:10.8,hints:['focused','all day'],key:['helps','focused']}
   ]}
],kr:[
  {id:'hPM29so2mMc',title:'한국 편의점 먹방',cat:'food',catIcon:'🍜',diff:'beginner',dubs:1893,
   sentences:[
    {en:"This is a Korean convenience store.",ko:"여기는 한국 편의점이에요.",start:0.3,end:2.2,hints:['Korean','store'],key:['Korean','store']},
    {en:"Let me try this spicy ramen.",ko:"이 매운 라면 먹어볼게요.",start:2.8,end:4.8,hints:['spicy','ramen'],key:['try','spicy']},
    {en:"Oh wow, it is really spicy!",ko:"와, 진짜 매워요!",start:5.2,end:7.0,hints:['really spicy'],key:['really','spicy']},
    {en:"But it tastes so good.",ko:"근데 진짜 맛있어요.",start:7.5,end:9.5,hints:['tastes','good'],key:['tastes','good']}
   ]},
  {id:'NXivkUHQpXw',title:'K-pop Dance Challenge',cat:'kpop',catIcon:'💃',diff:'intermediate',dubs:3102,
   sentences:[
    {en:"Today we are learning this dance.",ko:"오늘 이 춤을 배울 거예요.",start:0.5,end:2.5,hints:['learning','dance'],key:['learning','dance']},
    {en:"Follow my moves step by step.",ko:"제 동작을 따라 해보세요.",start:3.0,end:5.2,hints:['follow','step by step'],key:['follow','step by step']},
    {en:"The chorus part is the hardest.",ko:"후렴 부분이 제일 어려워요.",start:5.8,end:8.0,hints:['chorus','hardest'],key:['chorus','hardest']},
    {en:"You did amazing, great job!",ko:"대단해요, 잘했어요!",start:8.5,end:10.5,hints:['amazing','great job'],key:['amazing','great']}
   ]}
]};

/* ═══════════════════════════════════════
 * STATE
 * ═══════════════════════════════════════ */
const S={
  tab:'us',short:null,gameStep:0,
  listenCount:1,   /* STEP 1: how many times listened */
  understand:10,   /* STEP 1: understanding % */
  shownHints:[],   /* STEP 1: accumulated hint words */
  shadowIdx:0,     /* STEP 2: current sentence index */
  shadowSync:0,    /* STEP 2: current sentence sync % */
  shadowAttempts:0,/* STEP 2: attempts for current sentence */
  syncScore:0,     /* STEP 3: overall sync % */
  dubAttempts:0,   /* STEP 3: # of attempts */
  rate:1,rec:false
};
let ytPlayer=null,audioCtx=null,analyser=null,micStream=null,dubInterval=null,shadowInterval=null;

/* ═══════════════════════════════════════
 * STORAGE
 * ═══════════════════════════════════════ */
const db={get:(k,d)=>{try{return JSON.parse(localStorage.getItem('sd_'+k))||d}catch(e){return d}},set:(k,v)=>localStorage.setItem('sd_'+k,JSON.stringify(v))};

/* ═══════════════════════════════════════
 * STREAK & STATS
 * ═══════════════════════════════════════ */
function getStreak(){const s=db.get('streak',{count:0,last:null});if(s.last){const d=Math.floor((new Date(new Date().toDateString())-new Date(s.last))/864e5);if(d>1)s.count=0}return s}
function updateStreak(){const s=getStreak(),t=new Date().toDateString();if(s.last!==t){s.count++;s.last=t;db.set('streak',s)}renderStreak()}
function renderStreak(){const s=getStreak();document.getElementById('streakBadge').textContent='🔥 '+s.count+'일';document.getElementById('roomStreak').textContent=s.count}
function saveResult(sh,sc,att){const h=db.get('history',[]);h.unshift({title:sh.title,score:sc,attempts:att,date:new Date().toISOString()});if(h.length>30)h.pop();db.set('history',h);const st=db.get('stats',{total:0,sum:0});st.total++;st.sum+=sc;db.set('stats',st)}
function renderRoom(){renderStreak();const st=db.get('stats',{total:0,sum:0});document.getElementById('totalDubs').textContent=st.total;document.getElementById('avgScore').textContent=st.total?Math.round(st.sum/st.total)+'%':'0%';const h=db.get('history',[]),list=document.getElementById('historyList');if(!h.length){list.innerHTML='<div style="color:var(--tx3);font-size:13px;padding:12px">아직 더빙 기록이 없어요!</div>'}else{list.innerHTML=h.slice(0,10).map(i=>{const d=new Date(i.date);return`<div class="history-item"><div class="history-score">${i.score}%</div><div class="history-info"><div class="history-title">${i.title}</div><div class="history-date">${d.getMonth()+1}/${d.getDate()} · ${i.attempts}번 도전</div></div></div>`}).join('')}
  /* Render notebook */
  const nb=db.get('notebook',[]),nbList=document.getElementById('notebookList');
  if(!nb.length){nbList.innerHTML='<div style="color:var(--tx3);font-size:13px;padding:12px">저장한 문장이 없어요. 말해봐에서 💾 버튼으로 담아보세요!</div>';return}
  nbList.innerHTML=nb.slice(0,20).map(n=>{
    const d=new Date(n.date);
    let en=n.en;
    if(n.key&&n.key.length)en=highlightEn(en,n.key);
    return`<div class="note-item"><div class="note-en">${en}</div><div class="note-ko">${n.ko}</div><div class="note-meta"><span>📹 ${n.shortTitle}</span><span>${d.getMonth()+1}/${d.getDate()}</span></div></div>`;
  }).join('');
}

/* ═══════════════════════════════════════
 * FEED
 * ═══════════════════════════════════════ */
function renderFeed(){
  const feed=document.getElementById('feedScreen');
  const shorts=SHORTS[S.tab]||[];
  feed.innerHTML='';
  shorts.forEach((s,idx)=>{
    const c=document.createElement('div');
    c.className='feed-card fade-up';
    c.style.animationDelay=(idx*.06)+'s';
    c.innerHTML=`<div class="card-thumb" style="background-image:url('https://img.youtube.com/vi/${s.id}/mqdefault.jpg')"><span class="card-diff diff-${s.diff}">${s.diff}</span><span class="card-cat">${s.catIcon}</span><div class="card-play"><div class="card-play-icon"></div></div></div><div class="card-info"><div class="card-title">${s.title}</div><div class="card-meta"><span>${s.sentences.length} 문장</span><span class="card-dub-count">🎤 ${s.dubs.toLocaleString()}명 더빙</span></div></div>`;
    c.addEventListener('click',()=>startGame(s));
    feed.appendChild(c);
  });
}

/* ═══════════════════════════════════════
 * SCREEN NAVIGATION
 * ═══════════════════════════════════════ */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id+'Screen').classList.add('active');document.getElementById('contentTabs').style.display=(id==='feed')?'flex':'none'}
document.querySelectorAll('.ctab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.ctab').forEach(x=>x.classList.remove('active'));t.classList.add('active');S.tab=t.dataset.tab;renderFeed()})});
document.querySelectorAll('.nav-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(b.dataset.screen==='feed')showScreen('feed');if(b.dataset.screen==='room'){renderRoom();showScreen('room')}cleanupPlayer()})});

/* ═══════════════════════════════════════
 * YOUTUBE PLAYER
 * ═══════════════════════════════════════ */
let ytReady=false;
function loadYTAPI(){if(window.YT&&window.YT.Player){ytReady=true;return}const t=document.createElement('script');t.src='https://www.youtube.com/iframe_api';document.head.appendChild(t)}
window.onYouTubeIframeAPIReady=()=>{ytReady=true};
function createPlayer(vid,muted=false){
  document.getElementById('ytContainer').innerHTML='<div id="ytPlayer"></div>';
  const prompt=document.getElementById('soundPrompt');
  ytPlayer=new YT.Player('ytPlayer',{
    videoId:vid,
    playerVars:{autoplay:1,controls:0,modestbranding:1,rel:0,playsinline:1,fs:0,cc_load_policy:0,iv_load_policy:3,mute:muted?1:1},
    events:{onReady:e=>{
      e.target.setPlaybackRate(S.rate);
      /* Always start muted — guarantees autoplay works across all browsers */
      e.target.mute();
      e.target.playVideo();
      /* If not dub mode, show big play button for user to unmute */
      if(!muted){prompt.classList.add('show')}
      else{prompt.classList.remove('show')}
      try{e.target.unloadModule('captions');e.target.unloadModule('cc')}catch(ex){}
    }}
  });
}
function cleanupPlayer(){
  if(ytPlayer&&ytPlayer.destroy){try{ytPlayer.destroy()}catch(e){}}
  ytPlayer=null;stopMic();
  if(dubInterval){clearInterval(dubInterval);dubInterval=null}
  if(shadowInterval){clearInterval(shadowInterval);shadowInterval=null}
  document.getElementById('bottomNav').style.display='flex';
  document.getElementById('coverContainer').innerHTML='';
  document.getElementById('hintStack').innerHTML='';
  document.getElementById('rightPanel').classList.remove('show');
  document.getElementById('soundPrompt').classList.remove('show');
}

/* ═══════════════════════════════════════
 * AUDIO ENGINE
 * ═══════════════════════════════════════ */
async function startMic(){try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=512;audioCtx.createMediaStreamSource(micStream).connect(analyser);S.rec=true;return true}catch(e){return false}}
function stopMic(){S.rec=false;if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}if(audioCtx){audioCtx.close();audioCtx=null}}
function getVol(){if(!analyser)return 0;const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(d);return d.reduce((a,b)=>a+b,0)/d.length}

/* ═══════════════════════════════════════
 * TTS (Galaxy-safe)
 * ═══════════════════════════════════════ */
function speak(text,lang='en-US'){if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=S.rate;window.speechSynthesis.speak(u);const fix=setInterval(()=>{if(!window.speechSynthesis.speaking){clearInterval(fix);return}window.speechSynthesis.pause();window.speechSynthesis.resume()},1e4)}

/* ═══════════════════════════════════════
 * GAME FLOW CONTROLLER
 * Steps: 0=Listen, 1=Shadow, 2=Dub, 3=Share
 * ═══════════════════════════════════════ */
function startGame(short){
  S.short=short;S.gameStep=0;
  S.listenCount=1;S.understand=10;S.shownHints=[];
  S.shadowIdx=0;S.syncScore=0;S.dubAttempts=0;
  showScreen('player');
  document.getElementById('bottomNav').style.display='none';
  document.getElementById('ytContainer').classList.remove('pip');
  updateDots(0);
  goStep(0);
}

function goStep(step){
  S.gameStep=step;
  updateDots(step);
  ['listenArea','shadowArea','dubArea','shareArea'].forEach(id=>document.getElementById(id).style.display='none');
  const yt=document.getElementById('ytContainer'),bn=document.getElementById('stepBanner'),tower=document.getElementById('rightPanel');

  if(step===0){
    /* STEP 1: LISTEN */
    bn.className='step-banner listen';
    bn.textContent='👂 리스닝 챌린지 — 귀가 트일 때까지!';
    yt.classList.remove('pip');yt.style.display='';
    tower.classList.remove('show');
    document.getElementById('listenArea').style.display='flex';
    renderListen();
    createPlayer(S.short.id);
  }
  else if(step===1){
    /* STEP 2: 말해봐 — hide video, show moment cards */
    bn.className='step-banner shadow';
    bn.textContent='🎤 말해봐 — 90% 넘을 때까지!';
    yt.style.display='none';
    tower.classList.remove('show');
    document.getElementById('shadowArea').style.display='flex';
    S.shadowIdx=0;renderShadow();
  }
  else if(step===2){
    /* STEP 3: DUB CHALLENGE */
    bn.className='step-banner dub';
    bn.textContent='🔥 더빙 챌린지 — 타이밍에 맞춰!';
    yt.classList.add('pip');
    tower.classList.remove('show');
    document.getElementById('dubArea').style.display='flex';
    S.dubAttempts++;renderDub();
  }
  else if(step===3){
    /* STEP 4: SHARE */
    yt.style.display='none';tower.classList.remove('show');
    bn.className='step-banner listen';bn.textContent='🏆 결과';
    document.getElementById('shareArea').style.display='flex';
    renderShare();
  }
}

function updateDots(c){document.querySelectorAll('.step-dot').forEach(d=>{const n=parseInt(d.dataset.s);d.className='step-dot'+(n<c?' done':n===c?' current':'')})}

/* ═══════════════════════════════════════
 * STEP 1: LISTEN CHALLENGE
 * - Listen to video, accumulate hint bricks
 * - understand% = min(100, 10 + listenCount*20)
 * - Next button enabled when understand% >= 60
 * ═══════════════════════════════════════ */
function renderListen(){
  document.getElementById('listenCount').textContent=S.listenCount;
  document.getElementById('brickCount').textContent='· 벽돌 '+S.shownHints.length+'개';
  document.getElementById('understandFill').style.height=S.understand+'%';
  document.getElementById('understandPct').textContent=S.understand+'%';
  document.getElementById('listenNext').disabled=(S.understand<60);

  const panel=document.getElementById('rightPanel');
  const stack=document.getElementById('hintStack');
  stack.innerHTML='';
  panel.classList.add('show');
  S.shownHints.forEach(h=>{
    const brick=document.createElement('div');
    brick.className='hint-brick';
    brick.textContent=h;
    stack.appendChild(brick);
  });
}

/* Replay button: reload video, add hint, increase understanding */
document.getElementById('listenReplay').addEventListener('click',()=>{
  S.listenCount++;
  /* Add 1-2 new hints — BUT cap total bricks at 7 */
  const MAX_BRICKS=7;
  if(S.shownHints.length<MAX_BRICKS){
    const allHints=S.short.sentences.flatMap(s=>s.hints||[]);
    const available=allHints.filter(h=>!S.shownHints.includes(h));
    const room=MAX_BRICKS-S.shownHints.length;
    const n=Math.min(2,available.length,room);
    for(let i=0;i<n;i++){S.shownHints.push(available.shift())}
  }
  /* Understanding keeps rising regardless of brick cap */
  S.understand=Math.min(100,10+S.listenCount*20);
  renderListen();
  if(ytPlayer&&ytPlayer.seekTo){ytPlayer.seekTo(0);ytPlayer.playVideo()}
});

/* Next button: go to Shadow step */
document.getElementById('listenNext').addEventListener('click',()=>{
  if(S.understand>=60) goStep(1);
});

/* ═══════════════════════════════════════
 * STEP 2: SHADOW (따라 읽기)
 * PIP video + sentence-by-sentence TTS + mic
 * ═══════════════════════════════════════ */

/* Render one sentence with keyword highlighting */
function highlightEn(en,keys){
  if(!keys||!keys.length)return en;
  let out=en;
  keys.forEach(k=>{
    const escaped=k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp('\\b('+escaped+')\\b','gi');
    out=out.replace(re,'<span class="hl">$1</span>');
  });
  return out;
}

function renderShadow(){
  const ss=S.short.sentences,i=S.shadowIdx;
  if(i>=ss.length){goStep(2);return}
  const s=ss[i];
  S.shadowSync=0;S.shadowAttempts=0;

  /* Show moment image — use YouTube thumbnail at different qualities for variety */
  const momentImgs=[`https://img.youtube.com/vi/${S.short.id}/maxresdefault.jpg`,`https://img.youtube.com/vi/${S.short.id}/hqdefault.jpg`,`https://img.youtube.com/vi/${S.short.id}/mqdefault.jpg`,`https://img.youtube.com/vi/${S.short.id}/sddefault.jpg`];
  const img=momentImgs[i%momentImgs.length];
  document.getElementById('shadowMoment').style.backgroundImage=`url('${img}')`;
  document.getElementById('shadowMomentLabel').textContent=`📸 ${Math.round(s.start)}초 구간`;

  document.getElementById('shadowProgress').textContent=(i+1);
  document.getElementById('shadowTotal').textContent=ss.length;
  document.getElementById('shadowEn').innerHTML=highlightEn(s.en,s.key);
  document.getElementById('shadowKo').textContent=s.ko;

  renderShadowSync();
  document.getElementById('shadowHint').textContent='🎤 버튼을 눌러 말해봐! 90% 넘으면 다음으로';
  /* Reset save button state */
  const saveBtn=document.getElementById('shadowSave');
  saveBtn.classList.remove('saved');
  saveBtn.textContent='💾';

  speak(s.en);
}

function renderShadowSync(){
  const pct=S.shadowSync;
  const pctEl=document.getElementById('shadowSyncPct');
  const fill=document.getElementById('shadowSyncFill');
  pctEl.textContent=pct+'%';
  fill.style.width=pct+'%';
  pctEl.classList.remove('mid','high');
  if(pct>=70)pctEl.classList.add('high');
  else if(pct>=40)pctEl.classList.add('mid');
}

/* Listen again */
document.getElementById('shadowListen').addEventListener('click',()=>{const s=S.short.sentences[S.shadowIdx];if(s)speak(s.en)});

/* Mic: record → measure → update sync% */
document.getElementById('shadowMic').addEventListener('click',async()=>{
  const b=document.getElementById('shadowMic');
  if(S.rec){
    stopMic();b.classList.remove('recording');
    if(shadowInterval){clearInterval(shadowInterval);shadowInterval=null}
    return;
  }
  if(!await startMic())return;
  b.classList.add('recording');
  S.shadowAttempts++;
  const s=S.short.sentences[S.shadowIdx];
  const targetMs=(s.end-s.start)*1000;
  const t0=Date.now();
  let voiceSamples=0,totalSamples=0;

  shadowInterval=setInterval(()=>{
    const elapsed=Date.now()-t0;
    const vol=getVol();
    if(vol>25)voiceSamples++;
    totalSamples++;
    /* PURE voice-based score: no fake bonuses.
       If user is silent → score stays 0. If they speak with good timing → score rises. */
    const voiceRatio=totalSamples>0?voiceSamples/totalSamples:0;
    const timingMatch=Math.min(1,elapsed/targetMs);
    /* Live attempt score (this attempt only) */
    const attemptScore=Math.round(voiceRatio*timingMatch*100);
    /* Keep best of all attempts for this sentence */
    if(attemptScore>S.shadowSync){S.shadowSync=attemptScore;renderShadowSync()}

    /* Stop when target duration reached + buffer */
    if(elapsed>=targetMs+500){
      stopMic();b.classList.remove('recording');
      clearInterval(shadowInterval);shadowInterval=null;
      renderShadowSync();

      if(S.shadowSync>=90){
        document.getElementById('shadowHint').textContent='🎉 완벽! 다음 문장으로...';
        setTimeout(()=>{S.shadowIdx++;renderShadow()},1200);
      }else if(voiceSamples<5){
        document.getElementById('shadowHint').textContent=`🔇 목소리가 안 들려요. 마이크 확인하고 크게 말해봐!`;
      }else{
        document.getElementById('shadowHint').textContent=`🔁 ${S.shadowSync}% — 한 번 더! (${S.shadowAttempts}번째)`;
      }
    }
  },100);
});

/* Save: add sentence to notebook */
document.getElementById('shadowSave').addEventListener('click',()=>{
  const s=S.short.sentences[S.shadowIdx];
  const nb=db.get('notebook',[]);
  if(!nb.some(n=>n.en===s.en)){
    nb.unshift({en:s.en,ko:s.ko,key:s.key,shortTitle:S.short.title,date:new Date().toISOString()});
    db.set('notebook',nb);
  }
  const btn=document.getElementById('shadowSave');
  btn.classList.add('saved');
  btn.textContent='✅';
});

/* Skip */
document.getElementById('shadowSkip').addEventListener('click',()=>{
  stopMic();
  document.getElementById('shadowMic').classList.remove('recording');
  if(shadowInterval){clearInterval(shadowInterval);shadowInterval=null}
  S.shadowIdx++;
  renderShadow();
});

/* ═══════════════════════════════════════
 * STEP 3: DUB CHALLENGE
 * Muted video + voice sync detection
 * Per-sentence sync% shown in real-time
 * ═══════════════════════════════════════ */
function renderDub(){
  const ss=S.short.sentences,tl=document.getElementById('dubTimeline');
  tl.innerHTML='';
  ss.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='dub-line';d.id='dl-'+i;
    d.innerHTML=`<div class="dub-line-num">${i+1}</div><div class="dub-line-text">${s.en}</div><div class="dub-line-status" id="dls-${i}" style="color:var(--tx3)">0%</div>`;
    tl.appendChild(d);
  });
  document.getElementById('dubScoreLive').textContent='0%';
  document.getElementById('dubSyncFill').style.width='0%';
  createPlayer(S.short.id,true);
}

document.getElementById('dubMic').addEventListener('click',async()=>{
  const b=document.getElementById('dubMic');
  if(S.rec){
    stopMic();b.classList.remove('recording');
    if(dubInterval){clearInterval(dubInterval);dubInterval=null}
    finishDub();return;
  }
  if(!await startMic())return;
  b.classList.add('recording');
  if(ytPlayer&&ytPlayer.seekTo){ytPlayer.seekTo(0);ytPlayer.playVideo()}
  const ss=S.short.sentences;
  const perHit=ss.map(()=>({hits:0,checks:0}));
  const t0=Date.now();
  dubInterval=setInterval(()=>{
    const el=(Date.now()-t0)/1000,vol=getVol(),spk=vol>25;
    let totalH=0,totalC=0;
    ss.forEach((s,i)=>{
      const ln=document.getElementById('dl-'+i),st=document.getElementById('dls-'+i);
      if(!ln)return;
      if(el>=s.start&&el<=s.end){
        ln.classList.add('active');ln.classList.remove('done','missed');
        perHit[i].checks++;
        if(spk)perHit[i].hits++;
        const pct=perHit[i].checks>0?Math.round(perHit[i].hits/perHit[i].checks*100):0;
        st.textContent=pct+'%';
        st.style.color=pct>=70?'var(--accent)':pct>=40?'var(--gold)':'var(--warn)';
      }else if(el>s.end){
        ln.classList.remove('active');
        const pct=perHit[i].checks>0?Math.round(perHit[i].hits/perHit[i].checks*100):0;
        st.textContent=pct+'%';
        if(pct>=60){ln.classList.add('done');st.style.color='var(--accent)'}
        else{ln.classList.add('missed');st.style.color='var(--warn)'}
      }
      totalH+=perHit[i].hits;totalC+=perHit[i].checks;
    });
    const sc=totalC>0?Math.round(totalH/totalC*100):0;
    S.syncScore=Math.min(100,sc);
    document.getElementById('dubScoreLive').textContent=S.syncScore+'%';
    document.getElementById('dubSyncFill').style.width=S.syncScore+'%';
    if(el>ss[ss.length-1].end+1){
      stopMic();b.classList.remove('recording');
      clearInterval(dubInterval);dubInterval=null;
      finishDub();
    }
  },100);
});

function finishDub(){
  if(S.syncScore>=60){
    updateStreak();
    saveResult(S.short,S.syncScore,S.dubAttempts);
    setTimeout(()=>goStep(3),500);
  }else{
    document.getElementById('dubScoreLive').textContent=S.syncScore+'% — 다시 도전!';
  }
}
document.getElementById('dubRetry').addEventListener('click',()=>{stopMic();document.getElementById('dubMic').classList.remove('recording');if(dubInterval){clearInterval(dubInterval);dubInterval=null}S.dubAttempts++;renderDub()});

/* ═══════════════════════════════════════
 * STEP 4: SHARE CARD
 * ═══════════════════════════════════════ */
function renderShare(){
  const sc=S.syncScore;
  document.getElementById('shareSubtitle').textContent=S.short.title;
  const circ=2*Math.PI*60,ring=document.getElementById('shareRing');
  setTimeout(()=>{ring.style.strokeDashoffset=circ-(circ*sc/100)},200);
  let c=0;const n=document.getElementById('shareScore'),up=setInterval(()=>{c+=2;if(c>=sc){c=sc;clearInterval(up)}n.textContent=c+'%'},20);
  document.getElementById('shareStars').textContent=sc>=90?'⭐⭐⭐':sc>=70?'⭐⭐':'⭐';
  document.getElementById('shareStats').innerHTML=`${S.short.sentences.length}문장 · ${S.dubAttempts}번 도전<br>싱크율 ${sc}%`;
}
document.getElementById('shareRetry').addEventListener('click',()=>{S.syncScore=0;S.dubAttempts=0;goStep(0)});
document.getElementById('shareSave').addEventListener('click',()=>alert('💾 더빙 카드가 나의 방에 저장되었습니다!'));
document.getElementById('shareHome').addEventListener('click',()=>{cleanupPlayer();showScreen('feed')});

/* ═══════════════════════════════════════
 * SPEED CONTROL
 * ═══════════════════════════════════════ */
document.querySelectorAll('.speed-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.rate=parseFloat(b.dataset.speed);if(ytPlayer&&ytPlayer.setPlaybackRate)ytPlayer.setPlaybackRate(S.rate)})});

document.getElementById('backBtn').addEventListener('click',()=>{cleanupPlayer();showScreen('feed')});

/* ═══════════════════════════════════════
 * SUBTITLE COVER BARS (Multiple, Draggable, Resizable)
 * ═══════════════════════════════════════ */
(function(){
  const container=document.getElementById('coverContainer');
  const toggle=document.getElementById('coverToggle');
  let coverCount=0;let active=null;let isPaused=false;
  toggle.addEventListener('click',()=>{
    if(isPaused){
      if(ytPlayer&&ytPlayer.playVideo)ytPlayer.playVideo();
      isPaused=false;toggle.textContent='+ 가리개';toggle.classList.remove('on');return;
    }
    if(ytPlayer&&ytPlayer.pauseVideo)ytPlayer.pauseVideo();
    isPaused=true;toggle.textContent='▶ 계속';toggle.classList.add('on');
    const yt=document.getElementById('ytContainer');
    if(!yt||yt.classList.contains('pip'))return;
    const rect=yt.getBoundingClientRect();
    const appRect=document.getElementById('app').getBoundingClientRect();
    const ytTop=rect.top-appRect.top,ytH=rect.height;
    coverCount++;
    const bar=document.createElement('div');
    bar.className='sub-cover';
    bar.style.top=(ytTop+ytH-50-(coverCount%3)*50)+'px';
    bar.innerHTML='<div class="resize-edge top"></div><div class="resize-edge bot"></div><span class="cover-close">✕</span>';
    container.appendChild(bar);
    bar.querySelector('.cover-close').addEventListener('click',e=>{e.stopPropagation();bar.remove()});
    const onStart=(y,tgt)=>{
      if(tgt.classList.contains('cover-close'))return;
      if(tgt.classList.contains('resize-edge')){active={el:bar,mode:'resize',dir:tgt.classList.contains('top')?'top':'bot',startY:y,startTop:parseInt(bar.style.top),startH:bar.offsetHeight}}
      else{active={el:bar,mode:'drag',startY:y,startTop:parseInt(bar.style.top),startH:bar.offsetHeight}}
    };
    bar.addEventListener('touchstart',e=>onStart(e.touches[0].clientY,e.target),{passive:true});
    bar.addEventListener('mousedown',e=>onStart(e.clientY,e.target));
  });
  function onMove(y){
    if(!active)return;
    const dy=y-active.startY;
    if(active.mode==='drag'){active.el.style.top=(active.startTop+dy)+'px'}
    else{
      if(active.dir==='bot'){active.el.style.height=Math.max(16,active.startH+dy)+'px'}
      else{active.el.style.top=(active.startTop+dy)+'px';active.el.style.height=Math.max(16,active.startH-dy)+'px'}
    }
  }
  document.addEventListener('touchmove',e=>{if(active)onMove(e.touches[0].clientY)},{passive:true});
  document.addEventListener('mousemove',e=>{if(active)onMove(e.clientY)});
  document.addEventListener('touchend',()=>{active=null});
  document.addEventListener('mouseup',()=>{active=null});
})();
