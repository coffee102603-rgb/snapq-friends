let L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};
function rListen(){L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};rfL()}
function rfL(){const ch=findChar(S.char),tp=ch.topics[S.topic],cur=tp.rounds[L.r],pv=L.as.slice(0,Math.max(0,L.as.length-(L.ph==='listen'?cur.ss.length:0)));
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="speechSynthesis.cancel();go('topics')" style="background:none;color:#D1D5DB;font-size:14px">← 뒤로</button><span style="color:#C4B5FD;font-size:13px;font-weight:600">R${L.r+1}/${tp.rounds.length}</span><span style="color:#FCD34D;font-size:13px">⭐${L.sc}</span></div>
<div style="height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-bottom:14px"><div style="height:100%;border-radius:2px;background:linear-gradient(90deg,#8B5CF6,#6366F1);width:${((L.r+(L.ph==='done'?1:0))/tp.rounds.length)*100}%"></div></div>`;
if(L.ph!=='done')h+=`<div id="sc1">${charSc(ch,L.ph==='listen'?L.cs:null,L.ph==='listen')}</div>`;
if((L.ph==='listen'||L.ph==='q')&&pv.length)h+=`<div style="background:rgba(139,92,246,.08);border-radius:12px;padding:12px;margin-top:12px;border:1px solid rgba(139,92,246,.15)">${pv.map(s=>`<p style="color:#D1D5DB;font-size:13px;margin:3px 0">${s.en}</p>`).join('')}</div>`;
if(L.ph==='ready')h+=`<div style="text-align:center;margin-top:24px"><p style="color:#C4B5FD;font-size:14px;margin-bottom:20px">Round ${L.r+1}: ${cur.ss.length}문장!</p><button class="b" onclick="pRnd()">🎧 듣기 시작!</button></div>`;
if(L.ph==='q')h+=`<div style="margin-top:16px"><div style="background:rgba(99,102,241,.12);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(99,102,241,.25)"><p style="font-size:15px;font-weight:600;margin-bottom:3px">${cur.q.t}</p><p style="color:#A78BFA;font-size:12px">${cur.q.k}</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${cur.q.o.map((o,i)=>`<button onclick="${L.sel===null?`pA(${i})`:''}" style="background:${L.sel===null?'rgba(255,255,255,.07)':i===cur.q.a?'rgba(74,222,128,.18)':i===L.sel?'rgba(239,68,68,.18)':'rgba(255,255,255,.1)'};border:${L.sel===null?'1px solid rgba(255,255,255,.12)':i===cur.q.a?'2px solid #4ADE80':i===L.sel?'2px solid #EF4444':'1px solid rgba(255,255,255,.15)'};border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:500">${o}${L.sel!==null&&i===cur.q.a?' ✅':''}${i===L.sel&&i!==cur.q.a?' ❌':''}</button>`).join('')}</div></div>`;
if(L.ph==='res')h+=`<div style="margin-top:16px"><div style="background:rgba(255,255,255,.1);border-radius:14px;padding:14px;margin-bottom:12px">${cur.ss.map(s=>`<div style="margin-bottom:5px"><p style="color:#E5E7EB;font-size:13px">${s.en}</p><p style="color:#A78BFA;font-size:12px">${s.kr}</p></div>`).join('')}</div><button class="b" style="width:100%;background:linear-gradient(135deg,#F59E0B,#EF4444)" onclick="sE()">⭐ 핵심 표현</button></div>`;
if(L.ph==='expr')h+=`<div style="margin-top:16px;text-align:center"><div style="background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));border-radius:16px;padding:22px;margin-bottom:16px;border:2px solid rgba(245,158,11,.25)"><div style="font-size:11px;color:#FCD34D;font-weight:600">⭐ KEY EXPRESSION</div><div style="font-size:22px;font-weight:700;margin:8px 0">"${cur.ex.en}"</div><div style="color:#FCD34D;font-size:14px">${cur.ex.kr}</div></div><div style="display:flex;gap:10px;justify-content:center"><button class="b" style="background:linear-gradient(135deg,#4ADE80,#16A34A);padding:12px 24px;font-size:14px" onclick="svE()">📋 Save+Next</button><button onclick="nR()" style="background:rgba(255,255,255,.15);color:#D1D5DB;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:12px 24px;font-size:14px">Skip</button></div></div>`;
if(L.ph==='done')h+=`<div style="text-align:center;margin-top:32px"><div style="font-size:64px;margin-bottom:12px">${L.sc>=2?'🎉':'💪'}</div><h2 style="font-size:24px;font-weight:700;margin-bottom:8px">${L.sc>=2?'Amazing!':'Good Try!'}</h2><p style="color:#C4B5FD;font-size:16px;margin-bottom:20px">Score: ${L.sc}/${tp.rounds.length}</p><button class="b" onclick="fL()">계속하기 →</button></div>`;
app.innerHTML=h+`</div>`}
async function pRnd(){const ch=findChar(S.char),cur=ch.topics[S.topic].rounds[L.r];L.ph='listen';L.sel=null;for(const s of cur.ss){L.as.push(s);L.cs=s;rfL();document.getElementById('sc1').innerHTML=charSc(ch,{en:s.en},true);await speak(s.en,ch.rate);document.getElementById('sc1').innerHTML=charSc(ch,{en:s.en},false);await new Promise(r=>setTimeout(r,300))}L.cs=null;L.ph='q';rfL()}
function pA(i){const cur=findChar(S.char).topics[S.topic].rounds[L.r];L.sel=i;if(i===cur.q.a)L.sc++;rfL();setTimeout(()=>{L.ph='res';rfL()},700)}
async function sE(){L.ph='expr';rfL();await speak(findChar(S.char).topics[S.topic].rounds[L.r].ex.en,.7)}
function svE(){const e=findChar(S.char).topics[S.topic].rounds[L.r].ex;if(!L.sv.find(x=>x.en===e.en))L.sv.push(e);nR()}
function nR(){const tp=findChar(S.char).topics[S.topic];if(L.r<tp.rounds.length-1){L.r++;L.ph='ready';L.sel=null}else L.ph='done';rfL()}
function fL(){if(S.fr[S.char])S.fr[S.char].int++;S.coins+=L.sc>=2?15:5;go('friends')}

let IP3={topic:null,qi:0,ph:'ask'};

function rfIP3(){const qs=IE.p3[IP3.topic],q=qs[IP3.qi];
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="sttStop();speechSynthesis.cancel();go('ielts')" style="background:none;color:#D1D5DB;font-size:14px">← 뒤로</button><span style="color:#16A34A;font-size:13px;font-weight:600">Part 3 · Q${IP3.qi+1}/${qs.length}</span></div><div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">🧠</div></div>`;
if(IP3.ph==='ask')h+=`<div style="background:rgba(22,163,106,.12);border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid rgba(22,163,106,.25)"><p style="font-size:16px;font-weight:600;line-height:1.7">${q}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#4ADE80,#16A34A)" onclick="askIP3()">🎧 대답하기</button></div>`;
if(IP3.ph==='answer')h+=`<div style="background:rgba(22,163,106,.08);border-radius:16px;padding:16px;min-height:100px;border:2px solid rgba(22,163,106,.25)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#4ADE80;font-size:13px;font-weight:600">45초...</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||''}</p></div><div style="text-align:center;margin-top:16px"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="doneIP3()">⏹ 완료</button></div>`;
if(IP3.ph==='review')h+=`<div style="background:rgba(255,255,255,.1);border-radius:16px;padding:16px;margin-bottom:16px"><p style="color:#E5E7EB;font-size:14px">${sttText||'(없음)'}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#4ADE80,#16A34A)" onclick="nextIP3()">${IP3.qi+1>=qs.length?'✅ 완료':'다음 →'}</button></div>`;
app.innerHTML=h+`</div>`}
async function askIP3(){await speak(IE.p3[IP3.topic][IP3.qi],.85);IP3.ph='answer';sttText='';rfIP3();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t});setTimeout(()=>{if(IP3.ph==='answer')doneIP3()},45000)}
function doneIP3(){sttStop();IP3.ph='review';rfIP3()}
function nextIP3(){sttText='';if(IP3.qi+1>=IE.p3[IP3.topic].length)go('ielts');else{IP3.qi++;IP3.ph='ask';rfIP3()}}

// ═══ PRO: Interview ═══
let IV={cat:null,qi:0,qs:[],ph:'ask'};
function rInterview(){app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><button onclick="go('pro')" style="background:none;color:#D1D5DB;font-size:14px;margin-bottom:12px">← 뒤로</button>
<div class="fadeUp" style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">👔</div><h2 style="font-size:22px;font-weight:700">영어면접 대비</h2><p style="color:#60A5FA;font-size:13px">"삼성·구글·골드만 실전 면접!"</p></div>
${[{c:'intro',n:'자기소개',i:'👋'},{c:'motivation',n:'지원동기',i:'🎯'},{c:'strengths',n:'강점/약점',i:'💪'},{c:'star',n:'경험기반 STAR',i:'⭐'},{c:'situational',n:'상황질문',i:'🤔'},{c:'salary',n:'연봉/마무리',i:'💰'}].map((x,i)=>`<button class="fadeUp d${Math.min(i+1,5)}" onclick="startIV('${x.c}')" style="width:100%;display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.1);border:1px solid rgba(59,130,246,.2);border-radius:16px;padding:14px 18px;text-align:left;margin-bottom:8px"><span style="font-size:24px">${x.i}</span><div style="flex:1"><div style="font-size:14px;font-weight:600">${x.n}</div></div><span style="color:#4ADE80">→</span></button>`).join('')}</div>`}
function startIV(cat){IV={cat,qi:0,qs:cat==='salary'?[...IQ.salary]:IQ[cat]||[],ph:'ask'};sttText='';rfIV()}
function rfIV(){const q=IV.qs[IV.qi];
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="sttStop();speechSynthesis.cancel();go('interview')" style="background:none;color:#D1D5DB;font-size:14px">← 뒤로</button><span style="color:#3B82F6;font-size:13px;font-weight:600">Q${IV.qi+1}/${IV.qs.length}</span></div><div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">👨‍💼</div><div style="font-size:12px;color:#93C5FD">Kevin · Interviewer</div></div>`;
if(IV.ph==='ask')h+=`<div style="background:rgba(59,130,246,.12);border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid rgba(59,130,246,.25)"><p style="font-size:16px;font-weight:600;line-height:1.7">${q.en}</p><p style="color:#93C5FD;font-size:13px;margin-top:4px">${q.kr}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#3B82F6,#2563EB)" onclick="askIV()">🎧 대답하기</button></div>`;
if(IV.ph==='answer')h+=`<div style="background:rgba(59,130,246,.08);border-radius:16px;padding:16px;min-height:100px;border:2px solid rgba(59,130,246,.25)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#60A5FA;font-size:13px;font-weight:600">녹음 중...</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||''}</p></div><div style="text-align:center;margin-top:16px"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="doneIV()">⏹ 완료</button></div>`;
if(IV.ph==='review')h+=`<div style="background:rgba(255,255,255,.1);border-radius:16px;padding:16px;margin-bottom:16px"><p style="color:#E5E7EB;font-size:14px">${sttText||'(없음)'}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#3B82F6,#2563EB)" onclick="nextIV()">${IV.qi+1>=IV.qs.length?'✅ 완료':'다음 →'}</button></div>`;
app.innerHTML=h+`</div>`}
async function askIV(){await speak(IV.qs[IV.qi].en,.9);IV.ph='answer';sttText='';rfIV();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t})}
function doneIV(){sttStop();IV.ph='review';rfIV()}
function nextIV(){sttText='';if(IV.qi+1>=IV.qs.length)go('interview');else{IV.qi++;IV.ph='ask';rfIV()}}

// ═══ PRO: Presentation ═══
let PR={ti:null,step:0,ph:'guide'};
function rPres(){app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><button onclick="go('pro')" style="background:none;color:#D1D5DB;font-size:14px;margin-bottom:12px">← 뒤로</button>
<div class="fadeUp" style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">📊</div><h2 style="font-size:22px;font-weight:700">프레젠테이션 연습</h2><p style="color:#6EE7B7;font-size:13px">"실리콘밸리 스타일!"</p></div>
${PT.map((t,i)=>`<button class="fadeUp d${i+1}" onclick="startPR(${i})" style="width:100%;display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.1);border:1px solid rgba(74,222,128,.2);border-radius:16px;padding:16px 18px;text-align:left;margin-bottom:8px"><span style="font-size:28px">${t.icon}</span><div style="flex:1"><div style="font-size:14px;font-weight:600">${t.name}</div><div style="color:#E5E7EB;font-size:12px">${t.en} · ${t.steps.length} steps</div></div><span style="color:#4ADE80">→</span></button>`).join('')}</div>`}
function startPR(i){PR={ti:i,step:0,ph:'guide'};rfPR()}
function rfPR(){const t=PT[PR.ti],step=t.steps[PR.step];
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="sttStop();speechSynthesis.cancel();go('pres')" style="background:none;color:#D1D5DB;font-size:14px">← 뒤로</button><span style="color:#4ADE80;font-size:13px;font-weight:600">Step ${PR.step+1}/${t.steps.length}</span></div>
<div style="text-align:center;margin-bottom:16px"><div style="font-size:40px">👩‍💻</div><div style="font-size:12px;color:#6EE7B7">Priya · Coach</div></div>`;
if(PR.ph==='guide')h+=`<div style="background:rgba(74,222,128,.08);border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid rgba(74,222,128,.25)"><div style="font-size:14px;font-weight:700;margin-bottom:6px">${t.icon} ${step}</div><p style="color:#6EE7B7;font-size:13px">이 파트를 영어로 발표해보세요.</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#4ADE80,#16A34A)" onclick="prCoach()">🎧 코치 듣고 시작</button></div>`;
if(PR.ph==='speak')h+=`<div style="background:rgba(74,222,128,.08);border-radius:16px;padding:16px;min-height:120px;border:2px solid rgba(74,222,128,.25)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#4ADE80;font-size:13px;font-weight:600">"${step}"</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||''}</p></div><div style="text-align:center;margin-top:16px"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="donePR()">⏹ 완료</button></div>`;
if(PR.ph==='done')h+=`<div style="background:rgba(255,255,255,.1);border-radius:16px;padding:16px;margin-bottom:16px"><p style="color:#E5E7EB;font-size:14px">${sttText||'(없음)'}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#4ADE80,#16A34A)" onclick="nextPR()">${PR.step+1>=t.steps.length?'🏆 완료':'다음 →'}</button></div>`;
app.innerHTML=h+`</div>`}
async function prCoach(){const step=PT[PR.ti].steps[PR.step];await speak('Please present your '+step+'. Take your time.',.85);PR.ph='speak';sttText='';rfPR();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t})}
function donePR(){sttStop();PR.ph='done';rfPR()}
function nextPR(){sttText='';if(PR.step+1>=PT[PR.ti].steps.length)go('pres');else{PR.step++;PR.ph='guide';rfPR()}}
