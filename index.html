<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#0F0A1F;color:#fff;overflow-x:hidden;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.screen{min-height:100dvh;display:none;flex-direction:column}
.screen.active{display:flex}
.btn{background:linear-gradient(135deg,#8B5CF6,#6366F1);color:#fff;border:none;border-radius:16px;padding:14px 32px;font-size:16px;font-weight:700;transition:transform .15s}
.btn:active{transform:scale(.95)}
.btn-green{background:linear-gradient(135deg,#4ADE80,#16A34A)}
.btn-pink{background:linear-gradient(135deg,#EC4899,#F43F5E)}
.btn-orange{background:linear-gradient(135deg,#F59E0B,#EF4444)}
.tag{background:rgba(139,92,246,.2);color:#C4B5FD;padding:3px 10px;border-radius:20px;font-size:12px;display:inline-block;margin:2px}

/* Scene */
.scene{position:relative;width:100%;height:420px;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.scene-bg{position:absolute;inset:0;z-index:0}
.scene-grad{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,.15) 60%,rgba(0,0,0,.45) 100%)}
.scene-char{position:absolute;top:50%;left:50%;transform:translate(-50%,-45%);z-index:3}
.scene-label{position:absolute;top:12px;left:14px;z-index:5;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.scene-label .dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px #4ADE80}
.scene-sub{position:absolute;bottom:0;left:0;right:0;z-index:6;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);padding:14px 18px;text-align:center}
.scene-sub .en{font-size:16px;font-weight:600;line-height:1.7}
.scene-sub .kr{color:#C4B5FD;font-size:13px;margin-top:3px}
.scene-sub .wave{display:flex;justify-content:center;gap:3px;margin-top:8px}
.scene-sub .wave span{width:3px;border-radius:2px;background:#A78BFA}

.word{transition:color .15s}
.word-done{color:#A78BFA}
.word-current{color:#fff;font-weight:800;text-shadow:0 0 12px rgba(167,139,250,.6)}
.word-upcoming{color:rgba(255,255,255,.3)}

/* Floating icons */
.scene-icon{position:absolute;pointer-events:none;opacity:.18}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,10,31,.96);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:8px 0 12px}
.nav button{background:none;border:none;color:#6B7280;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button.active{color:#A78BFA}
.nav button .icon{font-size:20px}

/* Animations */
@keyframes glow{0%,100%{box-shadow:0 0 24px #8B5CF640}50%{box-shadow:0 0 48px #8B5CF680}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-12px) rotate(5deg)}}
@keyframes wave0{0%{height:4px;opacity:.4}100%{height:14px;opacity:1}}
@keyframes wave1{0%{height:6px;opacity:.5}100%{height:12px;opacity:1}}
@keyframes wave2{0%{height:3px;opacity:.3}100%{height:16px;opacity:1}}
</style>

// ── TTS Engine (Full — works on real browsers!) ──────────────
const TTS = {
  voice: null,
  ready: false,
  keepAliveId: null,

  loadVoice() {
    const voices = speechSynthesis.getVoices();
    const tests = [
      v => v.name.includes('Samantha'),
      v => v.name.includes('Google') && v.lang.startsWith('en-US'),
      v => v.lang.startsWith('en-US') && v.name.toLowerCase().includes('female'),
      v => v.lang.startsWith('en-US'),
      v => v.lang.startsWith('en'),
    ];
    for (const t of tests) {
      const f = voices.find(t);
      if (f) { this.voice = f; return; }
    }
    if (voices.length) this.voice = voices[0];
  },

  activate() {
    if (this.ready) return;
    if (!window.speechSynthesis) return;
    try {
      // Unlock AudioContext
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const b = ctx.createBuffer(1, 1, 22050);
        const s = ctx.createBufferSource();
        s.buffer = b; s.connect(ctx.destination); s.start(0);
      } catch(e) {}
      // Unlock speechSynthesis
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance('hi');
      u.volume = 0.01; u.rate = 10;
      speechSynthesis.speak(u);
      this.ready = true;
      this.loadVoice();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => this.loadVoice();
      }
      // KeepAlive
      this.keepAliveId = setInterval(() => {
        if (!speechSynthesis.speaking) {
          const k = new SpeechSynthesisUtterance('');
          k.volume = 0; speechSynthesis.speak(k);
        }
      }, 10000);
    } catch(e) {}
  },

  speak(text, rate = 0.82, pitch = 1.1) {
    return new Promise(resolve => {
      if (!speechSynthesis || !this.ready) {
        // Fallback: visual-only with timing
        this._visualSpeak(text, rate, resolve);
        return;
      }
      speechSynthesis.cancel();
      setTimeout(() => {
        const u = new SpeechSynthesisUtterance(text);
        if (this.voice) u.voice = this.voice;
        u.rate = rate; u.pitch = pitch; u.volume = 1;
        state.speaking = true;
        const words = text.split(/\s+/);
        let wi = 0;
        u.onboundary = (e) => {
          if (e.name === 'word' && wi < words.length) {
            state.wordIndex = wi; wi++;
            updateSubtitle();
          }
        };
        u.onend = () => { state.speaking = false; state.wordIndex = -1; updateSubtitle(); resolve(true); };
        u.onerror = () => { state.speaking = false; state.wordIndex = -1; resolve(false); };
        speechSynthesis.speak(u);
        // Chrome bug fix
        setTimeout(() => { try{speechSynthesis.pause();speechSynthesis.resume();}catch(e){} }, 80);
        // Safety timeout
        setTimeout(() => resolve(true), 20000);
      }, 50);
    });
  },

  _visualSpeak(text, rate, resolve) {
    const words = text.split(/\s+/);
    const ms = Math.max(260, 400 / rate);
    state.speaking = true;
    let i = 0;
    const tick = () => {
      if (i >= words.length) {
        state.speaking = false; state.wordIndex = -1; updateSubtitle(); resolve(true); return;
      }
      state.wordIndex = i; updateSubtitle(); i++;
      setTimeout(tick, ms);
    };
    tick();
  },

  stop() { try { speechSynthesis?.cancel(); } catch(e) {} state.speaking = false; state.wordIndex = -1; },
};

// ── Scene Builder ────────────────────────────────────────────
function buildScene(bgKey, subEn, subKr) {
  const bg = BGS[bgKey] || BGS.kitchen;
  const icons = bg.icons.map((ic,i) =>
    `<span class="scene-icon" style="font-size:${26+i*8}px;left:${12+i*32}%;top:${8+i*20}%;animation:float ${5+i*2}s ease-in-out infinite">${ic}</span>`
  ).join('');

  return `<div class="scene">
    <div class="scene-bg" style="background:${bg.css}"></div>
    ${icons}
    <div class="scene-grad"></div>
    <div class="scene-char" id="charContainer">${margaretSVG(state.speaking)}</div>
    <div class="scene-label"><span class="dot"></span>${bg.label}</div>
    <div class="scene-sub" id="subtitle" style="display:${subEn?'block':'none'}">
      <div class="en" id="subEn">${formatWords(subEn)}</div>
      ${subKr?`<div class="kr">${subKr}</div>`:''}
      <div class="wave" id="waveIndicator" style="display:${state.speaking?'flex':'none'}">
        ${[0,1,2,3,4].map(i=>`<span style="animation:wave${i%3} ${.3+i*.08}s ease-in-out infinite alternate"></span>`).join('')}
      </div>
    </div>
  </div>`;
}

function formatWords(text) {
  if (!text) return '';
  return text.split(/\s+/).map((w,i) => {
    let cls = 'word';
    if (state.speaking && state.wordIndex >= 0) {
      if (i < state.wordIndex) cls += ' word-done';
      else if (i === state.wordIndex) cls += ' word-current';
      else cls += ' word-upcoming';
    }
    return `<span class="${cls}">${w}</span>`;
  }).join(' ');
}

function updateSubtitle() {
  const el = document.getElementById('subEn');
  const wave = document.getElementById('waveIndicator');
  const charC = document.getElementById('charContainer');
  if (el && el.dataset.text) el.innerHTML = formatWords(el.dataset.text);
  if (wave) wave.style.display = state.speaking ? 'flex' : 'none';
  if (charC) charC.innerHTML = margaretSVG(state.speaking);
}

// ── Video Screen ─────────────────────────────────────────────
let videoState = { idx: -1, showQ: false, answered: false, bgKey: 'kitchen', reply: '' };

function renderVideo() {
  videoState = { idx: -1, showQ: false, answered: false, bgKey: 'kitchen', reply: '' };
  const line = videoState.idx >= 0 ? CH.intro[videoState.idx] : null;
  const subEn = videoState.showQ ? (videoState.answered ? videoState.reply : CH.question.en) : (line?.en || '');
  const subKr = videoState.showQ && !videoState.answered ? CH.question.kr : (!videoState.showQ ? (line?.kr || '') : '');

  app.innerHTML = `<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px">
    <button onclick="TTS.stop();showScreen('profiles')" style="background:none;color:#9CA3AF;font-size:14px;margin-bottom:12px">← 뒤로</button>
    <div id="sceneArea">${buildScene(videoState.bgKey, subEn, subKr)}</div>
    <div style="text-align:center;margin-top:20px" id="videoControls">
      <button class="btn" onclick="playIntro()">▶ 소개 영상 보기</button>
    </div>
    <div style="background:rgba(255,255,255,.05);border-radius:16px;padding:18px;margin-top:20px;border:1px solid rgba(255,255,255,.08)">
      <div style="margin-bottom:8px">${CH.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <p style="color:#9CA3AF;font-size:13px;line-height:1.7">${CH.name}, ${CH.age}세 · ${CH.city}<br>${CH.job} · ${CH.reason}<br><span style="color:#A78BFA">💡 ${CH.desc}</span></p>
    </div>
  </div>`;
}

async function playIntro() {
  const ctrl = document.getElementById('videoControls');
  ctrl.innerHTML = '<p style="color:#6B7280;font-size:13px">🎤 Margaret가 말하고 있어요...</p>';

  for (let i = 0; i < CH.intro.length; i++) {
    videoState.idx = i;
    if (i === 2) videoState.bgKey = 'garden';
    if (i === 4) videoState.bgKey = 'cafe';
    updateVideoScene();
    await TTS.speak(CH.intro[i].en, CH.rate, CH.pitch);
    await new Promise(r => setTimeout(r, 300));
  }

  videoState.showQ = true;
  updateVideoScene();
  await TTS.speak(CH.question.en, CH.rate, CH.pitch);

  ctrl.innerHTML = `<div style="display:flex;gap:12px;justify-content:center">
    <button class="btn btn-pink" style="padding:12px 28px;font-size:15px" onclick="answerQ('cats')">🐱 Cats!</button>
    <button class="btn btn-orange" style="padding:12px 28px;font-size:15px" onclick="answerQ('dogs')">🐶 Dogs!</button>
  </div>`;
}

async function answerQ(ans) {
  videoState.answered = true;
  videoState.reply = ans === 'dogs' ? "Oh wonderful! I have a dog named Biscuit! We'll get along great!" : "Cats are lovely too! My neighbor has the cutest cat!";
  updateVideoScene();
  await TTS.speak(videoState.reply, CH.rate, CH.pitch);
  document.getElementById('videoControls').innerHTML = `<button class="btn btn-green" style="margin-top:8px" onclick="addFriend()">+ Add Friend — ${CH.price}🪙</button>`;
}

function addFriend() {
  if (state.coins >= CH.price) {
    state.coins -= CH.price;
    state.friend = { int: 1 };
  }
  showScreen('friends');
}

function updateVideoScene() {
  const line = videoState.idx >= 0 ? CH.intro[videoState.idx] : null;
  const subEn = videoState.showQ ? (videoState.answered ? videoState.reply : CH.question.en) : (line?.en || '');
  const subKr = videoState.showQ && !videoState.answered ? CH.question.kr : (!videoState.showQ ? (line?.kr || '') : '');
  const area = document.getElementById('sceneArea');
  if (area) {
    area.innerHTML = buildScene(videoState.bgKey, subEn, subKr);
    const subEl = document.getElementById('subEn');
    if (subEl) subEl.dataset.text = subEn;
  }
}

// ── Listening Screen ─────────────────────────────────────────
let listenState = { rnd: 0, phase: 'ready', sel: null, score: 0, saved: [], allS: [] };

function renderListen() {
  listenState = { rnd: 0, phase: 'ready', sel: null, score: 0, saved: [], allS: [] };
  updateListen();
}

function updateListen() {
  const d = CH.listening;
  const ls = listenState;
  const cur = d.rounds[ls.rnd];
  const bgs = ['cafe','garden','living'];
  const prev = ls.allS.slice(0, ls.allS.length - (ls.phase === 'listen' ? cur.sentences.length : 0));

  let html = `<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="TTS.stop();showScreen('friends')" style="background:none;color:#9CA3AF;font-size:14px">← 뒤로</button>
      <span style="color:#C4B5FD;font-size:13px;font-weight:600">🎧 ${d.topic} · R${ls.rnd+1}/${d.rounds.length}</span>
      <span style="color:#FCD34D;font-size:13px">⭐ ${ls.score}</span>
    </div>
    <div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:14px">
      <div style="height:100%;border-radius:2px;background:linear-gradient(90deg,#8B5CF6,#6366F1);width:${((ls.rnd+(ls.phase==='done'?1:0))/d.rounds.length)*100}%;transition:width .5s"></div>
    </div>`;

  if (ls.phase !== 'done') {
    html += `<div id="sceneArea">${buildScene(bgs[ls.rnd], ls.phase==='listen'?ls.currentSub?.en||'':'', '')}</div>`;
  }

  // Prev sentences
  if ((ls.phase === 'listen' || ls.phase === 'q') && prev.length > 0) {
    html += `<div style="background:rgba(139,92,246,.08);border-radius:12px;padding:12px;margin-top:12px;border:1px solid rgba(139,92,246,.15)">
      <div style="color:#9CA3AF;font-size:10px;margin-bottom:6px">📖 이전 대사</div>
      ${prev.map(s=>`<p style="color:#D1D5DB;font-size:13px;line-height:1.6;margin:3px 0">${s.en}</p>`).join('')}
    </div>`;
  }

  if (ls.phase === 'ready') {
    html += `<div style="text-align:center;margin-top:24px">
      <p style="color:#C4B5FD;font-size:14px;margin-bottom:6px">Round ${ls.rnd+1}: ${cur.sentences.length}문장!</p>
      <p style="color:#6B7280;font-size:12px;margin-bottom:20px">${ls.rnd===0?'🔊 소리에 집중하세요!':'📖 이전 문장 텍스트 공개!'}</p>
      <button class="btn" onclick="playListenRound()">🎧 듣기 시작!</button>
    </div>`;
  }

  if (ls.phase === 'q') {
    html += `<div style="margin-top:16px">
      <div style="background:rgba(99,102,241,.12);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(99,102,241,.25)">
        <p style="font-size:15px;font-weight:600;margin-bottom:3px">${cur.q.text}</p>
        <p style="color:#A78BFA;font-size:12px">${cur.q.kr}</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${cur.q.opts.map((o,i)=>{
          const isA=i===cur.q.ans,isS=i===ls.sel;
          const bg=ls.sel===null?'rgba(255,255,255,.07)':isA?'rgba(74,222,128,.18)':isS?'rgba(239,68,68,.18)':'rgba(255,255,255,.04)';
          const brd=ls.sel===null?'1px solid rgba(255,255,255,.12)':isA?'2px solid #4ADE80':isS?'2px solid #EF4444':'1px solid rgba(255,255,255,.08)';
          return `<button onclick="${ls.sel===null?`answerListen(${i})`:''}" style="background:${bg};border:${brd};border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:500">${o}${ls.sel!==null&&isA?' ✅':''}${isS&&!isA?' ❌':''}</button>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (ls.phase === 'res') {
    html += `<div style="margin-top:16px">
      <div style="background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:12px">
        <div style="color:#9CA3AF;font-size:11px;margin-bottom:6px">📖 해석</div>
        ${cur.sentences.map(s=>`<div style="margin-bottom:5px"><p style="color:#E5E7EB;font-size:13px">${s.en}</p><p style="color:#A78BFA;font-size:12px">${s.kr}</p></div>`).join('')}
      </div>
      <button class="btn btn-orange" style="width:100%" onclick="showListenExpr()">⭐ 핵심 표현 듣기</button>
    </div>`;
  }

  if (ls.phase === 'expr') {
    html += `<div style="margin-top:16px;text-align:center">
      <div style="background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));border-radius:16px;padding:22px;margin-bottom:16px;border:2px solid rgba(245,158,11,.25)">
        <div style="font-size:11px;color:#FCD34D;margin-bottom:8px;font-weight:600">⭐ KEY EXPRESSION</div>
        <div style="font-size:22px;font-weight:700;margin-bottom:4px">"${cur.expr.en}"</div>
        <div style="color:#FCD34D;font-size:14px">${cur.expr.kr}</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-green" style="padding:12px 24px;font-size:14px" onclick="saveListenExpr()">📋 Save + Next</button>
        <button onclick="nextListenRound()" style="background:rgba(255,255,255,.08);color:#9CA3AF;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 24px;font-size:14px">Skip →</button>
      </div>
    </div>`;
  }

  if (ls.phase === 'done') {
    html += `<div style="text-align:center;margin-top:32px">
      <div style="font-size:64px;margin-bottom:12px">${ls.score>=2?'🎉':'💪'}</div>
      <h2 style="font-size:24px;font-weight:700;margin-bottom:8px">${ls.score>=2?'Amazing!':'Good Try!'}</h2>
      <p style="color:#C4B5FD;font-size:16px;margin-bottom:12px">Score: ${ls.score}/${d.rounds.length} ${ls.score>=2?'✅ PASS!':''}</p>
      ${ls.saved.length>0?`<div style="background:rgba(74,222,128,.08);border-radius:14px;padding:14px;margin-bottom:16px;text-align:left;border:1px solid rgba(74,222,128,.15)">
        <div style="color:#4ADE80;font-size:12px;font-weight:600;margin-bottom:8px">📋 Expression Vault 저장!</div>
        ${ls.saved.map(e=>`<div style="color:#E5E7EB;font-size:13px;margin-bottom:4px">✦ <strong>${e.en}</strong> — ${e.kr}</div>`).join('')}
      </div>`:''}
      <div style="background:rgba(139,92,246,.08);border-radius:14px;padding:14px;margin-bottom:20px;border:1px solid rgba(139,92,246,.15)">
        <p style="color:#C4B5FD;font-size:13px">🪙 +${ls.score>=2?15:5} &nbsp; ♥ +2</p>
      </div>
      <button class="btn" onclick="finishListen()">계속하기 →</button>
    </div>`;
  }

  html += `</div>`;
  app.innerHTML = html;
  // Store text for word-tracking update
  const subEl = document.getElementById('subEn');
  if (subEl && ls.currentSub) subEl.dataset.text = ls.currentSub.en;
}

async function playListenRound() {
  const ls = listenState;
  const cur = CH.listening.rounds[ls.rnd];
  ls.phase = 'listen'; ls.sel = null;
  updateListen();

  for (const s of cur.sentences) {
    ls.allS.push(s);
    ls.currentSub = s;
    updateListen();
    const subEl = document.getElementById('subEn');
    if (subEl) subEl.dataset.text = s.en;
    await TTS.speak(s.en, CH.rate, CH.pitch);
    await new Promise(r => setTimeout(r, 250));
  }
  ls.currentSub = null;
  ls.phase = 'q';
  updateListen();
}

function answerListen(i) {
  const ls = listenState;
  ls.sel = i;
  const ok = i === CH.listening.rounds[ls.rnd].q.ans;
  if (ok) ls.score++;
  if (navigator.vibrate) navigator.vibrate(ok ? [50] : [80,40,80]);
  updateListen();
  setTimeout(() => { ls.phase = 'res'; updateListen(); }, 700);
}

async function showListenExpr() {
  listenState.phase = 'expr';
  updateListen();
  await TTS.speak(CH.listening.rounds[listenState.rnd].expr.en, 0.7, CH.pitch);
}

function saveListenExpr() {
  const e = CH.listening.rounds[listenState.rnd].expr;
  if (!listenState.saved.find(x => x.en === e.en)) listenState.saved.push(e);
  nextListenRound();
}

function nextListenRound() {
  if (listenState.rnd < CH.listening.rounds.length - 1) {
    listenState.rnd++;
    listenState.phase = 'ready';
    listenState.sel = null;
  } else {
    listenState.phase = 'done';
  }
  updateListen();
}

function finishListen() {
  if (state.friend) state.friend.int++;
  state.coins += listenState.score >= 2 ? 15 : 5;
  showScreen('friends');
}

// ── Nav ──────────────────────────────────────────────────────
function updateNav() {
  const show = !['intro','lang'].includes(state.screen);
  let nav = document.getElementById('mainNav');
  if (!show) { if (nav) nav.remove(); return; }
  if (!nav) {
    nav = document.createElement('div');
    nav.id = 'mainNav'; nav.className = 'nav';
    document.body.appendChild(nav);
  }
  const items = [{i:'🏠',l:'Home',s:'profiles'},{i:'💬',l:'Friends',s:'friends'},{i:'📋',l:'Vault',s:'vault'},{i:'🪙',l:state.coins,s:'coins'}];
  nav.innerHTML = items.map(n =>
    `<button class="${state.screen===n.s?'active':''}" onclick="${n.s==='profiles'||n.s==='friends'?`showScreen('${n.s}')`:''}">
      <span class="icon">${n.i}</span>${n.l}
    </button>`
  ).join('');
}

// ── Init ─────────────────────────────────────────────────────
showScreen('intro');
</script>
