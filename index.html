<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SnapQ Friends</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#0F0A1F;color:#fff;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.btn{background:linear-gradient(135deg,#8B5CF6,#6366F1);color:#fff;border:none;border-radius:16px;padding:14px 32px;font-size:16px;font-weight:700;transition:transform .15s}
.btn:active{transform:scale(.95)}
.btn-green{background:linear-gradient(135deg,#4ADE80,#16A34A)}
.btn-pink{background:linear-gradient(135deg,#EC4899,#F43F5E)}
.btn-orange{background:linear-gradient(135deg,#F59E0B,#EF4444)}
.tag{background:rgba(139,92,246,.2);color:#C4B5FD;padding:3px 10px;border-radius:20px;font-size:12px;display:inline-block;margin:2px}
.scene{position:relative;width:100%;height:420px;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.scene-bg{position:absolute;inset:0}
.scene-grad{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,.15) 60%,rgba(0,0,0,.45) 100%)}
.scene-char{position:absolute;top:50%;left:50%;transform:translate(-50%,-45%);z-index:3}
.scene-lbl{position:absolute;top:12px;left:14px;z-index:5;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);padding:5px 14px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px #4ADE80}
.sub{position:absolute;bottom:0;left:0;right:0;z-index:6;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);padding:14px 18px;text-align:center}
.sub .en{font-size:16px;font-weight:600;line-height:1.7}
.sub .kr{color:#C4B5FD;font-size:13px;margin-top:3px}
.wd{color:#A78BFA}.wc{color:#fff;font-weight:800;text-shadow:0 0 12px rgba(167,139,250,.6)}.wu{color:rgba(255,255,255,.3)}
.wav{display:flex;justify-content:center;gap:3px;margin-top:8px}
.wav span{width:3px;border-radius:2px;background:#A78BFA}
.sic{position:absolute;pointer-events:none;opacity:.18}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,10,31,.96);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,12px)}
.nav button{background:none;border:none;color:#6B7280;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button.on{color:#A78BFA}
.nav .ic{font-size:20px}
@keyframes glow{0%,100%{box-shadow:0 0 24px #8B5CF640}50%{box-shadow:0 0 48px #8B5CF680}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px) rotate(5deg)}}
@keyframes wa{0%{height:4px;opacity:.4}100%{height:14px;opacity:1}}
@keyframes wb{0%{height:6px;opacity:.5}100%{height:12px;opacity:1}}
</style>
</head>
<body>
<div id="app" style="max-width:420px;margin:0 auto"></div>
<script>
const app=document.getElementById('app');
let S={scr:'intro',fr:null,coins:100,spk:false,wi:-1};

// ═══ TTS: Google Translate MP3 — works on ALL phones! ═══
const TTS={
  au:null, ok:false,
  activate(){
    if(this.ok)return;
    this.au=new Audio();
    this.au.play().catch(()=>{});
    this.au.pause();
    this.ok=true;
  },
  url(t){return'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q='+encodeURIComponent(t.substring(0,200))},
  speak(text,rate){
    return new Promise(res=>{
      S.spk=true;
      const ws=text.split(/\s+/), msw=Math.max(280,440/rate);
      if(this.au){this.au.pause();this.au.src=''}
      this.au=new Audio();
      this.au.src=this.url(text);
      let ti,wi=0;
      const go=()=>{ti=setInterval(()=>{if(wi<ws.length){S.wi=wi;wi++;updSub()}},msw)};
      this.au.onplay=go;
      this.au.onended=()=>{clearInterval(ti);S.spk=false;S.wi=-1;updSub();res(true)};
      this.au.onerror=()=>{clearInterval(ti);this._vis(ws,rate,res)};
      const p=this.au.play();
      if(p)p.catch(()=>this._vis(ws,rate,res));
    });
  },
  _vis(ws,rate,res){
    S.spk=true;const ms=Math.max(280,420/rate);let i=0;
    const t=()=>{if(i>=ws.length){S.spk=false;S.wi=-1;updSub();res(true);return}S.wi=i;updSub();i++;setTimeout(t,ms)};t();
  },
  stop(){if(this.au){this.au.pause();this.au.src=''}S.spk=false;S.wi=-1}
};

// ═══ Data ═══
const CH={name:'Margaret',age:67,city:'Vermont',job:'은퇴 영어교사',reason:'한국 문화원 봉사 경력',tags:['여행','강아지','커피','정원','베이킹'],price:10,desc:'이해될 때까지 천천히!',rate:.82,
intro:[{en:"Oh, hello dear! I'm Margaret.",kr:"아, 안녕하세요! 저는 마가렛이에요."},{en:"I'm a retired English teacher from Vermont.",kr:"버몬트에서 은퇴한 영어 선생님이에요."},{en:"I volunteered at a Korean cultural center for years.",kr:"한국 문화원에서 수년간 봉사했어요."},{en:"So I speak a little Korean too!",kr:"그래서 한국어도 조금 해요!"},{en:"I love coffee, gardening, and my dog Biscuit.",kr:"커피, 정원 가꾸기, 그리고 제 강아지 비스킷을 좋아해요."},{en:"I'll speak slowly and help you every step.",kr:"천천히 말하고 하나하나 도와줄게요."}],
question:{en:"So tell me, do you like cats or dogs?",kr:"자, 말해봐요. 고양이 좋아해요, 강아지 좋아해요?"},
listen:{topic:'Morning Coffee',rounds:[
{ss:[{en:"I had the most wonderful cup of coffee this morning.",kr:"오늘 아침에 정말 멋진 커피 한 잔을 마셨어요."},{en:"It was a new blend from a small shop in town.",kr:"마을에 있는 작은 가게의 새로운 블렌드였어요."}],q:{t:"What did Margaret have this morning?",k:"마가렛은 오늘 아침에 뭘 마셨나요?",o:["Tea","Coffee","Juice","Milk"],a:1},ex:{en:"the most wonderful",kr:"가장 멋진/훌륭한"}},
{ss:[{en:"The owner told me it comes all the way from Colombia.",kr:"주인이 콜롬비아에서 온 거라고 했어요."},{en:"He roasts the beans himself every single morning.",kr:"그는 매일 아침 직접 원두를 로스팅해요."},{en:"You can really taste the difference when it's fresh.",kr:"신선하면 정말 맛의 차이를 느낄 수 있어요."}],q:{t:"Where do the coffee beans come from?",k:"커피 원두는 어디에서 온 건가요?",o:["Brazil","Ethiopia","Colombia","Kenya"],a:2},ex:{en:"all the way from",kr:"~에서 먼 길을 건너온"}},
{ss:[{en:"I sat in my garden with Biscuit and just enjoyed the moment.",kr:"비스킷과 함께 정원에 앉아서 그 순간을 즐겼어요."},{en:"The birds were singing and the air smelled like spring.",kr:"새들이 노래하고 공기에서 봄 냄새가 났어요."},{en:"Sometimes the simplest things bring the most joy.",kr:"때때로 가장 단순한 것들이 가장 큰 기쁨을 줘요."}],q:{t:"Where did Margaret sit with Biscuit?",k:"마가렛은 비스킷과 어디에 앉았나요?",o:["Kitchen","Café","Garden","Living room"],a:2},ex:{en:"the simplest things",kr:"가장 단순한 것들"}}
]}};
const BG={kitchen:{l:'🍳 주방',c:'linear-gradient(170deg,#FFF8E7,#D4B896 50%,#A08060)',i:['☕','🍪','🫖']},garden:{l:'🌿 정원',c:'linear-gradient(170deg,#87CEEB,#4A7C59 50%,#2D5A27)',i:['🌸','🌻','🦋']},cafe:{l:'☕ 카페',c:'linear-gradient(170deg,#3D2B1F,#6B4226 50%,#A47B52)',i:['☕','📖','🎵']},living:{l:'🏠 거실',c:'linear-gradient(170deg,#4A3728,#8B6F5E 50%,#D4A574)',i:['🛋️','🖼️','🕯️']}};

function svg(sp){const m=sp?'M122 192Q140 218 158 192':'M125 195Q140 210 155 195',f=sp?'#C4444450':'none',o=sp?.5:.3;
return`<svg viewBox="30 70 220 210" width="300" height="285" style="filter:drop-shadow(0 8px 24px rgba(0,0,0,.5))"><defs><radialGradient id="sk" cx="50%" cy="40%"><stop offset="0%" stop-color="#FDE4D8"/><stop offset="100%" stop-color="#FDBCB4"/></radialGradient></defs><ellipse cx="140" cy="148" rx="84" ry="92" fill="#D8D8D8"/><ellipse cx="140" cy="132" rx="80" ry="76" fill="#EBEBEB"/><ellipse cx="140" cy="172" rx="66" ry="74" fill="url(#sk)"/><ellipse cx="117" cy="166" rx="23" ry="19" fill="none" stroke="#7B6245" stroke-width="2.5"/><ellipse cx="163" cy="166" rx="23" ry="19" fill="none" stroke="#7B6245" stroke-width="2.5"/><line x1="94" y1="163" x2="78" y2="157" stroke="#7B6245" stroke-width="2"/><line x1="186" y1="163" x2="202" y2="157" stroke="#7B6245" stroke-width="2"/><ellipse cx="117" cy="166" rx="6" ry="8" fill="#3E2B1A"/><ellipse cx="163" cy="166" rx="6" ry="8" fill="#3E2B1A"/><circle cx="120" cy="163" r="2.2" fill="white" opacity=".9"/><circle cx="166" cy="163" r="2.2" fill="white" opacity=".9"/><path d="M103 148Q117 139 132 148" fill="none" stroke="#C0C0C0" stroke-width="2.2" stroke-linecap="round"/><path d="M148 148Q163 139 177 148" fill="none" stroke="#C0C0C0" stroke-width="2.2" stroke-linecap="round"/><circle cx="96" cy="188" r="14" fill="#FF9090" opacity="${o}"/><circle cx="184" cy="188" r="14" fill="#FF9090" opacity="${o}"/><path d="M138 179Q140 185 142 179" fill="none" stroke="#DFA09A" stroke-width="1.5"/><path d="${m}" fill="${f}" stroke="#C0736C" stroke-width="2.5" stroke-linecap="round"/><path d="M78 262Q78 240 110 234Q140 228 170 234Q202 240 202 262L202 290 78 290Z" fill="#7C3AED"/><path d="M114 240Q140 254 166 240" fill="none" stroke="#6D28D9" stroke-width="2"/>${[108,120,132,144,156,168].map((x,i)=>`<circle cx="${x}" cy="${237+Math.sin(i*.9)*3}" r="3.8" fill="#FFF8DC" stroke="#D4A520" stroke-width=".6" opacity=".85"/>`).join('')}</svg>`}

let _st='';
function scene(bk,en,kr){const b=BG[bk]||BG.kitchen;_st=en||'';
return`<div class="scene"><div class="scene-bg" style="background:${b.c}"></div>${b.i.map((c,i)=>`<span class="sic" style="font-size:${26+i*8}px;left:${12+i*32}%;top:${8+i*20}%;animation:fl ${5+i*2}s ease-in-out infinite">${c}</span>`).join('')}<div class="scene-grad"></div><div class="scene-char" id="ch">${svg(S.spk)}</div><div class="scene-lbl"><span class="dot"></span>${b.l}</div>${en?`<div class="sub" id="sb"><div class="en" id="se">${fw(en)}</div>${kr?`<div class="kr">${kr}</div>`:''}<div class="wav" id="wv" style="display:${S.spk?'flex':'none'}">${[0,1,2,3,4].map(i=>`<span style="animation:w${i%2?'b':'a'} ${.3+i*.08}s ease-in-out infinite alternate"></span>`).join('')}</div></div>`:''}</div>`}

function fw(t){if(!t)return'';return t.split(/\s+/).map((w,i)=>{let c='';if(S.spk&&S.wi>=0){c=i<S.wi?'wd':i===S.wi?'wc':'wu'}return`<span class="${c}">${w}</span>`}).join(' ')}

function updSub(){const e=document.getElementById('se'),w=document.getElementById('wv'),c=document.getElementById('ch');if(e&&_st)e.innerHTML=fw(_st);if(w)w.style.display=S.spk?'flex':'none';if(c)c.innerHTML=svg(S.spk)}

setInterval(()=>{if(!S.spk)return;const c=document.getElementById('ch');if(c){c.innerHTML=svg(true);setTimeout(()=>{if(S.spk){const c2=document.getElementById('ch');if(c2)c2.innerHTML=svg(false)}},130)}},260);

// ═══ Screens ═══
function go(n){S.scr=n;R[n]();updNav()}

function rIntro(){app.innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0F0A1F,#1A0F2E 50%,#0D1117);padding:24px;text-align:center"><div style="font-size:52px;margin-bottom:10px">🌏</div><h1 style="font-size:38px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px">SnapQ <span style="color:#A78BFA">Friends</span></h1><p style="font-size:15px;color:#C4B5FD;font-style:italic;font-weight:300;margin-bottom:44px;letter-spacing:.06em">Friends First. Fluency Follows.</p><button class="btn" style="animation:glow 2s infinite;padding:18px 52px;font-size:19px" onclick="TTS.activate();go('lang')">START 🎉</button><p style="color:#6B7280;font-size:11px;margin-top:20px">🔊 소리를 켜주세요!</p></div>`}

function rLang(){const fl={us:'<svg viewBox="0 0 60 40" width="36" height="24"><rect width="60" height="40" fill="#B22234"/><rect y="3" width="60" height="3" fill="white"/><rect y="9" width="60" height="3" fill="white"/><rect y="15" width="60" height="3" fill="white"/><rect y="21" width="60" height="3" fill="white"/><rect y="27" width="60" height="3" fill="white"/><rect y="33" width="60" height="3" fill="white"/><rect width="24" height="21" fill="#3C3B6E"/></svg>',jp:'<svg viewBox="0 0 60 40" width="36" height="24"><rect width="60" height="40" fill="white"/><circle cx="30" cy="20" r="12" fill="#BC002D"/></svg>',cn:'<svg viewBox="0 0 60 40" width="36" height="24"><rect width="60" height="40" fill="#DE2910"/><circle cx="12" cy="13" r="5" fill="#FFDE00"/></svg>',es:'<svg viewBox="0 0 60 40" width="36" height="24"><rect width="60" height="10" fill="#AA151B"/><rect y="10" width="60" height="20" fill="#F1BF00"/><rect y="30" width="60" height="10" fill="#AA151B"/></svg>'};
app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:48px 24px;text-align:center"><h2 style="font-size:22px;font-weight:700;margin-bottom:8px">🌍 Choose Your Language</h2><p style="color:#9CA3AF;font-size:14px;margin-bottom:32px">어떤 언어를 배울까요?</p><div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto">${[{c:'us',n:'English',ok:1},{c:'jp',n:'日本語',s:'もうすぐ!'},{c:'cn',n:'中文',s:'即将推出!'},{c:'es',n:'Español',s:'¡Próximamente!'}].map(l=>`<button onclick="${l.ok?`go('profiles')`:''}" style="display:flex;align-items:center;gap:16px;background:${l.ok?'linear-gradient(135deg,#1E1B4B,#312E81)':'rgba(255,255,255,.04)'};border:${l.ok?'2px solid #6366F1':'1px solid rgba(255,255,255,.08)'};border-radius:16px;padding:16px 20px;opacity:${l.ok?1:.45}"><span style="border-radius:6px;overflow:hidden;display:inline-flex;box-shadow:0 1px 3px rgba(0,0,0,.2)">${fl[l.c]}</span><span style="color:#fff;font-size:18px;font-weight:600;flex:1;text-align:left">${l.n}</span>${l.s?`<span style="color:#F59E0B;font-size:12px">${l.s}</span>`:''}${l.ok?'<span style="color:#4ADE80;font-size:22px">→</span>':''}</button>`).join('')}</div></div>`}

function rProfiles(){const a=[{e:'👵',n:'Margaret',a:67,c:'Vermont',g:'G',p:10,ok:1},{e:'👦',n:'Ethan',a:14,c:'Phoenix',g:'G',p:10},{e:'👩‍🍳',n:'Sofia',a:31,c:'Miami',g:'G',p:10},{e:'👩‍🎤',n:'Mia',a:19,c:'NYC',g:'C',p:20},{e:'👩‍⚕️',n:'Jenny',a:34,c:'LA',g:'C',p:20},{e:'🧑‍🦱',n:'Alex',a:24,c:'LA',g:'C',p:20},{e:'👩‍💻',n:'Priya',a:26,c:'SF',g:'F',p:30},{e:'👨‍💼',n:'David',a:42,c:'Chicago',g:'F',p:30},{e:'👨‍💼',n:'Kevin',a:36,c:'NYC',g:'F',p:40}],gc={G:{l:'🐢 GENTLE 초급',c:'#8B5CF6'},C:{l:'💬 CASUAL 중급',c:'#3B82F6'},F:{l:'🔥 FAST 고급',c:'#EF4444'}};let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><h2 style="font-size:20px;font-weight:700;text-align:center;margin-bottom:24px">👥 Choose Your Friend</h2>`;['G','C','F'].forEach(g=>{h+=`<h3 style="color:${gc[g].c};font-size:13px;font-weight:600;margin:0 0 10px 4px">${gc[g].l}</h3><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;a.filter(p=>p.g===g).forEach(p=>{h+=`<button onclick="${p.ok?`go('video')`:''}" style="background:${p.ok?`linear-gradient(150deg,${gc[g].c}18,${gc[g].c}30)`:'rgba(255,255,255,.03)'};border:${p.ok?`2px solid ${gc[g].c}50`:'1px solid rgba(255,255,255,.06)'};border-radius:16px;padding:14px 6px;text-align:center;opacity:${p.ok?1:.35}"><div style="font-size:36px;margin-bottom:4px">${p.e}</div><div style="color:#fff;font-size:13px;font-weight:600">${p.n}</div><div style="color:#9CA3AF;font-size:10px">${p.a} · ${p.c}</div><div style="color:${gc[g].c};font-size:10px;margin-top:4px">${p.p}🪙</div>${!p.ok?'<div style="color:#6B7280;font-size:9px;margin-top:3px">🔒</div>':''}</button>`});h+=`</div>`});app.innerHTML=h+`</div>`}

let V={i:-1,q:false,a:false,bg:'kitchen',re:''};
function rVideo(){V={i:-1,q:false,a:false,bg:'kitchen',re:''};rfV()}
function rfV(){const l=V.i>=0?CH.intro[V.i]:null,en=V.q?(V.a?V.re:CH.question.en):(l?.en||''),kr=V.q&&!V.a?CH.question.kr:(!V.q?l?.kr||'':'');
app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><button onclick="TTS.stop();go('profiles')" style="background:none;color:#9CA3AF;font-size:14px;margin-bottom:12px">← 뒤로</button><div id="sc">${scene(V.bg,en,kr)}</div><div style="text-align:center;margin-top:20px" id="vc">${!V.q&&!V.a?'<button class="btn" onclick="pIntro()">▶ 소개 영상 보기</button>':''}${V.q&&!V.a?'<div style="display:flex;gap:12px;justify-content:center"><button class="btn btn-pink" style="padding:12px 28px;font-size:15px" onclick="aQ(\'cats\')">🐱 Cats!</button><button class="btn btn-orange" style="padding:12px 28px;font-size:15px" onclick="aQ(\'dogs\')">🐶 Dogs!</button></div>':''}${V.a?`<button class="btn btn-green" style="margin-top:8px" onclick="addF()">+ Add Friend — ${CH.price}🪙</button>`:''}</div><div style="background:rgba(255,255,255,.05);border-radius:16px;padding:18px;margin-top:20px;border:1px solid rgba(255,255,255,.08)"><div style="margin-bottom:8px">${CH.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><p style="color:#9CA3AF;font-size:13px;line-height:1.7">${CH.name}, ${CH.age}세 · ${CH.city}<br>${CH.job} · ${CH.reason}<br><span style="color:#A78BFA">💡 ${CH.desc}</span></p></div></div>`}

let _pb=false;
async function pIntro(){if(_pb)return;_pb=true;document.getElementById('vc').innerHTML='<p style="color:#C4B5FD;font-size:13px">🎤 Margaret가 말하고 있어요...</p>';for(let i=0;i<CH.intro.length;i++){V.i=i;if(i===2)V.bg='garden';if(i===4)V.bg='cafe';rfV();document.getElementById('vc').innerHTML='<p style="color:#C4B5FD;font-size:13px">🎤 Margaret가 말하고 있어요...</p>';await TTS.speak(CH.intro[i].en,CH.rate);await new Promise(r=>setTimeout(r,400))}V.q=true;rfV();document.getElementById('vc').innerHTML='';await TTS.speak(CH.question.en,CH.rate);rfV();_pb=false}
async function aQ(a){V.a=true;V.re=a==='dogs'?"Oh wonderful! I have a dog named Biscuit!":"Cats are lovely too! My neighbor has the cutest cat!";rfV();await TTS.speak(V.re,CH.rate);rfV()}
function addF(){if(S.coins>=CH.price){S.coins-=CH.price;S.fr={int:1}}go('friends')}

function rFriends(){if(!S.fr){app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:20px">💬 My Friends</h2><div style="text-align:center;color:#6B7280;margin-top:60px"><div style="font-size:48px;margin-bottom:12px">🤷</div><p>아직 친구가 없어요!</p><button class="btn" style="margin-top:16px;padding:12px 28px;font-size:14px" onclick="go('profiles')">친구 만들러 가기 →</button></div></div>`}else{const h=Math.min(S.fr.int,5);app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:20px">💬 My Friends</h2><button onclick="go('listen')" style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 18px;text-align:left;width:100%"><div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#8B5CF635,#8B5CF615);display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid #8B5CF650;position:relative">👵<div style="position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#EF4444;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #0F0A1F">1</div></div><div style="flex:1"><div style="font-size:16px;font-weight:600;margin-bottom:4px">Margaret <span style="color:#C4B5FD;font-size:12px;margin-left:6px">${'♥'.repeat(h)}${'♡'.repeat(5-h)}</span></div><div style="color:#9CA3AF;font-size:13px">"Hey dear! I tried a new coffee today..." 💬</div></div><div style="color:#6B7280;font-size:11px">방금</div></button></div>`}}

let L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};
function rListen(){L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};rfL()}
function rfL(){const d=CH.listen,c=d.rounds[L.r],bg=['cafe','garden','living'],pv=L.as.slice(0,Math.max(0,L.as.length-(L.ph==='listen'?c.ss.length:0)));
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="TTS.stop();go('friends')" style="background:none;color:#9CA3AF;font-size:14px">← 뒤로</button><span style="color:#C4B5FD;font-size:13px;font-weight:600">🎧 ${d.topic} · R${L.r+1}/${d.rounds.length}</span><span style="color:#FCD34D;font-size:13px">⭐ ${L.sc}</span></div><div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:14px"><div style="height:100%;border-radius:2px;background:linear-gradient(90deg,#8B5CF6,#6366F1);width:${((L.r+(L.ph==='done'?1:0))/d.rounds.length)*100}%;transition:width .5s"></div></div>`;
if(L.ph!=='done'){_st=L.cs?.en||'';h+=scene(bg[L.r],L.ph==='listen'?L.cs?.en||'':'','')}
if((L.ph==='listen'||L.ph==='q')&&pv.length>0)h+=`<div style="background:rgba(139,92,246,.08);border-radius:12px;padding:12px;margin-top:12px;border:1px solid rgba(139,92,246,.15)"><div style="color:#9CA3AF;font-size:10px;margin-bottom:6px">📖 이전 대사</div>${pv.map(s=>`<p style="color:#D1D5DB;font-size:13px;line-height:1.6;margin:3px 0">${s.en}</p>`).join('')}</div>`;
if(L.ph==='ready')h+=`<div style="text-align:center;margin-top:24px"><p style="color:#C4B5FD;font-size:14px;margin-bottom:6px">Round ${L.r+1}: ${c.ss.length}문장!</p><p style="color:#6B7280;font-size:12px;margin-bottom:20px">${L.r===0?'🔊 소리에 집중하세요!':'📖 이전 문장 텍스트 공개!'}</p><button class="btn" onclick="pRnd()">🎧 듣기 시작!</button></div>`;
if(L.ph==='q')h+=`<div style="margin-top:16px"><div style="background:rgba(99,102,241,.12);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(99,102,241,.25)"><p style="font-size:15px;font-weight:600;margin-bottom:3px">${c.q.t}</p><p style="color:#A78BFA;font-size:12px">${c.q.k}</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${c.q.o.map((o,i)=>{const ia=i===c.q.a,is=i===L.sel;return`<button onclick="${L.sel===null?`pAns(${i})`:''}" style="background:${L.sel===null?'rgba(255,255,255,.07)':ia?'rgba(74,222,128,.18)':is?'rgba(239,68,68,.18)':'rgba(255,255,255,.04)'};border:${L.sel===null?'1px solid rgba(255,255,255,.12)':ia?'2px solid #4ADE80':is?'2px solid #EF4444':'1px solid rgba(255,255,255,.08)'};border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:500">${o}${L.sel!==null&&ia?' ✅':''}${is&&!ia?' ❌':''}</button>`}).join('')}</div></div>`;
if(L.ph==='res')h+=`<div style="margin-top:16px"><div style="background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:12px"><div style="color:#9CA3AF;font-size:11px;margin-bottom:6px">📖 해석</div>${c.ss.map(s=>`<div style="margin-bottom:5px"><p style="color:#E5E7EB;font-size:13px">${s.en}</p><p style="color:#A78BFA;font-size:12px">${s.kr}</p></div>`).join('')}</div><button class="btn btn-orange" style="width:100%" onclick="sExpr()">⭐ 핵심 표현 듣기</button></div>`;
if(L.ph==='expr')h+=`<div style="margin-top:16px;text-align:center"><div style="background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));border-radius:16px;padding:22px;margin-bottom:16px;border:2px solid rgba(245,158,11,.25)"><div style="font-size:11px;color:#FCD34D;margin-bottom:8px;font-weight:600">⭐ KEY EXPRESSION</div><div style="font-size:22px;font-weight:700;margin-bottom:4px">"${c.ex.en}"</div><div style="color:#FCD34D;font-size:14px">${c.ex.kr}</div></div><div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-green" style="padding:12px 24px;font-size:14px" onclick="svExpr()">📋 Save+Next</button><button onclick="nRnd()" style="background:rgba(255,255,255,.08);color:#9CA3AF;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 24px;font-size:14px">Skip →</button></div></div>`;
if(L.ph==='done')h+=`<div style="text-align:center;margin-top:32px"><div style="font-size:64px;margin-bottom:12px">${L.sc>=2?'🎉':'💪'}</div><h2 style="font-size:24px;font-weight:700;margin-bottom:8px">${L.sc>=2?'Amazing!':'Good Try!'}</h2><p style="color:#C4B5FD;font-size:16px;margin-bottom:12px">Score: ${L.sc}/${d.rounds.length} ${L.sc>=2?'✅ PASS!':''}</p>${L.sv.length>0?`<div style="background:rgba(74,222,128,.08);border-radius:14px;padding:14px;margin-bottom:16px;text-align:left;border:1px solid rgba(74,222,128,.15)"><div style="color:#4ADE80;font-size:12px;font-weight:600;margin-bottom:8px">📋 Expression Vault 저장!</div>${L.sv.map(e=>`<div style="color:#E5E7EB;font-size:13px;margin-bottom:4px">✦ <b>${e.en}</b> — ${e.kr}</div>`).join('')}</div>`:''}<div style="background:rgba(139,92,246,.08);border-radius:14px;padding:14px;margin-bottom:20px;border:1px solid rgba(139,92,246,.15)"><p style="color:#C4B5FD;font-size:13px">🪙 +${L.sc>=2?15:5} &nbsp; ♥ +2</p></div><button class="btn" onclick="fListen()">계속하기 →</button></div>`;
app.innerHTML=h+`</div>`}

async function pRnd(){const c=CH.listen.rounds[L.r];L.ph='listen';L.sel=null;for(const s of c.ss){L.as.push(s);L.cs=s;_st=s.en;rfL();await TTS.speak(s.en,CH.rate);await new Promise(r=>setTimeout(r,300))}L.cs=null;_st='';L.ph='q';rfL()}
function pAns(i){L.sel=i;if(i===CH.listen.rounds[L.r].q.a)L.sc++;if(navigator.vibrate)navigator.vibrate(i===CH.listen.rounds[L.r].q.a?[50]:[80,40,80]);rfL();setTimeout(()=>{L.ph='res';rfL()},700)}
async function sExpr(){L.ph='expr';rfL();await TTS.speak(CH.listen.rounds[L.r].ex.en,.7)}
function svExpr(){const e=CH.listen.rounds[L.r].ex;if(!L.sv.find(x=>x.en===e.en))L.sv.push(e);nRnd()}
function nRnd(){if(L.r<CH.listen.rounds.length-1){L.r++;L.ph='ready';L.sel=null}else L.ph='done';rfL()}
function fListen(){if(S.fr)S.fr.int++;S.coins+=L.sc>=2?15:5;go('friends')}

function updNav(){const sh=!['intro','lang'].includes(S.scr);let n=document.getElementById('nv');if(!sh){if(n)n.remove();return}if(!n){n=document.createElement('div');n.id='nv';n.className='nav';document.body.appendChild(n)}n.innerHTML=[{i:'🏠',l:'Home',s:'profiles'},{i:'💬',l:'Friends',s:'friends'},{i:'📋',l:'Vault',s:'vault'},{i:'🪙',l:S.coins,s:'coins'}].map(x=>`<button class="${S.scr===x.s?'on':''}" onclick="${x.s==='profiles'||x.s==='friends'?`go('${x.s}')`:''}"><span class="ic">${x.i}</span>${x.l}</button>`).join('')}

const R={intro:rIntro,lang:rLang,profiles:rProfiles,video:rVideo,friends:rFriends,listen:rListen};
go('intro');
</script>
</body>
</html>
