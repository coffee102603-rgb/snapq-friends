<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SnapTalk — Jake Ep.1 JFK Airport</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b14;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e2035;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(59,130,246,.3)}50%{box-shadow:0 0 20px rgba(59,130,246,.6)}}
@keyframes soundBar{0%{height:3px}100%{height:12px}}
.fu{animation:fadeUp .4s ease both}
.si{animation:slideIn .35s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useEffect,useRef,useCallback}=React;
const e=React.createElement;

/* ═══ DATA ═══ */
const JAKE={name:"Jake",age:32,flag:"🇺🇸",emoji:"🧔",color:"#3b82f6",
intro:"Hey! I'm Jake, 32, from California. I love traveling and showing people around! Ready for our first trip together? Let's land at JFK Airport in New York City!",
introKo:"안녕! 나는 제이크, 32살이고 캘리포니아에서 왔어. 여행을 좋아하고 사람들에게 이곳저곳 보여주는 걸 좋아해! 첫 여행 준비됐어? JFK 공항에 착륙하자!"};

const EP={num:1,title:"JFK Airport",titleKo:"JFK 공항 도착",subtitle:"도착 · 입국심사",bgDesc:"비행기가 활주로에 착륙합니다. 창밖으로 뉴욕 스카이라인이 보입니다."};

const DL=[
{id:0,speaker:"jake",en:"We just landed at JFK! Grab your passport and follow me to immigration.",ko:"JFK에 도착했어! 여권 챙기고 입국심사대로 따라와.",star:false},
{id:1,speaker:"you",en:"Okay, I'm a little nervous. Is immigration strict here?",ko:"알겠어, 좀 긴장되네. 여기 입국심사 엄격해?",star:false},
{id:2,speaker:"jake",en:"Don't worry, just answer their questions honestly. It's pretty simple.",ko:"걱정 마, 질문에 솔직하게 대답하면 돼. 꽤 간단해.",star:true,starWord:"answer honestly"},
{id:3,speaker:"you",en:"Got it. I'll keep my documents ready.",ko:"알겠어. 서류 준비해 놓을게.",star:true,starWord:"keep ~ ready"},
{id:4,speaker:"officer",en:"Good afternoon. What's the purpose of your visit?",ko:"안녕하세요. 방문 목적이 뭔가요?",star:true,starWord:"purpose of your visit"},
{id:5,speaker:"you",en:"I'm here for sightseeing. I'll be staying for ten days.",ko:"관광 왔어요. 열흘 머물 예정이에요.",star:true,starWord:"sightseeing / staying for ~"},
{id:6,speaker:"officer",en:"Where will you be staying?",ko:"어디에서 머무실 건가요?",star:false},
{id:7,speaker:"you",en:"At a hotel near Times Square. Here's my reservation.",ko:"타임스퀘어 근처 호텔이요. 여기 예약 확인서예요.",star:true,starWord:"Here's my ~"},
{id:8,speaker:"jake",en:"Nice! You passed! Now let's go pick up our luggage at baggage claim.",ko:"통과했어! 이제 수하물 찾는 곳에서 짐 찾으러 가자.",star:true,starWord:"pick up / baggage claim"},
{id:9,speaker:"you",en:"Which carousel is ours? I can't find the screen.",ko:"우리 캐러셀이 어디야? 화면을 못 찾겠어.",star:true,starWord:"carousel"},
{id:10,speaker:"jake",en:"It's carousel number five. I see our bags coming out now!",ko:"5번이야. 우리 가방 나오고 있어!",star:false},
{id:11,speaker:"you",en:"Great, I got mine! Let's head outside and catch a taxi.",ko:"좋아, 내 거 찾았어! 밖으로 나가서 택시 타자.",star:true,starWord:"head outside / catch a taxi"},
];

const CHUNKS=[{start:0,end:3,title:"기내 → 입국심사대"},{start:4,end:7,title:"입국심사관과 대화"},{start:8,end:11,title:"수하물 → 공항 밖으로"}];

const QUIZZES=[
[{q:"Jake가 뭘 챙기라고 했나요?",a:"여권 (passport)",opts:["여권 (passport)","비행기표 (ticket)","지갑 (wallet)","가방 (bag)"]},{q:"'솔직하게 대답하다'를 영어로?",a:"answer honestly",opts:["answer honestly","speak loudly","talk slowly","reply quickly"]}],
[{q:"입국심사관이 처음 물어본 것은?",a:"방문 목적 (purpose of visit)",opts:["방문 목적 (purpose of visit)","이름 (name)","나이 (age)","직업 (job)"]},{q:"'관광'을 영어로?",a:"sightseeing",opts:["sightseeing","shopping","business","studying"]}],
[{q:"수하물 찾는 곳은 영어로?",a:"baggage claim",opts:["baggage claim","check-in counter","boarding gate","duty free"]},{q:"'택시를 타다'를 영어로?",a:"catch a taxi",opts:["catch a taxi","ride a bus","take a train","call a car"]}],
];

const STAR_EX=DL.filter(d=>d.star).map(d=>({en:d.starWord,sentence:d.en,ko:d.ko,id:d.id}));

/* ═══ TTS (단순!) ═══ */
function speak(text,rate){
  rate=rate||0.82;
  return new Promise(function(res){
    if(!window.speechSynthesis){res();return}
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="en-US";u.rate=rate;u.onend=res;u.onerror=res;
    window.speechSynthesis.speak(u);
  });
}

function spkInfo(s){
  if(s==="jake")return{name:"Jake",emoji:"🧔",color:"#3b82f6",label:"🇺🇸 Jake (32)"};
  if(s==="officer")return{name:"Officer",emoji:"👮",color:"#ef4444",label:"🛂 Immigration Officer"};
  return{name:"You",emoji:"🧑",color:"#f59e0b",label:"🎤 You"};
}

const F="'Pretendard','Apple SD Gothic Neo',sans-serif";
const CC={bg:"#0a0b14",card:"#12131f",border:"#1e2035",jake:"#3b82f6",you:"#f59e0b",officer:"#ef4444",green:"#22c55e",star:"#fbbf24",white:"#f1f5f9",gray:"#64748b",grayL:"#94a3b8",grayD:"#334155",accent:"#8b5cf6"};

/* ═══ COMPONENT ═══ */
function App(){
  const[screen,setScreen]=useState("intro");
  const[chunkIdx,setChunkIdx]=useState(0);
  const[lineIdx,setLineIdx]=useState(0);
  const[showKo,setShowKo]=useState({});
  const[quizIdx,setQuizIdx]=useState(0);
  const[quizAns,setQuizAns]=useState(null);
  const[quizScore,setQuizScore]=useState(0);
  const[wbSaved,setWbSaved]=useState([]);
  const[wbHL,setWbHL]=useState({});
  const[chatMsgs,setChatMsgs]=useState([]);
  const[starCk,setStarCk]=useState({});
  const[listening,setListening]=useState(false);
  const[playing,setPlaying]=useState(null);
  const[anim,setAnim]=useState(true);
  const chatRef=useRef(null);
  const recRef=useRef(null);

  const go=function(fn){setAnim(false);setTimeout(function(){fn();setAnim(true)},200)};

  const playLine=function(line){
    setPlaying(line.id);
    speak(line.en).then(function(){setPlaying(null)});
  };

  const startSTT=useCallback(function(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("음성인식이 지원되지 않는 브라우저입니다.");return}
    var r=new SR();r.lang="en-US";r.interimResults=false;
    r.onresult=function(ev){
      var text=ev.results[0][0].transcript;
      setChatMsgs(function(p){return p.concat({speaker:"you",text:text,time:new Date()})});
      setListening(false);
      setTimeout(function(){
        var resps=["Great job! Your pronunciation is getting better!","That's exactly how we say it! Nice!","Good try! Let me say it once more for you.","Perfect! You're a natural!","Almost! Listen carefully and try again."];
        var resp=resps[Math.floor(Math.random()*resps.length)];
        setChatMsgs(function(p){return p.concat({speaker:"jake",text:resp,time:new Date()})});
        speak(resp,0.85);
      },1200);
    };
    r.onerror=function(){setListening(false)};
    r.onend=function(){setListening(false)};
    recRef.current=r;setListening(true);r.start();
  },[]);

  useEffect(function(){if(chatRef.current)chatRef.current.scrollIntoView({behavior:"smooth"})},[chatMsgs]);

  var pg={fontFamily:F,background:CC.bg,minHeight:"100vh",maxWidth:440,margin:"0 auto",position:"relative",overflow:"hidden"};
  var hdr={display:"flex",alignItems:"center",gap:10,padding:"16px 20px 12px",borderBottom:"1px solid "+CC.border};
  var backBtn={background:"none",border:"none",color:CC.grayL,fontSize:14,cursor:"pointer",padding:"4px 8px",fontFamily:F};
  var ttl={fontSize:15,fontWeight:700,color:CC.white,flex:1};
  var badge=function(bg,cl){return{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:6,background:bg,color:cl}};
  var card={background:CC.card,borderRadius:14,border:"1px solid "+CC.border,padding:16,marginBottom:12};
  var btn={width:"100%",padding:"14px",borderRadius:12,border:"none",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:F,transition:"all 0.2s"};

  /* ═══ INTRO ═══ */
  if(screen==="intro"){
    return e("div",{style:pg},
      e("div",{style:{opacity:anim?1:0,transition:"opacity 0.3s"}},
        // 공항 배경
        e("div",{style:{position:"relative",height:220,overflow:"hidden",background:"linear-gradient(135deg,#0c1445 0%,#1a237e 40%,#283593 70%,#1565c0 100%)"}},
          e("div",{style:{position:"absolute",top:20,right:30,fontSize:48,animation:"bounce 3s ease infinite"}},"✈️"),
          e("div",{style:{position:"absolute",bottom:50,left:20,fontSize:36}},"🏙️"),
          e("div",{style:{position:"absolute",bottom:50,left:70,fontSize:28}},"🗽"),
          e("div",{style:{position:"absolute",bottom:50,right:40,fontSize:32}},"🏢"),
          e("div",{style:{position:"absolute",bottom:0,left:0,right:0,height:50,background:"linear-gradient(0deg,#1a1a2e,#16213e)",borderTop:"2px dashed rgba(255,255,255,0.15)"}}),
          e("div",{style:{position:"absolute",top:14,left:16,display:"flex",alignItems:"center",gap:6}},
            e("span",{style:{background:"rgba(59,130,246,0.3)",color:"#93c5fd",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:6,letterSpacing:1}},"EP.1"),
            e("span",{style:{color:"#e2e8f0",fontSize:13,fontWeight:700}},EP.title)
          ),
          e("div",{style:{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",textAlign:"center"}},
            e("div",{style:{fontSize:52,filter:"drop-shadow(0 4px 12px rgba(0,0,0,0.5))"}},"🧔"),
            e("div",{style:{background:"rgba(59,130,246,0.85)",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 12px",borderRadius:8,marginTop:4}},JAKE.flag+" Jake ("+JAKE.age+")")
          )
        ),
        // 에피소드 정보
        e("div",{style:{padding:"20px 20px 16px"}},
          e("h1",{style:{fontSize:22,fontWeight:800,color:CC.white,marginBottom:4}},"✈️ "+EP.titleKo),
          e("p",{style:{fontSize:12,color:CC.grayL,marginBottom:16,lineHeight:1.6}},EP.bgDesc),
          // Jake 소개
          e("div",{className:"fu",style:Object.assign({},card,{borderColor:CC.jake+"25"})},
            e("div",{style:{display:"flex",gap:10,alignItems:"flex-start"}},
              e("div",{style:{fontSize:32}},"🧔"),
              e("div",{style:{flex:1}},
                e("div",{style:{fontSize:13,fontWeight:700,color:CC.jake,marginBottom:4}},JAKE.flag+" Jake says:"),
                e("p",{style:{fontSize:13,color:CC.white,lineHeight:1.6,margin:0}},JAKE.intro),
                e("p",{style:{fontSize:11,color:CC.gray,lineHeight:1.5,marginTop:6}},JAKE.introKo)
              )
            )
          ),
          // 학습 안내
          e("div",{className:"fu",style:Object.assign({},card,{borderColor:CC.accent+"20"})},
            e("div",{style:{fontSize:13,fontWeight:700,color:CC.accent,marginBottom:8}},"📖 학습 순서"),
            ["🎧 리스닝 — 2문장씩 듣고 퀴즈","📋 화이트보드 — 핵심표현 리뷰","💬 대화방 — 직접 말해보기"].map(function(t,i){
              return e("div",{key:i,style:{fontSize:12,color:CC.grayL,padding:"6px 0",borderBottom:i<2?"1px solid "+CC.border:"none",display:"flex",alignItems:"center",gap:8}},
                e("span",{style:{fontSize:11,fontWeight:700,color:CC.gray,width:20}},i+1),t)
            })
          ),
          // 시작
          e("button",{onClick:function(){go(function(){setScreen("listening");setChunkIdx(0);setLineIdx(0)})},
            style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.jake+",#2563eb)",color:"#fff",marginTop:8,boxShadow:"0 4px 20px "+CC.jake+"40"})},"🎧 리스닝 시작!")
        )
      )
    );
  }

  /* ═══ LISTENING ═══ */
  if(screen==="listening"){
    var chunk=CHUNKS[chunkIdx];
    var totalInChunk=chunk.end-chunk.start+1;
    var curGlobal=chunk.start+lineIdx;
    var curLine=DL[curGlobal];
    var visible=DL.slice(chunk.start,curGlobal+1);
    var isLast=lineIdx>=totalInChunk-1;
    var sp=spkInfo(curLine.speaker);

    return e("div",{style:pg},
      e("div",{style:{opacity:anim?1:0,transition:"opacity 0.3s"}},
        // 헤더
        e("div",{style:hdr},
          e("button",{onClick:function(){go(function(){setScreen("intro")})},style:backBtn},"←"),
          e("div",{style:ttl},"🎧 Chunk "+(chunkIdx+1)+"/3: "+chunk.title),
          e("span",{style:badge(CC.jake+"20",CC.jake)},(lineIdx+1)+"/"+totalInChunk)
        ),
        // 미니 씬
        e("div",{style:{margin:"12px 20px",borderRadius:14,overflow:"hidden",position:"relative",height:100,background:"linear-gradient(135deg,#0f172a,#1e293b)",border:"1px solid "+CC.border}},
          e("div",{style:{position:"absolute",top:8,left:10,fontSize:9,color:CC.gray,fontWeight:600}},"🛂 JFK Airport — "+chunk.title),
          e("div",{style:{position:"absolute",bottom:10,left:0,right:0,display:"flex",justifyContent:"space-around",alignItems:"flex-end",padding:"0 16px"}},
            ["jake","officer","you"].map(function(who){
              var s=spkInfo(who);var active=curLine.speaker===who;
              return e("div",{key:who,style:{textAlign:"center",transition:"all 0.3s",transform:active?"scale(1.2) translateY(-4px)":"scale(1)"}},
                e("div",{style:{fontSize:active?30:22,transition:"all 0.3s"}},s.emoji),
                e("div",{style:{fontSize:8,fontWeight:700,color:active?s.color:CC.gray,marginTop:2,padding:"1px 6px",borderRadius:4,background:active?s.color+"18":"transparent"}},s.name),
                active&&playing===curLine.id?e("div",{style:{display:"flex",gap:1,justifyContent:"center",marginTop:3}},
                  [0,1,2].map(function(j){return e("div",{key:j,style:{width:2,height:4+j*3,background:s.color,borderRadius:1,animation:"pulse 0.4s "+j*0.12+"s ease infinite alternate"}})})
                ):null
              )
            })
          )
        ),
        // 누적 대사
        e("div",{style:{padding:"0 20px",maxHeight:260,overflowY:"auto"}},
          visible.map(function(line,i){
            var s=spkInfo(line.speaker);var isCur=i===visible.length-1;var isYou=line.speaker==="you";
            return e("div",{key:line.id,className:isCur?"fu":"",style:{marginBottom:8,display:"flex",flexDirection:isYou?"row-reverse":"row",gap:8,alignItems:"flex-start",opacity:isCur?1:0.5}},
              e("div",{style:{fontSize:24,flexShrink:0}},s.emoji),
              e("div",{style:{background:isCur?s.color+"12":CC.card,border:"1px solid "+(isCur?s.color+"30":CC.border),borderRadius:isYou?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",maxWidth:"78%"}},
                e("div",{style:{fontSize:9,fontWeight:700,color:s.color,marginBottom:4,display:"flex",alignItems:"center",gap:4}},
                  s.label,line.star?e("span",{style:{color:CC.star}},"⭐"):null),
                e("p",{style:{fontSize:14,color:CC.white,margin:0,lineHeight:1.6,fontWeight:500}},line.en),
                showKo[line.id]?
                  e("p",{style:{fontSize:11,color:CC.grayL,margin:"6px 0 0",lineHeight:1.5,borderTop:"1px solid "+CC.border,paddingTop:6}},line.ko):
                  e("button",{onClick:function(){var id=line.id;setShowKo(function(p){var n=Object.assign({},p);n[id]=true;return n})},
                    style:{background:CC.you+"10",border:"1px solid "+CC.you+"25",borderRadius:6,color:CC.you,fontSize:10,fontWeight:600,padding:"3px 10px",marginTop:6,cursor:"pointer",fontFamily:F}},"👆 한글 보기"),
                line.star&&line.starWord?e("div",{style:{marginTop:6,padding:"4px 8px",background:CC.star+"12",borderRadius:6,fontSize:10,color:CC.star,fontWeight:600}},"⭐ "+line.starWord):null
              )
            )
          })
        ),
        // 하단
        e("div",{style:{padding:"12px 20px 24px",borderTop:"1px solid "+CC.border,marginTop:8}},
          e("button",{onClick:function(){playLine(curLine)},disabled:playing!==null,
            style:Object.assign({},btn,{background:playing===curLine.id?sp.color+"30":sp.color+"15",color:sp.color,border:"1px solid "+sp.color+"30",marginBottom:8,animation:playing===curLine.id?"glow 1.5s ease infinite":"none"})},
            playing===curLine.id?"🔊 재생 중...":"🔊 다시 듣기 — "+sp.name),
          !isLast?
            e("button",{onClick:function(){go(function(){setLineIdx(function(p){return p+1})})},
              style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.jake+",#2563eb)",color:"#fff"})},"다음 문장 →"):
            e("button",{onClick:function(){go(function(){setScreen("quiz");setQuizIdx(0);setQuizAns(null)})},
              style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.green+",#16a34a)",color:"#fff"})},"✅ 퀴즈 풀기!")
        )
      )
    );
  }

  /* ═══ QUIZ ═══ */
  if(screen==="quiz"){
    var qSet=QUIZZES[chunkIdx];var curQ=qSet[quizIdx];
    var isCorrect=quizAns===curQ.a;var answered=quizAns!==null;

    return e("div",{style:pg},
      e("div",{style:{opacity:anim?1:0,transition:"opacity 0.3s"}},
        e("div",{style:hdr},
          e("div",{style:ttl},"📝 Quiz — Chunk "+(chunkIdx+1)),
          e("span",{style:badge(CC.green+"20",CC.green)},"Q"+(quizIdx+1)+"/"+qSet.length)
        ),
        e("div",{style:{padding:"24px 20px"}},
          e("div",{className:"fu",style:Object.assign({},card,{borderColor:CC.accent+"25",textAlign:"center"})},
            e("div",{style:{fontSize:36,marginBottom:12}},"🤔"),
            e("p",{style:{fontSize:16,fontWeight:700,color:CC.white,lineHeight:1.6}},curQ.q)
          ),
          e("div",{style:{display:"flex",flexDirection:"column",gap:8,marginTop:16}},
            curQ.opts.map(function(opt,i){
              var selected=quizAns===opt;var correct=opt===curQ.a;
              var bg=CC.card,bdr=CC.border,tc=CC.white;
              if(answered&&correct){bg=CC.green+"15";bdr=CC.green+"50";tc=CC.green}
              else if(answered&&selected&&!correct){bg=CC.officer+"15";bdr=CC.officer+"50";tc=CC.officer}
              return e("button",{key:i,className:"fu",onClick:function(){if(!answered){setQuizAns(opt);if(opt===curQ.a)setQuizScore(function(p){return p+1})}},
                style:Object.assign({},btn,{background:bg,color:tc,border:"1px solid "+bdr,textAlign:"left",padding:"14px 16px",fontSize:14,animationDelay:i*80+"ms",cursor:answered?"default":"pointer"})},
                e("span",{style:{marginRight:8,fontSize:12,fontWeight:700,color:CC.gray}},String.fromCharCode(65+i)),
                opt,answered&&correct?" ✅":"",answered&&selected&&!correct?" ❌":"")
            })
          ),
          answered?e("div",{className:"fu",style:{marginTop:16}},
            e("div",{style:Object.assign({},card,{borderColor:(isCorrect?CC.green:CC.officer)+"30",textAlign:"center"})},
              e("div",{style:{fontSize:28,marginBottom:6}},isCorrect?"🎉":"😅"),
              e("p",{style:{fontSize:14,fontWeight:700,color:isCorrect?CC.green:CC.officer}},isCorrect?"정답!":"오답! 정답: "+curQ.a)
            ),
            e("button",{onClick:function(){
              if(quizIdx<qSet.length-1){go(function(){setQuizIdx(function(p){return p+1});setQuizAns(null)})}
              else if(chunkIdx<2){go(function(){setChunkIdx(function(p){return p+1});setLineIdx(0);setScreen("listening");setShowKo({})})}
              else{go(function(){setScreen("whiteboard")})}
            },style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.jake+",#2563eb)",color:"#fff",marginTop:8})},
              quizIdx<qSet.length-1?"다음 문제 →":chunkIdx<2?"Chunk "+(chunkIdx+2)+" 리스닝 →":"📋 화이트보드 리뷰 →")
          ):null
        )
      )
    );
  }

  /* ═══ WHITEBOARD ═══ */
  if(screen==="whiteboard"){
    var hlCount=Object.keys(wbHL).filter(function(k){return wbHL[k]}).length;
    return e("div",{style:pg},
      e("div",{style:{opacity:anim?1:0,transition:"opacity 0.3s"}},
        e("div",{style:hdr},
          e("div",{style:ttl},"📋 화이트보드 리뷰"),
          e("span",{style:badge(CC.star+"20",CC.star)},hlCount+" 형광")
        ),
        e("div",{style:{padding:"8px 20px 24px",maxHeight:"calc(100vh - 70px)",overflowY:"auto"}},
          e("p",{style:{fontSize:11,color:CC.gray,marginBottom:12,lineHeight:1.5}},"👆 터치 = 한글 보기  |  💛 = 형광펜(암기필수)  |  💾 = 노트 저장"),
          DL.map(function(line,i){
            var s=spkInfo(line.speaker);var hl=wbHL[line.id];var saved=wbSaved.indexOf(line.id)>=0;
            return e("div",{key:line.id,className:"si",style:Object.assign({},card,{animationDelay:i*40+"ms",borderColor:hl?CC.star+"40":saved?CC.green+"30":CC.border,background:hl?CC.star+"08":CC.card,position:"relative"})},
              e("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:6}},
                e("span",{style:{fontSize:16}},s.emoji),
                e("span",{style:{fontSize:10,fontWeight:700,color:s.color}},s.label),
                line.star?e("span",{style:{fontSize:12}},"⭐"):null,
                e("div",{style:{marginLeft:"auto",display:"flex",gap:6}},
                  e("button",{onClick:function(){var id=line.id;setWbHL(function(p){var n=Object.assign({},p);n[id]=!n[id];return n})},
                    style:{background:"none",border:"none",fontSize:14,cursor:"pointer",opacity:hl?1:0.4}},"💛"),
                  e("button",{onClick:function(){var id=line.id;if(wbSaved.indexOf(id)<0)setWbSaved(function(p){return p.concat(id)})},
                    style:{background:"none",border:"none",fontSize:14,cursor:"pointer",opacity:saved?1:0.4}},"💾")
                )
              ),
              e("div",{style:{display:"flex",alignItems:"center",gap:6}},
                e("p",{style:{fontSize:14,color:CC.white,margin:0,lineHeight:1.6,flex:1,fontWeight:500}},line.en),
                e("button",{onClick:function(){playLine(line)},style:{background:s.color+"15",border:"1px solid "+s.color+"25",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:14}},playing===line.id?"🔊":"▶️")
              ),
              showKo["wb_"+line.id]?
                e("p",{style:{fontSize:12,color:CC.grayL,margin:"8px 0 0",lineHeight:1.5,paddingTop:6,borderTop:"1px solid "+CC.border}},line.ko):
                e("button",{onClick:function(){var id="wb_"+line.id;setShowKo(function(p){var n=Object.assign({},p);n[id]=true;return n})},
                  style:{background:CC.you+"08",border:"1px dashed "+CC.you+"25",borderRadius:8,color:CC.you,fontSize:10,fontWeight:600,padding:"4px 12px",marginTop:8,cursor:"pointer",fontFamily:F,width:"100%"}},"👆 한글 뜻 보기"),
              line.star&&line.starWord?e("div",{style:{marginTop:6,padding:"4px 10px",background:CC.star+"10",borderRadius:6,fontSize:10,color:CC.star,fontWeight:700,display:"inline-block"}},"⭐ 핵심표현: "+line.starWord):null
            )
          }),
          e("div",{style:Object.assign({},card,{borderColor:CC.green+"25",textAlign:"center",marginTop:8})},
            e("div",{style:{fontSize:28,marginBottom:6}},"📊"),
            e("p",{style:{fontSize:13,color:CC.white,fontWeight:600}},"퀴즈 "+quizScore+"/6  |  형광 "+hlCount+"개  |  저장 "+wbSaved.length+"개")
          ),
          e("button",{onClick:function(){go(function(){setScreen("chatroom");setChatMsgs([]);setStarCk({})})},
            style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.you+",#d97706)",color:"#fff",marginTop:8})},"💬 대화방으로!")
        )
      )
    );
  }

  /* ═══ CHATROOM ═══ */
  if(screen==="chatroom"){
    var ckCount=Object.values(starCk).filter(Boolean).length;
    var allCk=ckCount>=3;

    return e("div",{style:Object.assign({},pg,{})},
      e("div",{style:{opacity:anim?1:0,transition:"opacity 0.3s",display:"flex",flexDirection:"column",height:"100vh"}},
        e("div",{style:hdr},
          e("button",{onClick:function(){go(function(){setScreen("whiteboard")})},style:backBtn},"←"),
          e("div",{style:{flex:1}},
            e("div",{style:ttl},"💬 Jake와 대화"),
            e("div",{style:{fontSize:10,color:CC.gray}},"⭐ 별표표현 "+ckCount+"/"+STAR_EX.length+" 완료")
          ),
          allCk?e("span",{style:Object.assign({},badge(CC.green+"20",CC.green),{animation:"pulse 1.5s infinite"})},"🎉 ALL!"):null
        ),
        // 별표 체크리스트
        e("div",{style:{padding:"8px 20px",borderBottom:"1px solid "+CC.border,overflowX:"auto",display:"flex",gap:6,flexShrink:0}},
          STAR_EX.map(function(expr,i){
            var ck=starCk[expr.id];
            return e("button",{key:i,onClick:function(){var id=expr.id;setStarCk(function(p){var n=Object.assign({},p);n[id]=!n[id];return n})},
              style:{flexShrink:0,padding:"6px 12px",borderRadius:20,background:ck?CC.green+"15":CC.star+"10",border:"1px solid "+(ck?CC.green:CC.star)+"30",color:ck?CC.green:CC.star,fontSize:10,fontWeight:600,fontFamily:F,cursor:"pointer",textDecoration:ck?"line-through":"none",whiteSpace:"nowrap"}},
              (ck?"✅":"⭐")+" "+expr.en)
          })
        ),
        // 채팅
        e("div",{style:{flex:1,overflowY:"auto",padding:"12px 20px"}},
          chatMsgs.length===0?e("div",{className:"fu",style:{textAlign:"center",padding:"32px 0"}},
            e("div",{style:{fontSize:48,marginBottom:12}},"🧔"),
            e("p",{style:{fontSize:14,fontWeight:600,color:CC.white,marginBottom:4}},"Jake와 대화를 시작하세요!"),
            e("p",{style:{fontSize:11,color:CC.gray,lineHeight:1.5}},"🎤 버튼을 눌러 영어로 말해보세요.",e("br"),"⭐ 별표표현을 사용해서 말해보세요.",e("br"),"3개 이상 체크하면 🎉 축하!")
          ):null,
          chatMsgs.map(function(msg,i){
            var isMe=msg.speaker==="you";var s=spkInfo(msg.speaker);
            return e("div",{key:i,className:"si",style:{display:"flex",flexDirection:isMe?"row-reverse":"row",gap:8,marginBottom:10,animationDelay:i*50+"ms"}},
              e("div",{style:{fontSize:22,flexShrink:0}},s.emoji),
              e("div",{style:{background:isMe?CC.you+"12":CC.jake+"12",border:"1px solid "+(isMe?CC.you:CC.jake)+"25",borderRadius:isMe?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",maxWidth:"75%"}},
                e("p",{style:{fontSize:13,color:CC.white,margin:0,lineHeight:1.5}},msg.text),
                e("p",{style:{fontSize:9,color:CC.gray,margin:"4px 0 0",textAlign:isMe?"right":"left"}},msg.time.toLocaleTimeString("ko",{hour:"2-digit",minute:"2-digit"}))
              )
            )
          }),
          e("div",{ref:chatRef})
        ),
        // 입력
        e("div",{style:{padding:"12px 20px 24px",borderTop:"1px solid "+CC.border,background:CC.bg,flexShrink:0}},
          allCk?e("div",{className:"fu",style:{background:CC.green+"12",border:"1px solid "+CC.green+"30",borderRadius:12,padding:12,marginBottom:10,textAlign:"center"}},
            e("div",{style:{fontSize:32}},"🎉🎊🎉"),
            e("p",{style:{fontSize:14,fontWeight:700,color:CC.green,margin:"6px 0 2px"}},"축하합니다!"),
            e("p",{style:{fontSize:11,color:CC.grayL}},"별표표현을 "+ckCount+"개 이상 사용했어요!"),
            e("button",{onClick:function(){go(function(){setScreen("complete")})},
              style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.green+",#16a34a)",color:"#fff",marginTop:8,padding:"10px"})},"🏆 에피소드 완료!")
          ):null,
          e("div",{style:{display:"flex",gap:8}},
            e("button",{onClick:startSTT,disabled:listening,
              style:{width:56,height:56,borderRadius:"50%",border:"none",background:listening?"linear-gradient(135deg,"+CC.officer+",#dc2626)":"linear-gradient(135deg,"+CC.you+",#d97706)",color:"#fff",fontSize:24,cursor:"pointer",animation:listening?"pulse 0.8s ease infinite":"none",boxShadow:listening?"0 0 20px "+CC.officer+"60":"0 4px 16px "+CC.you+"40"}},
              listening?"⏹️":"🎤"),
            e("div",{style:{flex:1,display:"flex",alignItems:"center"}},
              listening?e("div",{style:{display:"flex",alignItems:"center",gap:8}},
                e("div",{style:{width:8,height:8,borderRadius:"50%",background:CC.officer,animation:"pulse 0.6s infinite"}}),
                e("span",{style:{fontSize:13,color:CC.officer,fontWeight:600}},"듣고 있어요...")):
                e("span",{style:{fontSize:12,color:CC.gray}},"🎤 버튼을 눌러 영어로 말해보세요")
            )
          )
        )
      )
    );
  }

  /* ═══ COMPLETE ═══ */
  if(screen==="complete"){
    var hlC=Object.keys(wbHL).filter(function(k){return wbHL[k]}).length;
    var stC=Object.values(starCk).filter(Boolean).length;
    return e("div",{style:pg},
      e("div",{style:{opacity:anim?1:0,transition:"opacity 0.3s",padding:"40px 20px",textAlign:"center"}},
        e("div",{className:"fu",style:{fontSize:64,marginBottom:16}},"🏆"),
        e("h1",{className:"fu",style:{fontSize:24,fontWeight:800,color:CC.white,marginBottom:8,animationDelay:"0.1s"}},"Episode 1 Complete!"),
        e("p",{className:"fu",style:{fontSize:14,color:CC.grayL,marginBottom:24,lineHeight:1.6,animationDelay:"0.2s"}},"JFK Airport를 무사히 통과했어요!",e("br"),"Jake와 함께 뉴욕 모험이 시작됩니다! 🗽"),
        e("div",{className:"fu",style:Object.assign({},card,{borderColor:CC.jake+"25",textAlign:"left",animationDelay:"0.3s"})},
          e("div",{style:{fontSize:14,fontWeight:700,color:CC.jake,marginBottom:12}},"📊 성적표"),
          [{l:"퀴즈 점수",v:quizScore+"/6",ic:"📝"},{l:"형광 표시",v:hlC+"개",ic:"💛"},{l:"노트 저장",v:wbSaved.length+"개",ic:"💾"},{l:"별표표현 사용",v:stC+"/"+STAR_EX.length,ic:"⭐"}].map(function(it,i){
            return e("div",{key:i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid "+CC.border:"none"}},
              e("span",{style:{fontSize:12,color:CC.grayL}},it.ic+" "+it.l),
              e("span",{style:{fontSize:14,fontWeight:700,color:CC.white}},it.v))
          })
        ),
        e("div",{className:"fu",style:Object.assign({},card,{borderColor:CC.you+"25",animationDelay:"0.4s"})},
          e("div",{style:{fontSize:12,fontWeight:700,color:CC.you,marginBottom:4}},"🔜 Next Episode"),
          e("p",{style:{fontSize:15,fontWeight:700,color:CC.white,margin:0}},"Ep.2 — Times Square 🌃"),
          e("p",{style:{fontSize:11,color:CC.gray,margin:"4px 0 0"}},"첫날밤, 뉴욕의 불빛 속으로!"),
          e("div",{style:Object.assign({},badge(CC.grayD,CC.gray),{marginTop:8,display:"inline-block"})},"COMING SOON")
        ),
        e("button",{onClick:function(){go(function(){
          setScreen("intro");setChunkIdx(0);setLineIdx(0);setShowKo({});
          setQuizScore(0);setWbSaved([]);setWbHL({});setStarCk({});
        })},style:Object.assign({},btn,{background:"linear-gradient(135deg,"+CC.jake+",#2563eb)",color:"#fff",marginTop:12})},"🔄 다시 학습하기")
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
