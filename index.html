// ═══ RENDER HELPERS ═══
function charSc(ch,sub,spk){const bg=ch.bg||{l:'🏠',c:'linear-gradient(#333,#555)'};
return`<div class="sc"><div style="position:absolute;inset:0;background:${bg.c}"></div><div style="position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,.45) 100%)"></div><div style="position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);z-index:3;font-size:120px;${spk?'animation:talk .3s ease-in-out infinite alternate':''}">${ch.emoji}</div><div style="position:absolute;top:12px;left:14px;z-index:5;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);padding:5px 14px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px #4ADE80"></span>${bg.l}</div>${sub?`<div style="position:absolute;bottom:0;left:0;right:0;z-index:6;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);padding:14px 18px;text-align:center"><div style="font-size:16px;font-weight:600;line-height:1.7">${sub.en}</div>${sub.kr?`<div style="color:#C4B5FD;font-size:13px;margin-top:3px">${sub.kr}</div>`:''}</div>`:''}</div>`}

document.getElementById('sc1').innerHTML=charSc(ch,{en:ch.question.en,kr:ch.question.kr},true);await speak(ch.question.en,ch.rate);document.getElementById('sc1').innerHTML=charSc(ch,{en:ch.question.en,kr:ch.question.kr},false);
const o=Object.keys(ch.answers);vc.innerHTML=`<div style="display:flex;gap:12px;justify-content:center">${o.map((k,i)=>`<button class="b ${i?'bo':'bp'}" style="padding:12px 28px;font-size:15px" onclick="ansV('${k}')">${k.charAt(0).toUpperCase()+k.slice(1)}!</button>`).join('')}</div>`;_vb=false}

// ═══ LISTENING (Friends) ═══
let L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};
function rListen(){L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};rfL()}
function rfL(){const ch=CHARS[S.char],tp=ch.topics[S.topic],cur=tp.rounds[L.r],bg=['cafe','garden','living'],pv=L.as.slice(0,Math.max(0,L.as.length-(L.ph==='listen'?cur.ss.length:0)));
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="speechSynthesis.cancel();go('topics')" style="background:none;color:#9CA3AF;font-size:14px">← 뒤로</button><span style="color:#C4B5FD;font-size:13px;font-weight:600">🎧 R${L.r+1}/${tp.rounds.length}</span><span style="color:#FCD34D;font-size:13px">⭐${L.sc}</span></div><div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:14px"><div style="height:100%;border-radius:2px;background:linear-gradient(90deg,#8B5CF6,#6366F1);width:${((L.r+(L.ph==='done'?1:0))/tp.rounds.length)*100}%"></div></div>`;
if(L.ph!=='done')h+=`<div id="sc1">${charSc(ch,L.ph==='listen'?L.cs:null,L.ph==='listen')}</div>`;
if((L.ph==='listen'||L.ph==='q')&&pv.length)h+=`<div style="background:rgba(139,92,246,.08);border-radius:12px;padding:12px;margin-top:12px;border:1px solid rgba(139,92,246,.15)"><div style="color:#9CA3AF;font-size:10px;margin-bottom:6px">📖 이전 대사</div>${pv.map(s=>`<p style="color:#D1D5DB;font-size:13px;margin:3px 0">${s.en}</p>`).join('')}</div>`;
if(L.ph==='ready')h+=`<div style="text-align:center;margin-top:24px"><p style="color:#C4B5FD;font-size:14px;margin-bottom:20px">Round ${L.r+1}: ${cur.ss.length}문장!</p><button class="b" onclick="pRnd()">🎧 듣기 시작!</button></div>`;
if(L.ph==='q')h+=`<div style="margin-top:16px"><div style="background:rgba(99,102,241,.12);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(99,102,241,.25)"><p style="font-size:15px;font-weight:600;margin-bottom:3px">${cur.q.t}</p><p style="color:#A78BFA;font-size:12px">${cur.q.k}</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${cur.q.o.map((o,i)=>`<button onclick="${L.sel===null?`pA(${i})`:''}" style="background:${L.sel===null?'rgba(255,255,255,.07)':i===cur.q.a?'rgba(74,222,128,.18)':i===L.sel?'rgba(239,68,68,.18)':'rgba(255,255,255,.04)'};border:${L.sel===null?'1px solid rgba(255,255,255,.12)':i===cur.q.a?'2px solid #4ADE80':i===L.sel?'2px solid #EF4444':'1px solid rgba(255,255,255,.08)'};border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:500">${o}${L.sel!==null&&i===cur.q.a?' ✅':''}${i===L.sel&&i!==cur.q.a?' ❌':''}</button>`).join('')}</div></div>`;
if(L.ph==='res')h+=`<div style="margin-top:16px"><div style="background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:12px">${cur.ss.map(s=>`<div style="margin-bottom:5px"><p style="color:#E5E7EB;font-size:13px">${s.en}</p><p style="color:#A78BFA;font-size:12px">${s.kr}</p></div>`).join('')}</div><button class="b bo" style="width:100%" onclick="sE()">⭐ 핵심 표현</button></div>`;
if(L.ph==='expr')h+=`<div style="margin-top:16px;text-align:center"><div style="background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));border-radius:16px;padding:22px;margin-bottom:16px;border:2px solid rgba(245,158,11,.25)"><div style="font-size:11px;color:#FCD34D;font-weight:600">⭐ KEY EXPRESSION</div><div style="font-size:22px;font-weight:700;margin:8px 0">"${cur.ex.en}"</div><div style="color:#FCD34D;font-size:14px">${cur.ex.kr}</div></div><div style="display:flex;gap:10px;justify-content:center"><button class="b bg" style="padding:12px 24px;font-size:14px" onclick="svE()">📋 Save+Next</button><button onclick="nR()" style="background:rgba(255,255,255,.08);color:#9CA3AF;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 24px;font-size:14px">Skip</button></div></div>`;
if(L.ph==='done')h+=`<div style="text-align:center;margin-top:32px"><div style="font-size:64px;margin-bottom:12px">${L.sc>=2?'🎉':'💪'}</div><h2 style="font-size:24px;font-weight:700;margin-bottom:8px">${L.sc>=2?'Amazing!':'Good Try!'}</h2><p style="color:#C4B5FD;font-size:16px;margin-bottom:20px">Score: ${L.sc}/${tp.rounds.length}</p><button class="b" onclick="fL()">계속하기 →</button></div>`;
app.innerHTML=h+`</div>`}
async function pRnd(){const ch=CHARS[S.char],cur=ch.topics[S.topic].rounds[L.r];L.ph='listen';L.sel=null;for(const s of cur.ss){L.as.push(s);L.cs=s;rfL();document.getElementById('sc1').innerHTML=charSc(ch,{en:s.en},true);await speak(s.en,ch.rate);document.getElementById('sc1').innerHTML=charSc(ch,{en:s.en},false);await new Promise(r=>setTimeout(r,300))}L.cs=null;L.ph='q';rfL()}
function pA(i){const cur=CHARS[S.char].topics[S.topic].rounds[L.r];L.sel=i;if(i===cur.q.a)L.sc++;rfL();setTimeout(()=>{L.ph='res';rfL()},700)}

<div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">👩‍🏫</div><div style="font-size:13px;color:#93C5FD">TOEFL Examiner</div></div>`;

if(TFS.ph==='intro'){
  // Show reading passage for t2/t3
  if(q.reading){h+=`<div style="background:rgba(59,130,246,.08);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid rgba(59,130,246,.2)"><div style="color:#93C5FD;font-size:11px;font-weight:600;margin-bottom:8px">📖 Reading Passage</div><p style="color:#E5E7EB;font-size:14px;line-height:1.7">${q.reading}</p><p style="color:#60A5FA;font-size:12px;margin-top:6px">${q.readKr}</p></div>`}
  // Show conversation/lecture for t2/t3/t4
  if(q.conv){h+=`<div style="background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:12px"><div style="color:#9CA3AF;font-size:11px;margin-bottom:8px">🎧 Conversation</div><p style="color:#D1D5DB;font-size:13px;line-height:1.8;white-space:pre-line">${q.conv}</p></div>`}
  if(q.lecture){h+=`<div style="background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:12px"><div style="color:#9CA3AF;font-size:11px;margin-bottom:8px">🎓 Lecture</div><p style="color:#D1D5DB;font-size:13px;line-height:1.8">${q.lecture}</p></div>`}
  // Question
  h+=`<div style="background:rgba(59,130,246,.12);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid rgba(59,130,246,.25)"><p style="font-size:15px;font-weight:600;line-height:1.7">${q.en}</p><p style="color:#93C5FD;font-size:12px;margin-top:6px">${q.kr}</p></div>
  <div style="text-align:center"><button class="b bb" onclick="tfPrep()">🎧 ${q.reading||q.lecture?'지문 듣고 준비':'질문 듣고 준비'}</button></div>`
}
if(TFS.ph==='prep'){h+=`<div style="text-align:center"><div style="font-size:14px;color:#FCD34D;margin-bottom:8px">⏱ 준비 시간</div><div style="font-size:48px;font-weight:800;color:#FCD34D" id="prepTimer">${q.prep}s</div><p style="color:#6B7280;font-size:12px;margin-top:8px">생각을 정리하세요...</p></div>`}
if(TFS.ph==='speak'){h+=`<div style="text-align:center;margin-bottom:12px" id="spkTimer"></div><div style="background:rgba(59,130,246,.08);border-radius:16px;padding:16px;min-height:120px;border:2px solid rgba(59,130,246,.25);margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#60A5FA;font-size:13px;font-weight:600">Recording...</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||'<span style="color:#6B7280">Speak now...</span>'}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="tfDone()">⏹ 완료</button></div>`}
if(TFS.ph==='review'){const wc=sttText?sttText.split(' ').length:0;h+=`<div style="background:rgba(255,255,255,.05);border-radius:16px;padding:16px;margin-bottom:16px"><div style="color:#9CA3AF;font-size:11px;margin-bottom:8px">📝 내 답변 (${wc}단어)</div><p style="color:#E5E7EB;font-size:14px;line-height:1.7">${sttText||'(없음)'}</p></div><div style="text-align:center"><button class="b bb" onclick="tfNext()">다음 문제 →</button></div>`}
app.innerHTML=h+`</div>`}

async function tfPrep(){const q=TF[TFS.type][TFS.qi%TF[TFS.type].length];
// Play audio if applicable
if(q.conv)await speak(q.conv.replace(/Student [AB]: /g,''),.85);
if(q.lecture)await speak(q.lecture,.85);
if(!q.conv&&!q.lecture)await speak(q.en,.85);
TFS.ph='prep';rToeflTask();
let s=q.prep;const el=()=>document.getElementById('prepTimer');
const tick=()=>{if(s<=0){TFS.ph='speak';sttText='';rToeflTask();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t});tfSpkTimer(q.speak);return}if(el())el().textContent=s+'s';s--;setTimeout(tick,1000)};tick()}

function tfSpkTimer(sec){let s=sec;const tick=()=>{if(TFS.ph!=='speak')return;const el=document.getElementById('spkTimer');const c=s>15?'#4ADE80':s>5?'#FCD34D':'#EF4444';if(el)el.innerHTML=`<div style="height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-bottom:8px"><div style="height:100%;border-radius:3px;background:${c};width:${(s/sec)*100}%"></div></div><span style="color:${c};font-size:24px;font-weight:800">${s}s</span>`;if(s<=0){tfDone();return}s--;setTimeout(tick,1000)};tick()}
function tfDone(){sttStop();TFS.ph='review';rToeflTask()}
function tfNext(){sttText='';TFS.qi++;if(TFS.qi>=TF[TFS.type].length){go('toefl')}else{TFS.ph='intro';rToeflTask()}}

// ═══ IELTS Speaking ═══
function rIelts(){app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><button onclick="go('pro')" style="background:none;color:#9CA3AF;font-size:14px;margin-bottom:12px">← 뒤로</button>
<div style="text-align:center;margin-bottom:24px"><div style="font-size:48px;margin-bottom:8px">📗</div><h2 style="font-size:24px;font-weight:700">IELTS Speaking</h2><p style="color:#6EE7B7;font-size:13px">👩‍💼 Examiner · 3 Parts</p></div>
<button onclick="go('ieltsP1')" class="cd" style="border:1px solid #16A34A40"><span style="font-size:28px">💬</span><div style="flex:1"><div style="font-size:15px;font-weight:600">Part 1: Introduction</div><div style="color:#9CA3AF;font-size:12px">일상 주제 4~5문제 · 각 30초</div></div><span style="color:#4ADE80">→</span></button>
<button onclick="go('ieltsP2')" class="cd" style="border:1px solid #16A34A40"><span style="font-size:28px">🃏</span><div style="flex:1"><div style="font-size:15px;font-weight:600">Part 2: Cue Card</div><div style="color:#9CA3AF;font-size:12px">주제카드 · 준비 1분 → 말하기 2분</div></div><span style="color:#4ADE80">→</span></button>
<button onclick="go('ieltsP3')" class="cd" style="border:1px solid #16A34A40"><span style="font-size:28px">🧠</span><div style="flex:1"><div style="font-size:15px;font-weight:600">Part 3: Discussion</div><div style="color:#9CA3AF;font-size:12px">심화 토론 · 추상적 질문</div></div><span style="color:#4ADE80">→</span></button>
</div>`}

// IELTS Part 1
let IP1={ti:0,qi:0,ph:'ask'};
function rIeltsP1(){IP1={ti:Math.floor(Math.random()*IE.p1.length),qi:0,ph:'ask'};rfIP1()}
function rfIP1(){const t=IE.p1[IP1.ti],q=t.qs[IP1.qi];
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="sttStop();speechSynthesis.cancel();go('ielts')" style="background:none;color:#9CA3AF;font-size:14px">← 뒤로</button><span style="color:#16A34A;font-size:13px;font-weight:600">Part 1 · ${t.topic} · Q${IP1.qi+1}/${t.qs.length}</span></div>
<div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">👩‍💼</div><div style="font-size:13px;color:#6EE7B7">IELTS Examiner</div></div>`;
if(IP1.ph==='ask'){h+=`<div style="background:rgba(22,163,106,.12);border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid rgba(22,163,106,.25)"><p style="font-size:16px;font-weight:600;line-height:1.7">${q}</p></div><div style="text-align:center"><button class="b bg" onclick="askIP1()">🎧 질문 듣고 대답하기</button></div>`}
if(IP1.ph==='answer'){h+=`<div style="background:rgba(22,163,106,.08);border-radius:16px;padding:16px;min-height:100px;border:2px solid rgba(22,163,106,.25);margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#4ADE80;font-size:13px;font-weight:600">Recording... (30s)</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||''}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="doneIP1()">⏹ 완료</button></div>`}
if(IP1.ph==='review'){h+=`<div style="background:rgba(255,255,255,.05);border-radius:16px;padding:16px;margin-bottom:16px"><p style="color:#E5E7EB;font-size:14px">${sttText||'(없음)'}</p></div><div style="text-align:center"><button class="b bg" onclick="nextIP1()">${IP1.qi+1>=t.qs.length?'✅ Part 1 완료':'다음 질문 →'}</button></div>`}
app.innerHTML=h+`</div>`}
async function askIP1(){const q=IE.p1[IP1.ti].qs[IP1.qi];await speak(q,.85);IP1.ph='answer';sttText='';rfIP1();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t});setTimeout(()=>{if(IP1.ph==='answer')doneIP1()},30000)}
function doneIP1(){sttStop();IP1.ph='review';rfIP1()}
function nextIP1(){sttText='';if(IP1.qi+1>=IE.p1[IP1.ti].qs.length)go('ielts');else{IP1.qi++;IP1.ph='ask';rfIP1()}}

// IELTS Part 2 (Cue Card)
let IP2={ti:0,ph:'card'};
function rIeltsP2(){IP2={ti:Math.floor(Math.random()*IE.p2.length),ph:'card'};rfIP2()}
function rfIP2(){const t=IE.p2[IP2.ti];
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><button onclick="sttStop();speechSynthesis.cancel();go('ielts')" style="background:none;color:#9CA3AF;font-size:14px;margin-bottom:12px">← 뒤로</button>
<div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">🃏</div><div style="font-size:15px;font-weight:700;margin-top:4px">Part 2: ${t.topic}</div></div>`;
if(IP2.ph==='card'){h+=`<div style="background:linear-gradient(135deg,rgba(22,163,106,.1),rgba(16,185,129,.05));border-radius:16px;padding:20px;margin-bottom:20px;border:2px solid rgba(22,163,106,.3)"><p style="color:#E5E7EB;font-size:15px;line-height:2;white-space:pre-line">${t.card}</p></div><div style="text-align:center"><button class="b bg" onclick="prepIP2()">⏱ 준비 시작 (1분)</button></div>`}
if(IP2.ph==='prep'){h+=`<div style="text-align:center"><div style="font-size:14px;color:#FCD34D;margin-bottom:8px">⏱ 준비 시간</div><div style="font-size:48px;font-weight:800;color:#FCD34D" id="prepTimer">60s</div><div style="background:linear-gradient(135deg,rgba(22,163,106,.08),rgba(16,185,129,.04));border-radius:14px;padding:16px;margin-top:16px;text-align:left"><p style="color:#D1D5DB;font-size:13px;line-height:2;white-space:pre-line">${t.card}</p></div></div>`}
if(IP2.ph==='speak'){h+=`<div style="text-align:center;margin-bottom:12px" id="spkTimer"></div><div style="background:rgba(22,163,106,.08);border-radius:16px;padding:16px;min-height:140px;border:2px solid rgba(22,163,106,.25);margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#4ADE80;font-size:13px;font-weight:600">Speaking... (2분)</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||''}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="doneIP2()">⏹ 완료</button></div>`}
if(IP2.ph==='review'){const wc=sttText?sttText.split(' ').length:0;h+=`<div style="background:rgba(255,255,255,.05);border-radius:16px;padding:16px;margin-bottom:16px"><div style="color:#9CA3AF;font-size:11px;margin-bottom:6px">📝 내 답변 (${wc}단어)</div><p style="color:#E5E7EB;font-size:14px;line-height:1.7">${sttText||'(없음)'}</p></div><div style="background:rgba(22,163,106,.08);border-radius:14px;padding:14px;margin-bottom:16px"><p style="color:#6EE7B7;font-size:13px">${wc>=80?'훌륭해요! Band 7+ 수준의 답변 길이입니다.':wc>=40?'좋아요! 조금 더 디테일을 추가하면 좋겠어요.':'더 길게 말해보세요. 2분 동안 최소 80단어 이상이 좋아요.'}</p></div><div style="text-align:center"><button class="b bg" onclick="go('ielts')">✅ 완료</button></div>`}
app.innerHTML=h+`</div>`}
function prepIP2(){IP2.ph='prep';rfIP2();let s=60;const tick=()=>{const el=document.getElementById('prepTimer');if(s<=0){IP2.ph='speak';sttText='';rfIP2();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t});ip2SpkTimer();return}if(el)el.textContent=s+'s';s--;setTimeout(tick,1000)};tick()}
function ip2SpkTimer(){let s=120;const tick=()=>{if(IP2.ph!=='speak')return;const el=document.getElementById('spkTimer');const c=s>30?'#4ADE80':s>10?'#FCD34D':'#EF4444';if(el)el.innerHTML=`<div style="height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-bottom:8px"><div style="height:100%;border-radius:3px;background:${c};width:${(s/120)*100}%"></div></div><span style="color:${c};font-size:24px;font-weight:800">${s}s</span>`;if(s<=0){doneIP2();return}s--;setTimeout(tick,1000)};tick()}
function doneIP2(){sttStop();IP2.ph='review';rfIP2()}

// IELTS Part 3 (Discussion)
let IP3={topic:null,qi:0,ph:'ask'};
function rIeltsP3(){const topics=Object.keys(IE.p3);IP3={topic:topics[Math.floor(Math.random()*topics.length)],qi:0,ph:'ask'};rfIP3()}
function rfIP3(){const qs=IE.p3[IP3.topic],q=qs[IP3.qi];
let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="sttStop();speechSynthesis.cancel();go('ielts')" style="background:none;color:#9CA3AF;font-size:14px">← 뒤로</button><span style="color:#16A34A;font-size:13px;font-weight:600">Part 3 · ${IP3.topic} · Q${IP3.qi+1}/${qs.length}</span></div>
<div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">🧠</div><div style="font-size:13px;color:#6EE7B7">Deep Discussion</div></div>`;
if(IP3.ph==='ask'){h+=`<div style="background:rgba(22,163,106,.12);border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid rgba(22,163,106,.25)"><p style="font-size:16px;font-weight:600;line-height:1.7">${q}</p></div><div style="text-align:center"><button class="b bg" onclick="askIP3()">🎧 질문 듣고 대답하기</button></div>`}
if(IP3.ph==='answer'){h+=`<div style="background:rgba(22,163,106,.08);border-radius:16px;padding:16px;min-height:100px;border:2px solid rgba(22,163,106,.25);margin-bottom:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:12px;height:12px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite"></div><span style="color:#4ADE80;font-size:13px;font-weight:600">Recording... (45s)</span></div><p style="color:#E5E7EB;font-size:15px;line-height:1.7" id="sttBox">${sttText||''}</p></div><div style="text-align:center"><button class="b" style="background:linear-gradient(135deg,#EF4444,#DC2626);padding:12px 28px;font-size:14px" onclick="doneIP3()">⏹ 완료</button></div>`}
if(IP3.ph==='review'){h+=`<div style="background:rgba(255,255,255,.05);border-radius:16px;padding:16px;margin-bottom:16px"><p style="color:#E5E7EB;font-size:14px">${sttText||'(없음)'}</p></div><div style="text-align:center"><button class="b bg" onclick="nextIP3()">${IP3.qi+1>=qs.length?'✅ Part 3 완료':'다음 질문 →'}</button></div>`}
app.innerHTML=h+`</div>`}
async function askIP3(){await speak(IE.p3[IP3.topic][IP3.qi],.85);IP3.ph='answer';sttText='';rfIP3();sttStart(t=>{const b=document.getElementById('sttBox');if(b)b.textContent=t});setTimeout(()=>{if(IP3.ph==='answer')doneIP3()},45000)}
function doneIP3(){sttStop();IP3.ph='review';rfIP3()}
function nextIP3(){sttText='';if(IP3.qi+1>=IE.p3[IP3.topic].length)go('ielts');else{IP3.qi++;IP3.ph='ask';rfIP3()}}
</script>
