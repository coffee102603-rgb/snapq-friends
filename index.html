function speak(text,rate=0.85){
  return new Promise(res=>{
    if(!window.speechSynthesis){res();return}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=rate;
    u.onend=res;u.onerror=res;
    speechSynthesis.speak(u);
  });
}

    ${[['🇯🇵','日本語','もうすぐ!'],['🇨🇳','中文','即将推出!'],['🇪🇸','Español','¡Próximamente!']].map(l=>`<button style="display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 20px;opacity:.45"><span style="font-size:28px">${l[0]}</span><span style="color:#fff;font-size:18px;font-weight:600;flex:1;text-align:left">${l[1]}</span><span style="color:#F59E0B;font-size:12px">${l[2]}</span></button>`).join('')}
  </div>
</div>`}

function rProfiles(){
  const gc={GENTLE:{l:'🐢 GENTLE 초급',c:'#8B5CF6'},CASUAL:{l:'💬 CASUAL 중급',c:'#3B82F6'},FAST:{l:'🔥 FAST 고급',c:'#EF4444'}};
  const playable=Object.entries(CHARS).map(([id,ch])=>({id,...ch}));
  let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px">
    <h2 style="font-size:20px;font-weight:700;text-align:center;margin-bottom:24px">👥 Choose Your Friend</h2>
    <h3 style="color:#8B5CF6;font-size:13px;font-weight:600;margin:0 0 10px 4px">${gc.GENTLE.l}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  playable.forEach(p=>{
    h+=`<button onclick="S.char='${p.id}';go('video')" style="background:linear-gradient(150deg,${p.color}18,${p.color}30);border:2px solid ${p.color}50;border-radius:16px;padding:14px 6px;text-align:center">
      <div style="font-size:36px;margin-bottom:4px">${p.emoji}</div>
      <div style="color:#fff;font-size:13px;font-weight:600">${p.name}</div>
      <div style="color:#9CA3AF;font-size:10px">${p.age} · ${p.city}</div>
      <div style="color:${p.color};font-size:10px;margin-top:4px">${p.price}🪙</div>
    </button>`;
  });
  h+=`</div>`;
  // CASUAL
  h+=`<h3 style="color:#3B82F6;font-size:13px;font-weight:600;margin:0 0 10px 4px">${gc.CASUAL.l}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  OTHERS.filter(o=>o.g==='C').forEach(p=>{
    h+=`<button style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 6px;text-align:center;opacity:.35">
      <div style="font-size:36px;margin-bottom:4px">${p.e}</div><div style="color:#fff;font-size:13px;font-weight:600">${p.n}</div>
      <div style="color:#9CA3AF;font-size:10px">${p.a} · ${p.c}</div><div style="color:#6B7280;font-size:9px;margin-top:4px">🔒 ${p.p}🪙</div></button>`;
  });
  h+=`</div>`;
  // FAST
  h+=`<h3 style="color:#EF4444;font-size:13px;font-weight:600;margin:0 0 10px 4px">${gc.FAST.l}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  OTHERS.filter(o=>o.g==='F').forEach(p=>{
    h+=`<button style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 6px;text-align:center;opacity:.35">
      <div style="font-size:36px;margin-bottom:4px">${p.e}</div><div style="color:#fff;font-size:13px;font-weight:600">${p.n}</div>
      <div style="color:#9CA3AF;font-size:10px">${p.a} · ${p.c}</div><div style="color:#6B7280;font-size:9px;margin-top:4px">🔒 ${p.p}🪙</div></button>`;
  });
  h+=`</div></div>`;
  app.innerHTML=h;
}

// ═══ INTRO VIDEO ═══
let _vb=false;
function rVideo(){_vb=false;const ch=CHARS[S.char];
  app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px">
    <button onclick="speechSynthesis.cancel();go('profiles')" style="background:none;color:#9CA3AF;font-size:14px;margin-bottom:12px">← 뒤로</button>
    <div id="sc1">${buildScene(ch,null,false)}</div>
    <div style="text-align:center;margin-top:20px" id="vc"><button class="b" onclick="playV()">▶ 소개 영상 보기</button></div>
    <div style="background:rgba(255,255,255,.05);border-radius:16px;padding:18px;margin-top:20px;border:1px solid rgba(255,255,255,.08)">
      <div style="margin-bottom:8px">${ch.tags.map(t=>`<span class="tg">${t}</span>`).join('')}</div>
      <p style="color:#9CA3AF;font-size:13px;line-height:1.7">${ch.name}, ${ch.age}세 · ${ch.city}<br>${ch.job} · ${ch.reason}<br><span style="color:#A78BFA">💡 ${ch.desc}</span></p>
    </div>
  </div>`}

async function playV(){
  if(_vb)return;_vb=true;const ch=CHARS[S.char],vc=$('vc');
  vc.innerHTML=`<p style="color:#C4B5FD;font-size:13px">🎤 ${ch.name}가 말하고 있어요...</p>`;
  for(const line of ch.intro){
    $('sc1').innerHTML=buildScene(ch,{en:line.en,kr:line.kr},true);
    await speak(line.en,ch.rate);
    $('sc1').innerHTML=buildScene(ch,{en:line.en,kr:line.kr},false);
    await new Promise(r=>setTimeout(r,400));
  }
  $('sc1').innerHTML=buildScene(ch,{en:ch.question.en,kr:ch.question.kr},true);
  await speak(ch.question.en,ch.rate);
  $('sc1').innerHTML=buildScene(ch,{en:ch.question.en,kr:ch.question.kr},false);
  const opts=Object.keys(ch.answers);
  vc.innerHTML=`<div style="display:flex;gap:12px;justify-content:center">${opts.map((k,i)=>`<button class="b ${i===0?'bp':'bo'}" style="padding:12px 28px;font-size:15px" onclick="ansV('${k}')">${k==='dogs'?'🐶':k==='cats'?'🐱':k==='yes'?'👍':k==='korean'?'🍚':'🍕'} ${k.charAt(0).toUpperCase()+k.slice(1)}!</button>`).join('')}</div>`;
  _vb=false;
}

async function ansV(k){
  const ch=CHARS[S.char],reply=ch.answers[k];
  $('sc1').innerHTML=buildScene(ch,{en:reply},true);
  await speak(reply,ch.rate);
  $('sc1').innerHTML=buildScene(ch,{en:reply},false);
  $('vc').innerHTML=`<button class="b bg" onclick="addF()">+ Add Friend — ${ch.price}🪙</button>`;
}

function addF(){const ch=CHARS[S.char];if(S.coins>=ch.price&&!S.fr[S.char]){S.coins-=ch.price;S.fr[S.char]={int:1}}go('friends')}

// ═══ FRIENDS ═══
function rFriends(){
  const ids=Object.keys(S.fr);
  if(ids.length===0){
    app.innerHTML=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:20px">💬 My Friends</h2>
    <div style="text-align:center;color:#6B7280;margin-top:60px"><div style="font-size:48px;margin-bottom:12px">🤷</div><p>아직 친구가 없어요!</p>
    <button class="b" style="margin-top:16px;padding:12px 28px;font-size:14px" onclick="go('profiles')">친구 만들러 가기 →</button></div></div>`;return;
  }
  let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:24px 16px 80px"><h2 style="font-size:20px;font-weight:700;margin-bottom:20px">💬 My Friends</h2>`;
  ids.forEach(id=>{
    const ch=CHARS[id],f=S.fr[id],hearts=Math.min(f.int,5);
    h+=`<button onclick="S.char='${id}';go('topics')" style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px 18px;text-align:left;width:100%;margin-bottom:10px">
      <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,${ch.color}35,${ch.color}15);display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid ${ch.color}50;position:relative">${ch.emoji}
        <div style="position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#EF4444;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #0F0A1F">1</div>
      </div>
      <div style="flex:1"><div style="font-size:16px;font-weight:600;margin-bottom:4px">${ch.name} <span style="color:#C4B5FD;font-size:12px;margin-left:6px">${'♥'.repeat(hearts)}${'♡'.repeat(5-hearts)}</span></div>
      <div style="color:#9CA3AF;font-size:13px">"Hey! Ready to chat today?" 💬</div></div></button>`;
  });
  app.innerHTML=h+`</div>`;
}

// ═══ TOPIC SELECT ═══
function rTopics(){
  const ch=CHARS[S.char];
  let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px">
    <button onclick="go('friends')" style="background:none;color:#9CA3AF;font-size:14px;margin-bottom:12px">← 뒤로</button>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">${ch.emoji} ${ch.name}의 이야기</h2>
    <p style="color:#9CA3AF;font-size:12px;margin-bottom:20px">토픽을 선택하세요!</p>
    <div style="display:flex;flex-direction:column;gap:10px">`;
  ch.topics.forEach((t,i)=>{
    h+=`<button onclick="S.topic=${i};go('listen')" style="display:flex;align-items:center;gap:14px;background:rgba(${ch.color.slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')},.08);border:1px solid rgba(${ch.color.slice(1).match(/../g).map(h=>parseInt(h,16)).join(',')},.2);border-radius:16px;padding:16px 18px;text-align:left;width:100%">
      <span style="font-size:32px">${t.icon}</span>
      <div><div style="font-size:15px;font-weight:600">${t.name}</div>
      <div style="color:#9CA3AF;font-size:12px">${t.rounds.length} rounds · ${t.rounds.reduce((a,r)=>a+r.ss.length,0)} sentences</div></div>
      <span style="color:#4ADE80;font-size:20px;margin-left:auto">→</span>
    </button>`;
  });
  app.innerHTML=h+`</div></div>`;
}

// ═══ LISTENING ═══
let L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};
function rListen(){L={r:0,ph:'ready',sel:null,sc:0,sv:[],as:[],cs:null};rfL()}
function rfL(){
  const ch=CHARS[S.char],topic=ch.topics[S.topic],cur=topic.rounds[L.r];
  const prev=L.as.slice(0,Math.max(0,L.as.length-(L.ph==='listen'?cur.ss.length:0)));
  let h=`<div style="min-height:100dvh;background:#0F0A1F;padding:16px 16px 80px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="speechSynthesis.cancel();go('topics')" style="background:none;color:#9CA3AF;font-size:14px">← 뒤로</button>
      <span style="color:#C4B5FD;font-size:13px;font-weight:600">🎧 ${topic.name} · R${L.r+1}/${topic.rounds.length}</span>
      <span style="color:#FCD34D;font-size:13px">⭐ ${L.sc}</span>
    </div>
    <div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:14px"><div style="height:100%;border-radius:2px;background:linear-gradient(90deg,#8B5CF6,#6366F1);width:${((L.r+(L.ph==='done'?1:0))/topic.rounds.length)*100}%;transition:width .5s"></div></div>`;

  if(L.ph!=='done') h+=`<div id="sc1">${buildScene(ch,L.ph==='listen'?L.cs:null,L.ph==='listen')}</div>`;

  if((L.ph==='listen'||L.ph==='q')&&prev.length>0)
    h+=`<div style="background:rgba(139,92,246,.08);border-radius:12px;padding:12px;margin-top:12px;border:1px solid rgba(139,92,246,.15)"><div style="color:#9CA3AF;font-size:10px;margin-bottom:6px">📖 이전 대사</div>${prev.map(s=>`<p style="color:#D1D5DB;font-size:13px;line-height:1.6;margin:3px 0">${s.en}</p>`).join('')}</div>`;

  if(L.ph==='ready')
    h+=`<div style="text-align:center;margin-top:24px"><p style="color:#C4B5FD;font-size:14px;margin-bottom:6px">Round ${L.r+1}: ${cur.ss.length}문장!</p><p style="color:#6B7280;font-size:12px;margin-bottom:20px">${L.r===0?'🔊 소리에 집중하세요!':'📖 이전 문장 텍스트 공개!'}</p><button class="b" onclick="pRnd()">🎧 듣기 시작!</button></div>`;

  if(L.ph==='q')
    h+=`<div style="margin-top:16px"><div style="background:rgba(99,102,241,.12);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(99,102,241,.25)"><p style="font-size:15px;font-weight:600;margin-bottom:3px">${cur.q.t}</p><p style="color:#A78BFA;font-size:12px">${cur.q.k}</p></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${cur.q.o.map((o,i)=>{const ia=i===cur.q.a,is=i===L.sel;return`<button onclick="${L.sel===null?`pA(${i})`:''}" style="background:${L.sel===null?'rgba(255,255,255,.07)':ia?'rgba(74,222,128,.18)':is?'rgba(239,68,68,.18)':'rgba(255,255,255,.04)'};border:${L.sel===null?'1px solid rgba(255,255,255,.12)':ia?'2px solid #4ADE80':is?'2px solid #EF4444':'1px solid rgba(255,255,255,.08)'};border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:500">${o}${L.sel!==null&&ia?' ✅':''}${is&&!ia?' ❌':''}</button>`}).join('')}</div></div>`;

  if(L.ph==='res')
    h+=`<div style="margin-top:16px"><div style="background:rgba(255,255,255,.04);border-radius:14px;padding:14px;margin-bottom:12px"><div style="color:#9CA3AF;font-size:11px;margin-bottom:6px">📖 해석</div>${cur.ss.map(s=>`<div style="margin-bottom:5px"><p style="color:#E5E7EB;font-size:13px">${s.en}</p><p style="color:#A78BFA;font-size:12px">${s.kr}</p></div>`).join('')}</div><button class="b bo" style="width:100%" onclick="sE()">⭐ 핵심 표현 듣기</button></div>`;

  if(L.ph==='expr')
    h+=`<div style="margin-top:16px;text-align:center"><div style="background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(239,68,68,.08));border-radius:16px;padding:22px;margin-bottom:16px;border:2px solid rgba(245,158,11,.25)"><div style="font-size:11px;color:#FCD34D;margin-bottom:8px;font-weight:600">⭐ KEY EXPRESSION</div><div style="font-size:22px;font-weight:700;margin-bottom:4px">"${cur.ex.en}"</div><div style="color:#FCD34D;font-size:14px">${cur.ex.kr}</div></div><div style="display:flex;gap:10px;justify-content:center"><button class="b bg" style="padding:12px 24px;font-size:14px" onclick="svE()">📋 Save+Next</button><button onclick="nR()" style="background:rgba(255,255,255,.08);color:#9CA3AF;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 24px;font-size:14px">Skip →</button></div></div>`;

  if(L.ph==='done'){
    const topic=CHARS[S.char].topics[S.topic];
    h+=`<div style="text-align:center;margin-top:32px"><div style="font-size:64px;margin-bottom:12px">${L.sc>=2?'🎉':'💪'}</div><h2 style="font-size:24px;font-weight:700;margin-bottom:8px">${L.sc>=2?'Amazing!':'Good Try!'}</h2><p style="color:#C4B5FD;font-size:16px;margin-bottom:12px">Score: ${L.sc}/${topic.rounds.length} ${L.sc>=2?'✅ PASS!':''}</p>${L.sv.length>0?`<div style="background:rgba(74,222,128,.08);border-radius:14px;padding:14px;margin-bottom:16px;text-align:left;border:1px solid rgba(74,222,128,.15)"><div style="color:#4ADE80;font-size:12px;font-weight:600;margin-bottom:8px">📋 Expression Vault!</div>${L.sv.map(e=>`<div style="color:#E5E7EB;font-size:13px;margin-bottom:4px">✦ <b>${e.en}</b> — ${e.kr}</div>`).join('')}</div>`:''}<div style="background:rgba(139,92,246,.08);border-radius:14px;padding:14px;margin-bottom:20px;border:1px solid rgba(139,92,246,.15)"><p style="color:#C4B5FD;font-size:13px">🪙 +${L.sc>=2?15:5} &nbsp; ♥ +2</p></div><button class="b" onclick="fL()">계속하기 →</button></div>`;
  }
  app.innerHTML=h+`</div>`;
}

async function pRnd(){const ch=CHARS[S.char],cur=ch.topics[S.topic].rounds[L.r];L.ph='listen';L.sel=null;
  for(const s of cur.ss){L.as.push(s);L.cs=s;rfL();
    $('sc1').innerHTML=buildScene(ch,{en:s.en},true);
    await speak(s.en,ch.rate);
    $('sc1').innerHTML=buildScene(ch,{en:s.en},false);
    await new Promise(r=>setTimeout(r,300));}
  L.cs=null;L.ph='q';rfL();}
function pA(i){const ch=CHARS[S.char],cur=ch.topics[S.topic].rounds[L.r];L.sel=i;if(i===cur.q.a)L.sc++;if(navigator.vibrate)navigator.vibrate(i===cur.q.a?[50]:[80,40,80]);rfL();setTimeout(()=>{L.ph='res';rfL()},700)}
async function sE(){L.ph='expr';rfL();const ch=CHARS[S.char];await speak(ch.topics[S.topic].rounds[L.r].ex.en,.7)}
function svE(){const e=CHARS[S.char].topics[S.topic].rounds[L.r].ex;if(!L.sv.find(x=>x.en===e.en))L.sv.push(e);nR()}
function nR(){const ch=CHARS[S.char];if(L.r<ch.topics[S.topic].rounds.length-1){L.r++;L.ph='ready';L.sel=null}else L.ph='done';rfL()}
function fL(){if(S.fr[S.char])S.fr[S.char].int++;S.coins+=L.sc>=2?15:5;go('friends')}

function updNav(){const sh=!['intro','lang'].includes(S.scr);let n=document.getElementById('nv');if(!sh){if(n)n.remove();return}
if(!n){n=document.createElement('div');n.id='nv';n.className='nav';document.body.appendChild(n)}
n.innerHTML=[{i:'🏠',l:'Home',s:'profiles'},{i:'💬',l:'Friends',s:'friends'},{i:'📋',l:'Vault',s:'vault'},{i:'🪙',l:S.coins,s:'coins'}].map(x=>`<button class="${S.scr===x.s?'on':''}" onclick="${['profiles','friends'].includes(x.s)?`go('${x.s}')`:''}"><span style="font-size:20px">${x.i}</span>${x.l}</button>`).join('')}

const R={intro:rIntro,lang:rLang,profiles:rProfiles,video:rVideo,friends:rFriends,topics:rTopics,listen:rListen};
go('intro');
</script>
</body>
